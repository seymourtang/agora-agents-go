        ### NewLiveAvatarAvatar

        <!-- snippet: fragment -->
        ```go
        func NewLiveAvatarAvatar(opts LiveAvatarAvatarOptions) *LiveAvatarAvatar
        ```

        Panics if `APIKey` or `AgoraUID` is empty, or if `Quality` is not one of `"low"`, `"medium"`, `"high"`.

        Required TTS sample rate: **24kHz** (`SampleRate24kHz`)

