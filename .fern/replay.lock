        | `APIKey`          | `string`                   | No       | —                                              | OpenAI API key. Optional for supported Agora-managed OpenAI models. |
        | `Model`           | `string`                   | No       | `"gpt-4o-mini"`                                | Model identifier        |
        | `BaseURL`         | `string`                   | No       | `"https://api.openai.com/v1/chat/completions"` | API endpoint            |
