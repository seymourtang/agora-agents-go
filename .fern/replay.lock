        sidebar_position: 2
        title: Authentication
        description: Configure the Go SDK with the app-credentials flow and understand the supported auth modes.
        ---

        # Authentication

        Use app credentials mode for production session integrations.

        Create `AgoraClient` with `AppID` and `AppCertificate`, then let `AgentSession` generate the ConvoAI REST auth token and the RTC join token automatically.

        ## Recommended: app credentials

        ```go
        package main

        import (
            "github.com/AgoraIO/agora-agents-go/agentkit"
            "github.com/AgoraIO/agora-agents-go/option"
        )

        func main() {
            client := agentkit.NewAgoraClient(agentkit.AgoraClientOptions{
                Area:           option.AreaUS,
                AppID:          "your-app-id",
                AppCertificate: "your-app-certificate",
            })

            _ = client
        }
        ```

        ## Why this is the default

        - The SDK handles ConvoAI REST auth and RTC join token generation for you.
        - Your session code stays focused on agent behavior while the SDK handles auth details.
        - Your quick start code stays vendor-key free when you use supported Agora-managed models.

        ## Legacy auth modes

        The generated REST client still contains legacy auth hooks for prebuilt REST tokens and HTTP Basic Auth. Do not use those for new session integrations. Use app credentials so AgentKit can mint short-lived ConvoAI REST auth and RTC join tokens for each session.

        ## Inspecting the resolved auth mode

        ```go
        import "fmt"

        fmt.Println(client.AuthMode) // "app-credentials"
        ```
      docs/getting-started/quick-start.md: |
        ---
        sidebar_position: 3
        title: Quick Start
        description: Build and run your first Agora Conversational AI agent in Go with app credentials and the builder API.
        ---

        # Quick Start

        This guide starts with the standard AgentKit path:

        - `AppID`, `AppCertificate`, and `Area` on `AgoraClient`
        - the `Agent` builder with `WithStt()`, `WithLlm()`, and `WithTts()`
        - automatic ConvoAI REST auth and RTC join token generation
        - no vendor API keys when using supported Agora-managed models

        ## Full example

        ```go
        package main

        import (
            "context"
            "fmt"
            "log"

            "github.com/AgoraIO/agora-agents-go/agentkit"
            "github.com/AgoraIO/agora-agents-go/agentkit/vendors"
            "github.com/AgoraIO/agora-agents-go/option"
        )

        func main() {
            ctx := context.Background()
            idleTimeout := 120

            client := agentkit.NewAgoraClient(agentkit.AgoraClientOptions{
                Area:           option.AreaUS,
                AppID:          "your-app-id",
                AppCertificate: "your-app-certificate",
            })

            agent := agentkit.NewAgent(
                agentkit.WithName("support-assistant"),
                agentkit.WithInstructions("You are a concise support voice assistant."),
                agentkit.WithGreeting("Hello! How can I help you today?"),
                agentkit.WithMaxHistory(10),
            ).WithStt(
                vendors.NewDeepgramSTT(vendors.DeepgramSTTOptions{
                    Model:    "nova-3",
                    Language: "en",
                }),
            ).WithLlm(
                vendors.NewOpenAI(vendors.OpenAIOptions{
                    Model: "gpt-5-mini",
                }),
            ).WithTts(
                vendors.NewOpenAITTS(vendors.OpenAITTSOptions{
                    Model: "tts-1",
                    Voice: "alloy",
                }),
            )

            session := agent.CreateSession(client, agentkit.CreateSessionOptions{
                Channel:     "support-room-123",
                AgentUID:    "1",
                RemoteUIDs:  []string{"100"},
                IdleTimeout: &idleTimeout,
            })

            agentSessionID, err := session.Start(ctx)
            if err != nil {
                log.Fatal(err)
            }
            fmt.Println("Agent started:", agentSessionID)

            if err := session.Say(ctx, "Thanks for calling Agora support.", nil, nil); err != nil {
                log.Fatal(err)
            }
            if err := session.Stop(ctx); err != nil {
                log.Fatal(err)
            }
        }
        ```

        ## What this does

        1. `AgoraClient` runs in app-credentials mode when you pass `AppID` and `AppCertificate` only.
        2. `Agent` holds reusable behavior such as instructions, greeting, and history settings.
        3. Vendor constructors on the builder select the ASR, LLM, and TTS stack. AgentKit uses Agora-managed configuration when credentials are omitted for supported models.
        4. `session.Start(...)` lets the SDK generate the required auth tokens automatically.
        5. `session.Start(...)` returns the unique agent session ID.

        ## When to use BYOK instead

        Use the builder without vendor API keys when you are using supported Agora-managed models.

        Use BYOK when you need to:

        - supply your own vendor API keys
        - use models outside the Agora-managed catalog
        - point at custom vendor endpoints
        - manage vendor-specific parameters directly

        See [BYOK Guide](../guides/byok.md).

        ## Next steps

        - [Authentication](./authentication.md)
        - [BYOK Guide](../guides/byok.md)
        - [MLLM Flow](../guides/mllm-flow.md)
        - [Agent Reference](../reference/agent.md)
      docs/guides/advanced.md: |
        ---
        sidebar_position: 8
        title: Advanced
        description: Timeouts, cancellation, stopping by agent ID, raw responses, and generated-client escape hatches.
        ---

        # Advanced

        The default path for realtime agents is still AgentKit with app credentials:

        ```go
        client := agentkit.NewAgoraClient(agentkit.AgoraClientOptions{
            Area:           option.AreaUS,
            AppID:          "your-app-id",
            AppCertificate: "your-app-certificate",
        })
        ```

        That client keeps auth out of your request code: session methods mint ConvoAI REST auth and RTC join tokens from `AppID` and `AppCertificate`.

        ## Timeouts

        Use `context.WithTimeout` for request-scoped timeouts:

        ```go
        ctx, cancel := context.WithTimeout(context.Background(), 30*time.Second)
        defer cancel()

        agentID, err := session.Start(ctx)
        if err != nil {
            return err
        }
        _ = agentID
        ```

        ## Cancellation

        Use `context.WithCancel` when your server needs to abort work after a client disconnects or workflow cancellation:

        ```go
        ctx, cancel := context.WithCancel(context.Background())
        defer cancel()

        go func() {
            <-done
            cancel()
        }()

        if err := session.Stop(ctx); err != nil {
            return err
        }
        ```

        ## Stop Without A Session Handle

        Use `StopAgent` when a later request handler only has the agent session ID. It uses the same app credentials to generate the required ConvoAI REST auth header.

        ```go
        if err := client.StopAgent(ctx, agentID); err != nil {
            return err
        }
        ```

        ## Raw Responses

        The generated clients expose `WithRawResponse` for advanced debugging of status codes and headers. Keep session lifecycle code on AgentKit unless you specifically need to call a generated REST method.

        ```go
        resp, err := client.Agents.WithRawResponse.Get(ctx, req)
        if err != nil {
            return err
        }

        fmt.Println(resp.StatusCode)
        fmt.Println(resp.Header)
        fmt.Println(resp.Body)
        ```

        ## Generated-Client Options

        Generated-client request options such as `option.WithMaxAttempts`, `option.WithHTTPHeader`, and `option.WithQueryParameters` are available for low-level REST calls. They are advanced tools and are not needed for the AgentKit session flow.
      docs/guides/byok.md: |
        ---
        sidebar_position: 4
        title: BYOK
        description: Bring your own vendor credentials and use custom vendor configuration with the Go SDK.
        ---

        # BYOK

        Use BYOK when you want to provide vendor credentials yourself instead of using Agora-managed models.

        Typical reasons:

        - you need a vendor model that is not part of the Agora-managed catalog
        - you want to point to a custom endpoint
        - you want direct control over vendor-specific parameters
        - your organization manages vendor billing separately from Agora

        ## Full example

        ```go
        package main

        import (
            "context"
            "fmt"
            "log"
            "os"

            "github.com/AgoraIO/agora-agents-go/agentkit"
            "github.com/AgoraIO/agora-agents-go/agentkit/vendors"
            "github.com/AgoraIO/agora-agents-go/option"
        )

        func main() {
            ctx := context.Background()
            idleTimeout := 120

            client := agentkit.NewAgoraClient(agentkit.AgoraClientOptions{
                Area:           option.AreaUS,
                AppID:          "your-app-id",
                AppCertificate: "your-app-certificate",
            })

            // In BYOK mode, each vendor carries its own credentials.
            agent := agentkit.NewAgent(
                agentkit.WithName("support-assistant"),
                agentkit.WithInstructions("You are a concise support voice assistant."),
                agentkit.WithGreeting("Hello! How can I help you today?"),
                agentkit.WithMaxHistory(10),
            ).WithStt(vendors.NewDeepgramSTT(vendors.DeepgramSTTOptions{
                APIKey:   os.Getenv("DEEPGRAM_API_KEY"),
                Model:    "nova-3",
                Language: "en-US",
            })).WithLlm(vendors.NewOpenAI(vendors.OpenAIOptions{
                APIKey: os.Getenv("OPENAI_API_KEY"),
                Model:  "gpt-4o-mini",
            })).WithTts(vendors.NewElevenLabsTTS(vendors.ElevenLabsTTSOptions{
                Key:        os.Getenv("ELEVENLABS_API_KEY"),
                ModelID:    "eleven_flash_v2_5",
                VoiceID:    os.Getenv("ELEVENLABS_VOICE_ID"),
                SampleRate: 24000,
            }))

            session := agent.CreateSession(client, agentkit.CreateSessionOptions{
                Channel:     "support-room-123",
                AgentUID:    "1",
                RemoteUIDs:  []string{"100"},
                IdleTimeout: &idleTimeout,
            })

            agentSessionID, err := session.Start(ctx)
            if err != nil {
                log.Fatal(err)
            }
            fmt.Println("Agent started:", agentSessionID)

            if err := session.Stop(ctx); err != nil {
                log.Fatal(err)
            }
        }
        ```

        ## Agora-managed models vs BYOK

        - Agora-managed models: supported models without vendor keys in app code
        - BYOK: most control, your keys and your vendor configuration
      docs/guides/low-level-api.md: |
        ---
        sidebar_position: 9
        title: Low-Level API
        description: Use generated clients for advanced operations while keeping app-credentials auth as the default.
        ---

        # Low-Level API

        For starting and managing realtime agent sessions, prefer the AgentKit builder:

        - create `agentkit.NewAgoraClient` with `AppID` and `AppCertificate`
        - configure vendors with `WithStt`, `WithLlm`, `WithTts`, or `WithMllm`
        - call `session.Start(ctx)`, `session.Say(ctx, ...)`, `session.Update(ctx, ...)`, and `session.Stop(ctx)`

        That path generates ConvoAI REST auth and RTC join tokens from app credentials, so application code does not need prebuilt REST tokens, RTC tokens, Customer ID, or Customer Secret.

        ## Generated Clients

        The SDK also exposes generated clients for API surfaces that are not part of the AgentKit session lifecycle:

        - `client.Telephony` for call status and hangup operations
        - `client.PhoneNumbers` for phone-number list, create, retrieve, update, and delete operations
        - `client.AgentManagement` for management actions such as `agent-think`

        Use these when you need REST API operations outside the AgentKit session lifecycle. For new session starts, use AgentKit instead of manually constructing `StartAgentsRequest`; AgentKit handles token generation and supported Agora-managed models.

        ## App-Credentials Client

        ```go
        package main

        import (
            "github.com/AgoraIO/agora-agents-go/agentkit"
            "github.com/AgoraIO/agora-agents-go/option"
        )

        func main() {
            client := agentkit.NewAgoraClient(agentkit.AgoraClientOptions{
                Area:           option.AreaUS,
                AppID:          "your-app-id",
                AppCertificate: "your-app-certificate",
            })

            _ = client.Telephony
            _ = client.PhoneNumbers
            _ = client.AgentManagement
        }
        ```

        ## Stopping By Agent ID

        If you need to stop an agent from a separate request handler and do not have the original `AgentSession`, use `StopAgent`. It uses the same app credentials to mint the required ConvoAI REST auth header.

        ```go
        if err := client.StopAgent(ctx, agentID); err != nil {
            return err
        }
        ```

        ## Raw Types

        Generated request and response types are still useful for strongly typed values, pointer helpers, and advanced payload construction. The root package exposes helpers such as `Agora.String`, `Agora.Bool`, `Agora.Int`, and `Agora.Float64` for optional fields.

        ```go
        import Agora "github.com/AgoraIO/agora-agents-go"

        idleTimeout := Agora.Int(120)
        greeting := Agora.String("Hello! How can I help?")
        ```

        For full generated method signatures, see [reference.md](../../reference.md).
      docs/guides/mllm-flow.md: |
        ---
        sidebar_position: 2
        title: MLLM Flow
        description: Use multimodal models (OpenAI Realtime, Gemini Live) for real-time audio processing.
        ---

        # MLLM Flow (Multimodal)

        The MLLM flow uses a single multimodal model to process audio input and generate audio output directly, bypassing the ASR -> LLM -> TTS chain. This provides lower latency and more natural conversational behavior.

        ## Enabling MLLM Mode

        Call `WithMllm(vendor)` to enable MLLM mode. The builder sets `mllm.enable = true` automatically.

        ```go
        agent := agentkit.NewAgent(
            agentkit.WithName("realtime-agent"),
        ).WithMllm(vendor)
        ```

        ## OpenAI Realtime Example

        ```go
        package main

        import (
            "context"
            "fmt"
            "log"

            Agora "github.com/AgoraIO/agora-agents-go"
            "github.com/AgoraIO/agora-agents-go/agentkit"
            "github.com/AgoraIO/agora-agents-go/agentkit/vendors"
            "github.com/AgoraIO/agora-agents-go/option"
        )

        func main() {
            client := agentkit.NewAgoraClient(agentkit.AgoraClientOptions{
                Area:           option.AreaUS,
                AppID:          "<app_id>",
                AppCertificate: "<app_cert>",
            })

            agent := agentkit.NewAgent(
                agentkit.WithName("openai-realtime"),
            ).WithMllm(
                vendors.NewOpenAIRealtime(vendors.OpenAIRealtimeOptions{
                    APIKey: "<openai_key>",
                    Model:  "gpt-4o-realtime-preview",
                    Params: map[string]interface{}{
                        "voice": "alloy",
                    },
                }),
            )

            session := agent.CreateSession(client, agentkit.CreateSessionOptions{
                Channel:    "realtime-channel",
                AgentUID:   "1001",
                RemoteUIDs: []string{"1002"},
            })

            ctx := context.Background()

            agentID, err := session.Start(ctx)
            if err != nil {
                log.Fatalf("Failed to start: %v", err)
            }
            fmt.Println("Realtime agent running:", agentID)

            err = session.Stop(ctx)
            if err != nil {
                log.Fatalf("Failed to stop: %v", err)
            }
        }
        ```

        ## Gemini Live Example

        ```go
        agent := agentkit.NewAgent(
            agentkit.WithName("gemini-live"),
        ).WithMllm(
            vendors.NewGeminiLive(vendors.GeminiLiveOptions{
                APIKey:       "<google_ai_api_key>",
                Model:        "gemini-live-2.5-flash",
                Instructions: "You are a helpful assistant.",
                Voice:        "Puck",
            }),
        )
        ```

        ## MLLM with Turn Detection

        Configure MLLM turn detection on the MLLM vendor with `TurnDetection`. When set, `mllm.turn_detection` overrides the top-level `turn_detection` object.

        Example:

        ```go
        agent := agentkit.NewAgent(
            agentkit.WithName("realtime-vad"),
        ).WithMllm(
            vendors.NewOpenAIRealtime(vendors.OpenAIRealtimeOptions{
                APIKey: "<openai_key>",
                TurnDetection: &Agora.StartAgentsRequestPropertiesMllmTurnDetection{
                    Mode: Agora.StartAgentsRequestPropertiesMllmTurnDetectionModeServerVad.Ptr(),
                    ServerVadConfig: &Agora.StartAgentsRequestPropertiesMllmTurnDetectionServerVadConfig{
                        IdleTimeoutMs: Agora.Int(5000),
                    },
                },
            }),
        )
        ```

        ## Low-Level Usage

        Use AgentKit for MLLM session starts. It keeps the app-credentials flow intact and generates the required REST and RTC tokens from `AppID` and `AppCertificate`. See [Low-Level API](./low-level-api.md) for generated REST operations outside the realtime session lifecycle.

        ## Pointer Helper Functions

        MLLM configuration makes heavy use of pointer helpers for optional fields:

        | Helper | Type | Example |
        |---|---|---|
        | `Agora.Bool(true)` | `*bool` | `Enable: Agora.Bool(true)` |
        | `Agora.String("...")` | `*string` | `APIKey: Agora.String("<key>")` |
        | `Agora.Int(120)` | `*int` | `IdleTimeout: Agora.Int(120)` |
        | `Agora.Float64(0.5)` | `*float64` | `Threshold: Agora.Float64(0.5)` |

        These exist because Go does not allow taking the address of a literal value (`&true` is invalid). The helpers return pointers to the given values.

        ## Key Differences from Cascading Flow

        | Aspect | Cascading | MLLM |
        |---|---|---|
        | Vendors required | LLM + TTS (STT optional) | MLLM only |
        | Audio processing | Three-step chain | Single model, end-to-end |
        | Latency | Higher (3 network hops) | Lower (1 network hop) |
        | `mllm.enable` | Not set or `false` | Must be `Agora.Bool(true)` |
