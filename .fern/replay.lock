        type CreateSessionOptions struct {
        	Name            string
        	Channel         string
        	Token           string
        	AgentUID        string
        	RemoteUIDs      []string
        	IdleTimeout     *int
        	EnableStringUID *bool
        	ExpiresIn       int
        	Preset          []string
        	PipelineID      string
        	Debug           bool
        	Warn            func(string)
        }

        func (a *Agent) CreateSession(client *AgoraClient, opts CreateSessionOptions) *AgentSession {
        	name := opts.Name
        	if name == "" {
        		if a.name != "" {
        			name = a.name
        		} else {
        			name = fmt.Sprintf("agent-%d", time.Now().UnixMilli())
        		}
        	}

        	return NewAgentSession(AgentSessionOptions{
        		Client:                   client.Agents,
        		AgentManagementClient:    client.AgentManagement,
        		Agent:                    a,
        		AppID:                    client.AppID,
        		AppCertificate:           client.AppCertificate,
        		Name:                     name,
        		Channel:                  opts.Channel,
        		Token:                    opts.Token,
        		AgentUID:                 opts.AgentUID,
        		RemoteUIDs:               opts.RemoteUIDs,
        		IdleTimeout:              opts.IdleTimeout,
        		EnableStringUID:          opts.EnableStringUID,
        		ExpiresIn:                opts.ExpiresIn,
        		UseAppCredentialsForREST: client.AuthMode == AuthModeAppCredentials,
        		Preset:                   opts.Preset,
        		PipelineID:               opts.PipelineID,
        		Debug:                    opts.Debug,
        		Warn:                     opts.Warn,
        	})
        }

        func (a *Agent) ToProperties(opts ToPropertiesOptions) (*Agora.StartAgentsRequestProperties, error) {
        	propsMap, err := a.ToPropertiesMap(opts)
        	if err != nil {
        		return nil, err
        	}
        	var props Agora.StartAgentsRequestProperties
        	if err := mapToStruct(propsMap, &props); err != nil {
        		return nil, fmt.Errorf("failed to convert properties map: %w", err)
        	}
        	return &props, nil
        }

        func (a *Agent) ToPropertiesMap(opts ToPropertiesOptions) (map[string]interface{}, error) {
        	// Reject incompatible combinations before any work (token generation, etc.).
        	// Avatars are currently supported only with the cascading ASR/LLM/TTS pipeline.
        	if a.mllm != nil && a.hasEnabledAvatar() {
        		return nil, fmt.Errorf("avatar is only supported with cascading ASR/LLM/TTS sessions; remove the avatar configuration when using MLLM")
        	}

        	expiry := opts.ExpiresIn
        	if expiry != 0 {
        		var err error
        		expiry, err = ValidateExpiresIn(expiry)
        		if err != nil {
        			return nil, fmt.Errorf("invalid expiresIn: %w", err)
        		}
        	}
        	opts.ExpiresIn = expiry

        	token := opts.Token
        	if token == "" {
        		if opts.AppID == "" || opts.AppCertificate == "" {
        			return nil, fmt.Errorf("either token or app_id+app_certificate must be provided")
        		}
        		uid, err := parseNumericUID(opts.AgentUID, "agent UID")
        		if err != nil {
        			return nil, err
        		}
        		token, err = GenerateConvoAIToken(GenerateConvoAITokenOptions{
        			AppID:          opts.AppID,
        			AppCertificate: opts.AppCertificate,
        			ChannelName:    opts.Channel,
        			UID:            uid,
        			TokenExpire:    expiry,
        		})
        		if err != nil {
        			return nil, fmt.Errorf("failed to generate token: %w", err)
        		}
        	}

        	propsMap := map[string]interface{}{
        		"channel":       opts.Channel,
        		"token":         token,
        		"agent_rtc_uid": opts.AgentUID,
        	}
        	if opts.RemoteUIDs != nil {
        		propsMap["remote_rtc_uids"] = opts.RemoteUIDs
        	}
        	if opts.IdleTimeout != nil {
        		propsMap["idle_timeout"] = *opts.IdleTimeout
        	}
        	if opts.EnableStringUID != nil {
        		propsMap["enable_string_uid"] = *opts.EnableStringUID
        	}
        	if a.mllm != nil {
        		propsMap["mllm"] = a.buildMllmConfigMap()
        	}
        	if a.interruption != nil {
        		if err := setStructMap(propsMap, "interruption", a.interruption); err != nil {
        			return nil, err
        		}
        	}
        	if a.sal != nil {
        		if err := setStructMap(propsMap, "sal", a.sal); err != nil {
        			return nil, err
        		}
        	}
        	if a.avatar != nil {
        		avatar, err := a.enrichAvatarParams(opts)
        		if err != nil {
        			return nil, err
        		}
        		propsMap["avatar"] = avatar
        	}
        	if a.advancedFeatures != nil {
        		if err := setStructMap(propsMap, "advanced_features", a.advancedFeatures); err != nil {
        			return nil, err
        		}
        	}
        	if a.parameters != nil {
        		if err := setStructMap(propsMap, "parameters", a.parameters); err != nil {
        			return nil, err
        		}
        	}
        	if a.audioScenario != nil {
        		parameters, ok := propsMap["parameters"].(map[string]interface{})
        		if !ok || parameters == nil {
        			parameters = map[string]interface{}{}
        			propsMap["parameters"] = parameters
        		}
        		parameters["audio_scenario"] = string(*a.audioScenario)
        	}
        	if a.geofence != nil {
        		if err := setStructMap(propsMap, "geofence", a.geofence); err != nil {
        			return nil, err
        		}
        	}
        	if len(a.labels) > 0 {
        		propsMap["labels"] = cloneValue(a.labels)
        	}
        	if a.rtc != nil {
        		if err := setStructMap(propsMap, "rtc", a.rtc); err != nil {
        			return nil, err
        		}
        	}
        	if a.fillerWords != nil {
        		if err := setStructMap(propsMap, "filler_words", a.fillerWords); err != nil {
        			return nil, err
        		}
        	}

        	if a.advancedFeatures != nil && a.advancedFeatures.EnableRtm != nil && *a.advancedFeatures.EnableRtm {
        		parameters, ok := propsMap["parameters"].(map[string]interface{})
        		if !ok || parameters == nil {
        			parameters = map[string]interface{}{}
        			propsMap["parameters"] = parameters
        		}
        		if _, exists := parameters["data_channel"]; !exists {
        			parameters["data_channel"] = "rtm"
        		}
        	}

        	if a.mllm != nil {
        		if a.turnDetection != nil {
        			if err := setStructMap(propsMap, "turn_detection", a.turnDetection); err != nil {
        				return nil, err
        			}
        		}
        		return propsMap, nil
        	}

        	propsMap["asr"] = a.resolveAsrConfig()
        	turnDetection, err := a.resolveTurnDetectionConfig()
        	if err != nil {
        		return nil, err
        	}
        	propsMap["turn_detection"] = turnDetection

        	if !opts.SkipVendorValidation {
        		if a.tts == nil {
        			return nil, fmt.Errorf("TTS configuration is required; use WithTts() to set it")
        		}
        		if a.llm == nil {
        			return nil, fmt.Errorf("LLM configuration is required; use WithLlm() to set it")
        		}
        	}

        	if a.llm != nil {
        		propsMap["llm"] = a.buildLlmConfigMap()
        	}
        	if a.tts != nil {
        		propsMap["tts"] = cloneConfig(a.tts)
        	}

        	return propsMap, nil
        }

        func (a *Agent) resolveAsrConfig() map[string]interface{} {
        	asrConfig := cloneConfig(a.stt)
        	if asrConfig == nil {
        		asrConfig = map[string]interface{}{"vendor": "ares"}
        	}
        	delete(asrConfig, "language")
        	if len(asrConfig) == 0 {
        		asrConfig["vendor"] = "ares"
        	}
        	return asrConfig
        }

        func (a *Agent) resolveTurnDetectionConfig() (map[string]interface{}, error) {
        	turnDetection := map[string]interface{}{}
        	if a.turnDetection != nil {
        		var err error
        		turnDetection, err = structToMap(a.turnDetection)
        		if err != nil {
        			return nil, fmt.Errorf("failed to serialize turn detection config: %w", err)
        		}
        	}

        	language := ""
        	if existing, ok := turnDetection["language"].(string); ok && existing != "" {
        		language = existing
        	}
        	if language == "" {
        		if existing, ok := a.stt["language"].(string); ok && isTurnDetectionLanguage(existing) {
        			language = existing
        		} else {
        			language = string(defaultTurnDetectionLanguage)
        		}
        	}
        	validateTurnDetectionLanguage(language)
        	turnDetection["language"] = language
        	return turnDetection, nil
        }

        func (a *Agent) buildMllmConfigMap() map[string]interface{} {
        	mllmConfig := cloneConfig(a.mllm)
        	if a.greeting != "" {
        		if _, exists := mllmConfig["greeting_message"]; !exists {
        			mllmConfig["greeting_message"] = a.greeting
        		}
        	}
        	if a.failureMessage != "" {
        		if _, exists := mllmConfig["failure_message"]; !exists {
        			mllmConfig["failure_message"] = a.failureMessage
        		}
        	}
        	return mllmConfig
        }

        func (a *Agent) buildLlmConfigMap() map[string]interface{} {
        	llmConfig := cloneConfig(a.llm)
        	if a.instructions != "" {
        		llmConfig["system_messages"] = []map[string]interface{}{
        			{"role": "system", "content": a.instructions},
        		}
        	}
        	if a.greeting != "" {
        		llmConfig["greeting_message"] = a.greeting
        	}
        	if a.failureMessage != "" {
        		llmConfig["failure_message"] = a.failureMessage
        	}
        	if a.maxHistory != nil {
        		llmConfig["max_history"] = *a.maxHistory
        	}
        	if a.greetingConfigs != nil {
        		if value, err := structToMap(a.greetingConfigs); err == nil {
        			llmConfig["greeting_configs"] = value
        		} else {
        			llmConfig["greeting_configs"] = a.greetingConfigs
        		}
        	}
        	return llmConfig
        }

        func setStructMap(target map[string]interface{}, key string, value interface{}) error {
        	valueMap, err := structToMap(value)
        	if err != nil {
        		return fmt.Errorf("failed to convert %s config to map: %w", key, err)
        	}
        	target[key] = valueMap
        	return nil
        }

        func (a *Agent) enrichAvatarParams(opts ToPropertiesOptions) (map[string]interface{}, error) {
        	avatar := cloneConfig(a.avatar)
        	if !avatarConfigEnabled(avatar) {
        		return avatar, nil
        	}
        	vendor, _ := avatar["vendor"].(string)
        	params, _ := avatar["params"].(map[string]interface{})
        	if params == nil {
        		params = map[string]interface{}{}
        		avatar["params"] = params
        	}

        	if IsGenericAvatar(vendor) {
        		if _, exists := params["agora_appid"]; !exists && opts.AppID != "" {
        			params["agora_appid"] = opts.AppID
        		}
        		if _, exists := params["agora_channel"]; !exists && opts.Channel != "" {
        			params["agora_channel"] = opts.Channel
        		}
        	}

        	avatarUID := avatarUIDString(params["agora_uid"])
        	if IsAvatarTokenManaged(vendor) && avatarUID != "" {
        		if avatarUID == opts.AgentUID && opts.Warn != nil {
        			opts.Warn("avatar agora_uid matches agent_rtc_uid; use a distinct UID so the avatar video stream does not collide with the voice agent")
        		}
        		if token, _ := params["agora_token"].(string); token == "" {
        			if opts.AppCertificate == "" {
        				return nil, fmt.Errorf("cannot auto-generate avatar agora_token: appCertificate is required; pass AppCertificate when creating AgoraClient, or set AgoraToken on the avatar vendor")
        			}
        			uid, err := parseNumericUID(avatarUID, "avatar agora_uid")
        			if err != nil {
        				return nil, err
        			}
        			generated, err := GenerateConvoAIToken(GenerateConvoAITokenOptions{
        				AppID:          opts.AppID,
        				AppCertificate: opts.AppCertificate,
        				ChannelName:    opts.Channel,
        				UID:            uid,
        				TokenExpire:    opts.ExpiresIn,
        			})
        			if err != nil {
        				return nil, err
        			}
        			params["agora_token"] = generated
        		}
        	}

        	return avatar, nil
        }

        func IsAvatarTokenManaged(vendor string) bool {
        	return IsHeyGenAvatar(vendor) || IsLiveAvatarAvatar(vendor) || IsGenericAvatar(vendor)
        }

        func IsAvatarTokenManagedFromConfig(avatar map[string]interface{}) bool {
        	vendor, _ := avatar["vendor"].(string)
        	return IsAvatarTokenManaged(vendor)
        }

        func avatarConfigEnabled(avatar map[string]interface{}) bool {
        	if avatar == nil {
        		return false
        	}
        	enabled, ok := avatar["enable"].(bool)
        	return !ok || enabled
        }

        func (a *Agent) hasEnabledAvatar() bool {
        	return a != nil && a.avatar != nil && avatarConfigEnabled(a.avatar)
        }

        func avatarUIDString(value interface{}) string {
        	switch v := value.(type) {
        	case string:
        		return v
        	case int:
        		return fmt.Sprint(v)
        	case int8:
        		return fmt.Sprint(v)
        	case int16:
        		return fmt.Sprint(v)
        	case int32:
        		return fmt.Sprint(v)
        	case int64:
        		return fmt.Sprint(v)
        	case uint:
        		return fmt.Sprint(v)
        	case uint8:
        		return fmt.Sprint(v)
        	case uint16:
        		return fmt.Sprint(v)
        	case uint32:
        		return fmt.Sprint(v)
        	case uint64:
        		return fmt.Sprint(v)
        	case float32:
        		return fmt.Sprint(v)
        	case float64:
        		return fmt.Sprint(v)
        	default:
        		return ""
        	}
        }

        func parseNumericUID(uid string, label string) (int, error) {
        	value, err := strconv.Atoi(uid)
        	if err != nil {
        		return 0, fmt.Errorf("%s must be a numeric RTC UID when auto-generating a ConvoAI token", label)
        	}
        	return value, nil
        }

        type ToPropertiesOptions struct {
        	Channel        string
        	AgentUID       string
        	RemoteUIDs     []string
        	Token          string
        	AppID          string
        	AppCertificate string
        	// ExpiresIn is the token lifetime in seconds (default: 86400 = 24 hours, Agora maximum).
        	// Valid range: 1–86400. Use ExpiresInHours() / ExpiresInMinutes() for clarity.
        	ExpiresIn            int
        	IdleTimeout          *int
        	EnableStringUID      *bool
        	SkipVendorValidation bool
        	Warn                 func(string)
        }

        func (a *Agent) clone() *Agent {
        	clone := *a
        	if a.labels != nil {
        		clone.labels = make(map[string]string, len(a.labels))
        		for k, v := range a.labels {
        			clone.labels[k] = v
        		}
        	}
        	return &clone
        }
      agentkit/agent_session.go: |
        package agentkit

        import (
        	"context"
        	"encoding/json"
        	"errors"
        	"fmt"
        	"log"
        	"net/http"
        	"reflect"
        	"sync"
        	"time"

        	Agora "github.com/AgoraIO/agora-agents-go/v2"
        	"github.com/AgoraIO/agora-agents-go/v2/agentmanagement"
        	"github.com/AgoraIO/agora-agents-go/v2/agents"
        	"github.com/AgoraIO/agora-agents-go/v2/core"
        	"github.com/AgoraIO/agora-agents-go/v2/option"
        )

        // AgentSessionLifecycle is the local client lifecycle state for AgentSession.
        type AgentSessionLifecycle string

        const (
        	AgentSessionLifecycleIdle     AgentSessionLifecycle = "idle"
        	AgentSessionLifecycleStarting AgentSessionLifecycle = "starting"
        	AgentSessionLifecycleRunning  AgentSessionLifecycle = "running"
        	AgentSessionLifecycleStopping AgentSessionLifecycle = "stopping"
        	AgentSessionLifecycleStopped  AgentSessionLifecycle = "stopped"
        	AgentSessionLifecycleError    AgentSessionLifecycle = "error"
        )

        const (
        	// Deprecated: Use AgentSessionLifecycleIdle.
        	StatusIdle = AgentSessionLifecycleIdle
        	// Deprecated: Use AgentSessionLifecycleStarting.
        	StatusStarting = AgentSessionLifecycleStarting
        	// Deprecated: Use AgentSessionLifecycleRunning.
        	StatusRunning = AgentSessionLifecycleRunning
        	// Deprecated: Use AgentSessionLifecycleStopping.
        	StatusStopping = AgentSessionLifecycleStopping
        	// Deprecated: Use AgentSessionLifecycleStopped.
        	StatusStopped = AgentSessionLifecycleStopped
        	// Deprecated: Use AgentSessionLifecycleError.
        	StatusError = AgentSessionLifecycleError
        )

        type EventHandler func(data interface{})

        type AgentSession struct {
        	client          *agents.Client
        	agentManagement *agentmanagement.Client
        	agent           *Agent
        	appID           string
        	appCertificate  string
        	name            string
        	channel         string
        	token           string
        	agentUID        string
        	remoteUIDs      []string
        	idleTimeout     *int
        	enableStringUID *bool
        	expiresIn       int  // Token lifetime in seconds (0 = use DefaultExpirySeconds)
        	useAppCredsREST bool // When true, generate ConvoAI token per request for REST API auth
        	preset          []string
        	pipelineID      string
        	debug           bool
        	warn            func(string)

        	agentID  string
        	status   AgentSessionLifecycle
        	mu       sync.RWMutex
        	handlers map[string][]EventHandler
        }

        type AgentSessionOptions struct {
        	Client                *agents.Client
        	AgentManagementClient *agentmanagement.Client
        	Agent                 *Agent
        	AppID                 string
        	AppCertificate        string
        	Name                  string
        	Channel               string
        	Token                 string
        	AgentUID              string
        	RemoteUIDs            []string
        	IdleTimeout           *int
        	EnableStringUID       *bool
        	// ExpiresIn is the token lifetime in seconds (default: 86400 = 24 hours, Agora maximum).
        	// Only applies when the SDK auto-generates a token. Valid range: 1–86400.
        	// Use ExpiresInHours() / ExpiresInMinutes() for clarity.
        	ExpiresIn int
        	// UseAppCredentialsForREST when true, generates a ConvoAI token per request for REST API
        	// authentication. Use when the client was created without Basic Auth or token (app-credentials mode).
        	UseAppCredentialsForREST bool
        	Preset                   []string
        	PipelineID               string
        	Debug                    bool
        	Warn                     func(string)
        }

        func NewAgentSession(opts AgentSessionOptions) *AgentSession {
        	name := opts.Name
        	if name == "" {
        		name = fmt.Sprintf("agent-%d", time.Now().UnixMilli())
        	}

        	return &AgentSession{
        		client:          opts.Client,
        		agentManagement: opts.AgentManagementClient,
        		agent:           opts.Agent,
        		appID:           opts.AppID,
        		appCertificate:  opts.AppCertificate,
        		name:            name,
        		channel:         opts.Channel,
        		token:           opts.Token,
        		agentUID:        opts.AgentUID,
        		remoteUIDs:      opts.RemoteUIDs,
        		idleTimeout:     opts.IdleTimeout,
        		enableStringUID: opts.EnableStringUID,
        		expiresIn:       opts.ExpiresIn,
        		useAppCredsREST: opts.UseAppCredentialsForREST,
        		preset:          append([]string(nil), opts.Preset...),
        		pipelineID:      opts.PipelineID,
        		debug:           opts.Debug,
        		warn:            opts.Warn,
        		status:          StatusIdle,
        		handlers:        make(map[string][]EventHandler),
        	}
        }

        // convoAIRequestOpts returns per-request options with ConvoAI token when using app credentials.
        func (s *AgentSession) convoAIRequestOpts(ctx context.Context) ([]option.RequestOption, error) {
        	if !s.useAppCredsREST {
        		return nil, nil
        	}
        	if s.appCertificate == "" {
        		return nil, fmt.Errorf("appCertificate is required for app-credentials auth mode; pass AppCertificate when creating AgoraClient")
        	}
        	uid, err := parseNumericUID(s.agentUID, "agent UID")
        	if err != nil {
        		return nil, err
        	}
        	token, err := GenerateConvoAIToken(GenerateConvoAITokenOptions{
        		AppID:          s.appID,
        		AppCertificate: s.appCertificate,
        		ChannelName:    s.channel,
        		UID:            uid,
        	})
        	if err != nil {
        		return nil, fmt.Errorf("failed to generate ConvoAI token for app-credentials auth mode: %w", err)
        	}
        	h := make(http.Header)
        	h.Set("Authorization", "agora token="+token)
        	return []option.RequestOption{option.WithHTTPHeader(h)}, nil
        }

        func (s *AgentSession) ID() string {
        	s.mu.RLock()
        	defer s.mu.RUnlock()
        	return s.agentID
        }

        func (s *AgentSession) Status() AgentSessionLifecycle {
        	s.mu.RLock()
        	defer s.mu.RUnlock()
        	return s.status
        }

        func (s *AgentSession) Agent() *Agent {
        	return s.agent
        }

        func (s *AgentSession) AppID() string {
        	return s.appID
        }

        func (s *AgentSession) Raw() *agents.Client {
        	return s.client
        }

        func (s *AgentSession) RawAgentManagement() *agentmanagement.Client {
        	return s.agentManagement
        }

        func (s *AgentSession) warnf(message string) {
        	if s.warn != nil {
        		s.warn(message)
        		return
        	}
        	log.Printf("agentkit: %s", message)
        }

        func (s *AgentSession) validateAvatarConfig() error {
        	if s.agent == nil || s.agent.avatar == nil {
        		return nil
        	}
        	if !avatarConfigEnabled(s.agent.avatar) {
        		return nil
        	}

        	vendor, _ := s.agent.avatar["vendor"].(string)
        	if vendor == "" {
        		return nil
        	}
        	params, _ := s.agent.avatar["params"].(map[string]interface{})
        	if err := ValidateAvatarConfig(vendor, params); err != nil {
        		return err
        	}

        	if s.agent.ttsSampleRate != nil {
        		if err := ValidateTtsSampleRate(vendor, int(*s.agent.ttsSampleRate)); err != nil {
        			return err
        		}
        		return nil
        	}

        	switch vendor {
        	case "heygen":
        		s.warnf("Warning: HeyGen avatar detected but TTS sample_rate is not explicitly set. HeyGen requires 24,000 Hz. Please ensure your TTS provider is configured for 24kHz.")
        	case "liveavatar":
        		s.warnf("Warning: LiveAvatar avatar detected but TTS sample_rate is not explicitly set. LiveAvatar requires 24,000 Hz. Please ensure your TTS provider is configured for 24kHz.")
        	case "akool":
        		s.warnf("Warning: Akool avatar detected but TTS sample_rate is not explicitly set. Akool requires 16,000 Hz. Please ensure your TTS provider is configured for 16kHz.")
        	}
        	return nil
        }

        func (s *AgentSession) Start(ctx context.Context) (string, error) {
        	s.mu.Lock()
        	if s.status != StatusIdle && s.status != StatusStopped && s.status != StatusError {
        		s.mu.Unlock()
        		return "", fmt.Errorf("cannot start session in %s state", s.status)
        	}
        	if s.agent != nil && s.agent.mllm != nil && s.agent.hasEnabledAvatar() {
        		s.mu.Unlock()
        		return "", fmt.Errorf("avatar is only supported with cascading ASR/LLM/TTS sessions; remove the avatar configuration when using MLLM")
        	}

        	if s.agent.avatar != nil && avatarConfigEnabled(s.agent.avatar) && s.agent.avatarRequiredSampleRate != nil && *s.agent.avatarRequiredSampleRate != 0 && s.agent.ttsSampleRate != nil {
        		if *s.agent.ttsSampleRate != *s.agent.avatarRequiredSampleRate {
        			s.mu.Unlock()
        			return "", fmt.Errorf(
        				"avatar requires TTS sample rate of %d Hz, but TTS is configured with %d Hz",
        				int(*s.agent.avatarRequiredSampleRate), int(*s.agent.ttsSampleRate),
        			)
        		}
        	}
        	if err := s.validateAvatarConfig(); err != nil {
        		s.mu.Unlock()
        		return "", err
        	}

        	s.status = StatusStarting
        	s.mu.Unlock()

        	pipelineID := s.pipelineID
        	if pipelineID == "" {
        		pipelineID = s.agent.PipelineID()
        	}

        	propOpts := ToPropertiesOptions{
        		Channel:              s.channel,
        		AgentUID:             s.agentUID,
        		RemoteUIDs:           s.remoteUIDs,
        		Token:                s.token,
        		AppID:                s.appID,
        		AppCertificate:       s.appCertificate,
        		ExpiresIn:            s.expiresIn,
        		IdleTimeout:          s.idleTimeout,
        		EnableStringUID:      s.enableStringUID,
        		SkipVendorValidation: len(s.preset) > 0 || pipelineID != "",
        		Warn:                 s.warnf,
        	}

        	properties, err := s.agent.ToPropertiesMap(propOpts)
        	if err != nil {
        		s.mu.Lock()
        		s.status = StatusError
        		s.mu.Unlock()
        		s.emit("error", err)
        		return "", err
        	}

        	resolvedPreset, resolvedProperties, err := ResolveSessionPresetsMap(s.preset, properties)
        	if err != nil {
        		s.mu.Lock()
        		s.status = StatusError
        		s.mu.Unlock()
        		s.emit("error", err)
        		return "", err
        	}
        	if err := validateEnrichedAvatarConfig(resolvedProperties); err != nil {
        		s.mu.Lock()
        		s.status = StatusError
        		s.mu.Unlock()
        		s.emit("error", err)
        		return "", err
        	}

        	if s.debug {
        		debugPayload := map[string]interface{}{
        			"name":       s.name,
        			"properties": resolvedProperties,
        		}
        		if resolvedPreset != "" {
        			debugPayload["preset"] = resolvedPreset
        		}
        		if pipelineID != "" {
        			debugPayload["pipeline_id"] = pipelineID
        		}
        		if payload, err := json.Marshal(debugPayload); err == nil {
        			log.Printf("[Agora Debug] Starting agent session: %s", payload)
        		} else {
        			s.warnf(fmt.Sprintf("debug logging failed to marshal start request: %v", err))
        		}
        	}

        	reqOpts, err := s.convoAIRequestOpts(ctx)
        	if err != nil {
        		s.mu.Lock()
        		s.status = StatusError
        		s.mu.Unlock()
        		s.emit("error", err)
        		return "", err
        	}
        	resp, err := startAgentsWithMapBody(ctx, s.client, s.appID, s.name, resolvedPreset, pipelineID, resolvedProperties, reqOpts...)
        	if err != nil {
        		s.mu.Lock()
        		s.status = StatusError
        		s.mu.Unlock()
        		s.emit("error", err)
        		return "", err
        	}

        	s.mu.Lock()
        	if resp != nil && resp.AgentID != nil {
        		s.agentID = *resp.AgentID
        	}
        	s.status = StatusRunning
        	s.mu.Unlock()

        	s.emit("started", map[string]string{"agent_id": s.agentID})
        	return s.agentID, nil
        }

        func validateEnrichedAvatarConfig(properties map[string]interface{}) error {
        	if properties == nil {
        		return nil
        	}
        	avatar := asMap(properties["avatar"])
        	if len(avatar) == 0 || !avatarConfigEnabled(avatar) {
        		return nil
        	}
        	vendor, _ := avatar["vendor"].(string)
        	params := asMap(avatar["params"])
        	if err := ValidateAvatarConfig(vendor, params); err != nil {
        		return err
        	}
        	if IsGenericAvatar(vendor) {
        		if !hasNonEmptyString(params, "agora_appid") {
        			return fmt.Errorf("Generic avatar requires agora_appid")
        		}
        		if !hasNonEmptyString(params, "agora_channel") {
        			return fmt.Errorf("Generic avatar requires agora_channel")
        		}
        		if !hasNonEmptyString(params, "agora_token") {
        			return fmt.Errorf("Generic avatar requires agora_token")
        		}
        		return nil
        	}
        	if IsAvatarTokenManaged(vendor) && avatarUIDString(params["agora_uid"]) != "" && !hasNonEmptyString(params, "agora_token") {
        		return fmt.Errorf("%s avatar requires agora_token; pass AgoraToken on the avatar vendor or provide AppCertificate for automatic token generation", vendor)
        	}
        	return nil
        }

        func (s *AgentSession) Stop(ctx context.Context) error {
        	s.mu.Lock()
        	if s.status != StatusRunning {
        		s.mu.Unlock()
        		return fmt.Errorf("cannot stop session in %s state", s.status)
        	}
        	if s.agentID == "" {
        		s.mu.Unlock()
        		return fmt.Errorf("no agent ID available")
        	}
        	s.status = StatusStopping
        	s.mu.Unlock()

        	reqOpts, err := s.convoAIRequestOpts(ctx)
        	if err != nil {
        		s.mu.Lock()
        		s.status = StatusError
        		s.mu.Unlock()
        		s.emit("error", err)
        		return err
        	}
        	err = s.client.Stop(ctx, &Agora.StopAgentsRequest{
        		Appid:   s.appID,
        		AgentID: s.agentID,
        	}, reqOpts...)
        	if err != nil {
        		// Handle 404 "task not found" gracefully — agent is already stopped
        		var apiErr *core.APIError
        		if errors.As(err, &apiErr) && apiErr.StatusCode == http.StatusNotFound {
        			s.mu.Lock()
        			s.status = StatusStopped
        			s.mu.Unlock()
        			s.emit("stopped", map[string]string{"agent_id": s.agentID})
        			return nil
        		}
        		s.mu.Lock()
        		s.status = StatusError
        		s.mu.Unlock()
        		s.emit("error", err)
        		return err
        	}

        	s.mu.Lock()
        	s.status = StatusStopped
        	s.mu.Unlock()
        	s.emit("stopped", map[string]string{"agent_id": s.agentID})
        	return nil
        }

