        				Rate:       ptrFloat(0),
        				Pitch:      ptrFloat(0),
        				Model:      "FALCON",
        				SampleRate: ptrInt(24000),
        			}).ToConfig()["params"].(map[string]interface{}),
        			want: map[string]interface{}{
        				"api_key":     "murf-key",
        				"base_url":    "wss://murf.example/ws",
        				"voiceId":     "Ariana",
        				"locale":      "en-US",
        				"rate":        float64(0),
        				"pitch":       float64(0),
        				"model":       "FALCON",
        				"sample_rate": 24000,
        			},
