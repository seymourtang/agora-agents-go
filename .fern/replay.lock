        type CreateSessionOptions struct {
        	Name            string
        	Channel         string
        	Token           string
        	AgentUID        string
        	RemoteUIDs      []string
        	IdleTimeout     *int
        	EnableStringUID *bool
        	ExpiresIn       int
        	Preset          []string
        	PipelineID      string
        	Debug           bool
        	Warn            func(string)
        }

        func (a *Agent) CreateSession(client *AgoraClient, opts CreateSessionOptions) *AgentSession {
        	name := opts.Name
        	if name == "" {
        		if a.name != "" {
        			name = a.name
        		} else {
        			name = fmt.Sprintf("agent-%d", time.Now().UnixMilli())
        		}
        	}

        	return NewAgentSession(AgentSessionOptions{
        		Client:                   client.Agents,
        		AgentManagementClient:    client.AgentManagement,
        		Agent:                    a,
        		AppID:                    client.AppID,
        		AppCertificate:           client.AppCertificate,
        		Name:                     name,
        		Channel:                  opts.Channel,
        		Token:                    opts.Token,
        		AgentUID:                 opts.AgentUID,
        		RemoteUIDs:               opts.RemoteUIDs,
        		IdleTimeout:              opts.IdleTimeout,
        		EnableStringUID:          opts.EnableStringUID,
        		ExpiresIn:                opts.ExpiresIn,
        		UseAppCredentialsForREST: client.AuthMode == AuthModeAppCredentials,
        		Preset:                   opts.Preset,
        		PipelineID:               opts.PipelineID,
        		Debug:                    opts.Debug,
        		Warn:                     opts.Warn,
        	})
        }

        func (a *Agent) ToProperties(opts ToPropertiesOptions) (*Agora.StartAgentsRequestProperties, error) {
        	propsMap, err := a.ToPropertiesMap(opts)
        	if err != nil {
        		return nil, err
        	}
        	var props Agora.StartAgentsRequestProperties
        	if err := mapToStruct(propsMap, &props); err != nil {
        		return nil, fmt.Errorf("failed to convert properties map: %w", err)
        	}
        	return &props, nil
        }

        func (a *Agent) ToPropertiesMap(opts ToPropertiesOptions) (map[string]interface{}, error) {
        	// Reject incompatible combinations before any work (token generation, etc.).
        	// Avatars are currently supported only with the cascading ASR/LLM/TTS pipeline.
        	if a.mllm != nil && a.hasEnabledAvatar() {
        		return nil, fmt.Errorf("avatar is only supported with cascading ASR/LLM/TTS sessions; remove the avatar configuration when using MLLM")
        	}

        	expiry := opts.ExpiresIn
        	if expiry != 0 {
        		var err error
        		expiry, err = ValidateExpiresIn(expiry)
        		if err != nil {
        			return nil, fmt.Errorf("invalid expiresIn: %w", err)
        		}
        	}
        	opts.ExpiresIn = expiry

        	token := opts.Token
        	if token == "" {
        		if opts.AppID == "" || opts.AppCertificate == "" {
        			return nil, fmt.Errorf("either token or app_id+app_certificate must be provided")
        		}
        		var err error
        		token, err = GenerateConvoAIToken(GenerateConvoAITokenOptions{
        			AppID:          opts.AppID,
        			AppCertificate: opts.AppCertificate,
        			ChannelName:    opts.Channel,
        			Account:        opts.AgentUID,
        			TokenExpire:    expiry,
        		})
        		if err != nil {
        			return nil, fmt.Errorf("failed to generate token: %w", err)
        		}
        	}

        	propsMap := map[string]interface{}{
        		"channel":       opts.Channel,
        		"token":         token,
        		"agent_rtc_uid": opts.AgentUID,
        	}
        	if opts.RemoteUIDs != nil {
        		propsMap["remote_rtc_uids"] = opts.RemoteUIDs
        	}
        	if opts.IdleTimeout != nil {
        		propsMap["idle_timeout"] = *opts.IdleTimeout
        	}
        	if opts.EnableStringUID != nil {
        		propsMap["enable_string_uid"] = *opts.EnableStringUID
        	}
        	if a.mllm != nil {
        		propsMap["mllm"] = a.buildMllmConfigMap()
        	}
        	if a.turnDetection != nil {
        		if err := setStructMap(propsMap, "turn_detection", a.turnDetection); err != nil {
        			return nil, err
        		}
        	}
        	if a.interruption != nil {
        		if err := setStructMap(propsMap, "interruption", a.interruption); err != nil {
        			return nil, err
        		}
        	}
        	if a.sal != nil {
        		if err := setStructMap(propsMap, "sal", a.sal); err != nil {
        			return nil, err
        		}
        	}
        	if a.avatar != nil {
        		avatar, err := a.enrichAvatarParams(opts)
        		if err != nil {
        			return nil, err
        		}
        		propsMap["avatar"] = avatar
        	}
        	if a.advancedFeatures != nil {
        		if err := setStructMap(propsMap, "advanced_features", a.advancedFeatures); err != nil {
        			return nil, err
        		}
        	}
        	if a.parameters != nil {
        		if err := setStructMap(propsMap, "parameters", a.parameters); err != nil {
        			return nil, err
        		}
        	}
        	if a.audioScenario != nil {
        		parameters, ok := propsMap["parameters"].(map[string]interface{})
        		if !ok || parameters == nil {
        			parameters = map[string]interface{}{}
        			propsMap["parameters"] = parameters
        		}
        		parameters["audio_scenario"] = string(*a.audioScenario)
        	}
        	if a.geofence != nil {
        		if err := setStructMap(propsMap, "geofence", a.geofence); err != nil {
        			return nil, err
        		}
        	}
        	if len(a.labels) > 0 {
        		propsMap["labels"] = cloneValue(a.labels)
        	}
        	if a.rtc != nil {
        		if err := setStructMap(propsMap, "rtc", a.rtc); err != nil {
        			return nil, err
        		}
        	}
        	if a.fillerWords != nil {
        		if err := setStructMap(propsMap, "filler_words", a.fillerWords); err != nil {
        			return nil, err
        		}
        	}

        	if a.advancedFeatures != nil && a.advancedFeatures.EnableRtm != nil && *a.advancedFeatures.EnableRtm {
        		parameters, ok := propsMap["parameters"].(map[string]interface{})
        		if !ok || parameters == nil {
        			parameters = map[string]interface{}{}
        			propsMap["parameters"] = parameters
        		}
        		if _, exists := parameters["data_channel"]; !exists {
        			parameters["data_channel"] = "rtm"
        		}
        	}

        	if a.mllm != nil {
        		return propsMap, nil
        	}

        	if !opts.SkipVendorValidation {
        		if a.tts == nil {
        			return nil, fmt.Errorf("TTS configuration is required; use WithTts() to set it")
        		}
        		if a.llm == nil {
        			return nil, fmt.Errorf("LLM configuration is required; use WithLlm() to set it")
        		}
        	}

        	if a.llm != nil {
        		propsMap["llm"] = a.buildLlmConfigMap()
        	}
        	if a.tts != nil {
        		propsMap["tts"] = cloneConfig(a.tts)
        	}
        	if a.stt != nil {
        		propsMap["asr"] = cloneConfig(a.stt)
        	}

        	return propsMap, nil
        }

        func (a *Agent) buildMllmConfigMap() map[string]interface{} {
        	mllmConfig := cloneConfig(a.mllm)
        	if a.greeting != "" {
        		if _, exists := mllmConfig["greeting_message"]; !exists {
        			mllmConfig["greeting_message"] = a.greeting
        		}
        	}
        	if a.failureMessage != "" {
        		if _, exists := mllmConfig["failure_message"]; !exists {
        			mllmConfig["failure_message"] = a.failureMessage
        		}
        	}
        	return mllmConfig
        }

        func (a *Agent) buildLlmConfigMap() map[string]interface{} {
        	llmConfig := cloneConfig(a.llm)
        	if a.instructions != "" {
        		llmConfig["system_messages"] = []map[string]interface{}{
        			{"role": "system", "content": a.instructions},
        		}
        	}
        	if a.greeting != "" {
        		llmConfig["greeting_message"] = a.greeting
        	}
        	if a.failureMessage != "" {
        		llmConfig["failure_message"] = a.failureMessage
        	}
        	if a.maxHistory != nil {
        		llmConfig["max_history"] = *a.maxHistory
        	}
        	if a.greetingConfigs != nil {
        		if value, err := structToMap(a.greetingConfigs); err == nil {
        			llmConfig["greeting_configs"] = value
        		} else {
        			llmConfig["greeting_configs"] = a.greetingConfigs
        		}
        	}
        	return llmConfig
        }

        func setStructMap(target map[string]interface{}, key string, value interface{}) error {
        	valueMap, err := structToMap(value)
        	if err != nil {
        		return fmt.Errorf("failed to convert %s config to map: %w", key, err)
        	}
        	target[key] = valueMap
        	return nil
        }

        func (a *Agent) enrichAvatarParams(opts ToPropertiesOptions) (map[string]interface{}, error) {
        	avatar := cloneConfig(a.avatar)
        	if !avatarConfigEnabled(avatar) {
        		return avatar, nil
        	}
        	vendor, _ := avatar["vendor"].(string)
        	params, _ := avatar["params"].(map[string]interface{})
        	if params == nil {
        		params = map[string]interface{}{}
        		avatar["params"] = params
        	}

        	if IsGenericAvatar(vendor) {
        		if _, exists := params["agora_appid"]; !exists && opts.AppID != "" {
        			params["agora_appid"] = opts.AppID
        		}
        		if _, exists := params["agora_channel"]; !exists && opts.Channel != "" {
        			params["agora_channel"] = opts.Channel
        		}
        	}

        	avatarUID := avatarUIDString(params["agora_uid"])
        	if isAvatarTokenManaged(vendor) && avatarUID != "" {
        		if avatarUID == opts.AgentUID && opts.Warn != nil {
        			opts.Warn("avatar agora_uid matches agent_rtc_uid; use a distinct UID so the avatar video stream does not collide with the voice agent")
        		}
        		if token, _ := params["agora_token"].(string); token == "" {
        			if opts.AppCertificate == "" {
        				return nil, fmt.Errorf("cannot auto-generate avatar agora_token: appCertificate is required; pass AppCertificate when creating AgoraClient, or set AgoraToken on the avatar vendor")
        			}
        			generated, err := GenerateAvatarRtcToken(GenerateAvatarRtcTokenOptions{
        				AppID:          opts.AppID,
        				AppCertificate: opts.AppCertificate,
        				Channel:        opts.Channel,
        				UID:            avatarUID,
        				ExpirySeconds:  opts.ExpiresIn,
        			})
        			if err != nil {
        				return nil, err
        			}
        			params["agora_token"] = generated
        		}
        	}

        	return avatar, nil
        }

        func isAvatarTokenManaged(vendor string) bool {
        	return IsHeyGenAvatar(vendor) || IsLiveAvatarAvatar(vendor) || IsGenericAvatar(vendor)
        }

        func avatarConfigEnabled(avatar map[string]interface{}) bool {
        	if avatar == nil {
        		return false
        	}
        	enabled, ok := avatar["enable"].(bool)
        	return !ok || enabled
        }

        func (a *Agent) hasEnabledAvatar() bool {
        	return a != nil && a.avatar != nil && avatarConfigEnabled(a.avatar)
        }

        func avatarUIDString(value interface{}) string {
        	switch v := value.(type) {
        	case string:
        		return v
        	case int:
        		return fmt.Sprint(v)
        	case int8:
        		return fmt.Sprint(v)
        	case int16:
        		return fmt.Sprint(v)
        	case int32:
        		return fmt.Sprint(v)
        	case int64:
        		return fmt.Sprint(v)
        	case uint:
        		return fmt.Sprint(v)
        	case uint8:
        		return fmt.Sprint(v)
        	case uint16:
        		return fmt.Sprint(v)
        	case uint32:
        		return fmt.Sprint(v)
        	case uint64:
        		return fmt.Sprint(v)
        	case float32:
        		return fmt.Sprint(v)
        	case float64:
        		return fmt.Sprint(v)
        	default:
        		return ""
        	}
        }

        type ToPropertiesOptions struct {
        	Channel        string
        	AgentUID       string
        	RemoteUIDs     []string
        	Token          string
        	AppID          string
        	AppCertificate string
        	// ExpiresIn is the token lifetime in seconds (default: 86400 = 24 hours, Agora maximum).
        	// Valid range: 1–86400. Use ExpiresInHours() / ExpiresInMinutes() for clarity.
        	ExpiresIn            int
        	IdleTimeout          *int
        	EnableStringUID      *bool
        	SkipVendorValidation bool
        	Warn                 func(string)
        }

        func (a *Agent) clone() *Agent {
        	clone := *a
        	if a.labels != nil {
        		clone.labels = make(map[string]string, len(a.labels))
        		for k, v := range a.labels {
        			clone.labels[k] = v
        		}
        	}
        	return &clone
        }
      agentkit/agent_session.go: |
        package agentkit

        import (
        	"context"
        	"encoding/json"
        	"errors"
        	"fmt"
        	"log"
        	"net/http"
        	"reflect"
        	"sync"
        	"time"

        	Agora "github.com/AgoraIO-Conversational-AI/agent-server-sdk-go"
        	"github.com/AgoraIO-Conversational-AI/agent-server-sdk-go/agentmanagement"
        	"github.com/AgoraIO-Conversational-AI/agent-server-sdk-go/agents"
        	"github.com/AgoraIO-Conversational-AI/agent-server-sdk-go/core"
        	"github.com/AgoraIO-Conversational-AI/agent-server-sdk-go/option"
        )

        type SessionStatus string

        const (
        	StatusIdle     SessionStatus = "idle"
        	StatusStarting SessionStatus = "starting"
        	StatusRunning  SessionStatus = "running"
        	StatusStopping SessionStatus = "stopping"
        	StatusStopped  SessionStatus = "stopped"
        	StatusError    SessionStatus = "error"
        )

        type EventHandler func(data interface{})

        type AgentSession struct {
        	client          *agents.Client
        	agentManagement *agentmanagement.Client
        	agent           *Agent
        	appID           string
        	appCertificate  string
        	name            string
        	channel         string
        	token           string
        	agentUID        string
        	remoteUIDs      []string
        	idleTimeout     *int
        	enableStringUID *bool
        	expiresIn       int  // Token lifetime in seconds (0 = use DefaultExpirySeconds)
        	useAppCredsREST bool // When true, generate ConvoAI token per request for REST API auth
        	preset          []string
        	pipelineID      string
        	debug           bool
        	warn            func(string)

        	agentID  string
        	status   SessionStatus
        	mu       sync.RWMutex
        	handlers map[string][]EventHandler
        }

        type AgentSessionOptions struct {
        	Client                *agents.Client
        	AgentManagementClient *agentmanagement.Client
        	Agent                 *Agent
        	AppID                 string
        	AppCertificate        string
        	Name                  string
        	Channel               string
        	Token                 string
        	AgentUID              string
        	RemoteUIDs            []string
        	IdleTimeout           *int
        	EnableStringUID       *bool
        	// ExpiresIn is the token lifetime in seconds (default: 86400 = 24 hours, Agora maximum).
        	// Only applies when the SDK auto-generates a token. Valid range: 1–86400.
        	// Use ExpiresInHours() / ExpiresInMinutes() for clarity.
        	ExpiresIn int
        	// UseAppCredentialsForREST when true, generates a ConvoAI token per request for REST API
        	// authentication. Use when the client was created without Basic Auth or token (app-credentials mode).
        	UseAppCredentialsForREST bool
        	Preset                   []string
        	PipelineID               string
        	Debug                    bool
        	Warn                     func(string)
        }

        func NewAgentSession(opts AgentSessionOptions) *AgentSession {
        	name := opts.Name
        	if name == "" {
        		name = fmt.Sprintf("agent-%d", time.Now().UnixMilli())
        	}

        	return &AgentSession{
        		client:          opts.Client,
        		agentManagement: opts.AgentManagementClient,
        		agent:           opts.Agent,
        		appID:           opts.AppID,
        		appCertificate:  opts.AppCertificate,
        		name:            name,
        		channel:         opts.Channel,
        		token:           opts.Token,
        		agentUID:        opts.AgentUID,
        		remoteUIDs:      opts.RemoteUIDs,
        		idleTimeout:     opts.IdleTimeout,
        		enableStringUID: opts.EnableStringUID,
        		expiresIn:       opts.ExpiresIn,
        		useAppCredsREST: opts.UseAppCredentialsForREST,
        		preset:          append([]string(nil), opts.Preset...),
        		pipelineID:      opts.PipelineID,
        		debug:           opts.Debug,
        		warn:            opts.Warn,
        		status:          StatusIdle,
        		handlers:        make(map[string][]EventHandler),
        	}
        }

        // convoAIRequestOpts returns per-request options with ConvoAI token when using app credentials.
        func (s *AgentSession) convoAIRequestOpts(ctx context.Context) ([]option.RequestOption, error) {
        	if !s.useAppCredsREST {
        		return nil, nil
        	}
        	if s.appCertificate == "" {
        		return nil, fmt.Errorf("appCertificate is required for app-credentials auth mode; pass AppCertificate when creating AgoraClient")
        	}
        	token, err := GenerateConvoAIToken(GenerateConvoAITokenOptions{
        		AppID:          s.appID,
        		AppCertificate: s.appCertificate,
        		ChannelName:    s.channel,
        		Account:        s.agentUID,
        	})
        	if err != nil {
        		return nil, fmt.Errorf("failed to generate ConvoAI token for app-credentials auth mode: %w", err)
        	}
        	h := make(http.Header)
        	h.Set("Authorization", "agora token="+token)
        	return []option.RequestOption{option.WithHTTPHeader(h)}, nil
        }

        func (s *AgentSession) ID() string {
        	s.mu.RLock()
        	defer s.mu.RUnlock()
        	return s.agentID
        }

        func (s *AgentSession) Status() SessionStatus {
        	s.mu.RLock()
        	defer s.mu.RUnlock()
        	return s.status
        }

        func (s *AgentSession) Agent() *Agent {
        	return s.agent
        }

        func (s *AgentSession) AppID() string {
        	return s.appID
        }

        func (s *AgentSession) Raw() *agents.Client {
        	return s.client
        }

        func (s *AgentSession) RawAgentManagement() *agentmanagement.Client {
        	return s.agentManagement
        }

        func (s *AgentSession) warnf(message string) {
        	if s.warn != nil {
        		s.warn(message)
        		return
        	}
        	log.Printf("agentkit: %s", message)
        }

        func (s *AgentSession) validateAvatarConfig() error {
        	if s.agent == nil || s.agent.avatar == nil {
        		return nil
        	}
        	if !avatarConfigEnabled(s.agent.avatar) {
        		return nil
        	}

        	vendor, _ := s.agent.avatar["vendor"].(string)
        	if vendor == "" {
        		return nil
        	}
        	params, _ := s.agent.avatar["params"].(map[string]interface{})
        	if err := ValidateAvatarConfig(vendor, params); err != nil {
        		return err
        	}

        	if s.agent.ttsSampleRate != nil {
        		if err := ValidateTtsSampleRate(vendor, int(*s.agent.ttsSampleRate)); err != nil {
        			return err
        		}
        		return nil
        	}

        	switch vendor {
        	case "heygen":
        		s.warnf("Warning: HeyGen avatar detected but TTS sample_rate is not explicitly set. HeyGen requires 24,000 Hz. Please ensure your TTS provider is configured for 24kHz.")
        	case "liveavatar":
        		s.warnf("Warning: LiveAvatar avatar detected but TTS sample_rate is not explicitly set. LiveAvatar requires 24,000 Hz. Please ensure your TTS provider is configured for 24kHz.")
        	case "akool":
        		s.warnf("Warning: Akool avatar detected but TTS sample_rate is not explicitly set. Akool requires 16,000 Hz. Please ensure your TTS provider is configured for 16kHz.")
        	}
        	return nil
        }

        func (s *AgentSession) Start(ctx context.Context) (string, error) {
        	s.mu.Lock()
        	if s.status != StatusIdle && s.status != StatusStopped && s.status != StatusError {
        		s.mu.Unlock()
        		return "", fmt.Errorf("cannot start session in %s state", s.status)
        	}
        	if s.agent != nil && s.agent.mllm != nil && s.agent.hasEnabledAvatar() {
        		s.mu.Unlock()
        		return "", fmt.Errorf("avatar is only supported with cascading ASR/LLM/TTS sessions; remove the avatar configuration when using MLLM")
        	}

        	if s.agent.avatar != nil && avatarConfigEnabled(s.agent.avatar) && s.agent.avatarRequiredSampleRate != nil && *s.agent.avatarRequiredSampleRate != 0 && s.agent.ttsSampleRate != nil {
        		if *s.agent.ttsSampleRate != *s.agent.avatarRequiredSampleRate {
        			s.mu.Unlock()
        			return "", fmt.Errorf(
        				"avatar requires TTS sample rate of %d Hz, but TTS is configured with %d Hz",
        				int(*s.agent.avatarRequiredSampleRate), int(*s.agent.ttsSampleRate),
        			)
        		}
        	}
        	if err := s.validateAvatarConfig(); err != nil {
        		s.mu.Unlock()
        		return "", err
        	}

        	s.status = StatusStarting
        	s.mu.Unlock()

        	propOpts := ToPropertiesOptions{
        		Channel:              s.channel,
        		AgentUID:             s.agentUID,
        		RemoteUIDs:           s.remoteUIDs,
        		Token:                s.token,
        		AppID:                s.appID,
        		AppCertificate:       s.appCertificate,
        		ExpiresIn:            s.expiresIn,
        		IdleTimeout:          s.idleTimeout,
        		EnableStringUID:      s.enableStringUID,
        		SkipVendorValidation: len(s.preset) > 0 || s.pipelineID != "",
        		Warn:                 s.warnf,
        	}

        	properties, err := s.agent.ToPropertiesMap(propOpts)
        	if err != nil {
        		s.mu.Lock()
        		s.status = StatusError
        		s.mu.Unlock()
        		s.emit("error", err)
        		return "", err
        	}

        	resolvedPreset, resolvedProperties, err := ResolveSessionPresetsMap(s.preset, properties)
        	if err != nil {
        		s.mu.Lock()
        		s.status = StatusError
        		s.mu.Unlock()
        		s.emit("error", err)
        		return "", err
        	}
        	if err := validateEnrichedAvatarConfig(resolvedProperties); err != nil {
        		s.mu.Lock()
        		s.status = StatusError
        		s.mu.Unlock()
        		s.emit("error", err)
        		return "", err
        	}

        	if s.debug {
        		debugPayload := map[string]interface{}{
        			"name":       s.name,
        			"properties": resolvedProperties,
        		}
        		if resolvedPreset != "" {
        			debugPayload["preset"] = resolvedPreset
        		}
        		if s.pipelineID != "" {
        			debugPayload["pipeline_id"] = s.pipelineID
        		}
        		if payload, err := json.Marshal(debugPayload); err == nil {
        			log.Printf("[Agora Debug] Starting agent session: %s", payload)
        		} else {
        			s.warnf(fmt.Sprintf("debug logging failed to marshal start request: %v", err))
        		}
        	}

        	reqOpts, err := s.convoAIRequestOpts(ctx)
        	if err != nil {
        		s.mu.Lock()
        		s.status = StatusError
        		s.mu.Unlock()
        		s.emit("error", err)
        		return "", err
        	}
        	resp, err := startAgentsWithMapBody(ctx, s.client, s.appID, s.name, resolvedPreset, s.pipelineID, resolvedProperties, reqOpts...)
        	if err != nil {
        		s.mu.Lock()
        		s.status = StatusError
        		s.mu.Unlock()
        		s.emit("error", err)
        		return "", err
        	}

        	s.mu.Lock()
        	if resp != nil && resp.AgentID != nil {
        		s.agentID = *resp.AgentID
        	}
        	s.status = StatusRunning
        	s.mu.Unlock()

        	s.emit("started", map[string]string{"agent_id": s.agentID})
        	return s.agentID, nil
        }

        func validateEnrichedAvatarConfig(properties map[string]interface{}) error {
        	if properties == nil {
        		return nil
        	}
        	avatar := asMap(properties["avatar"])
        	if len(avatar) == 0 || !avatarConfigEnabled(avatar) {
        		return nil
        	}
        	vendor, _ := avatar["vendor"].(string)
        	params := asMap(avatar["params"])
        	if err := ValidateAvatarConfig(vendor, params); err != nil {
        		return err
        	}
        	if IsGenericAvatar(vendor) {
        		if !hasNonEmptyString(params, "agora_appid") {
        			return fmt.Errorf("Generic avatar requires agora_appid")
        		}
        		if !hasNonEmptyString(params, "agora_channel") {
        			return fmt.Errorf("Generic avatar requires agora_channel")
        		}
        		if !hasNonEmptyString(params, "agora_token") {
        			return fmt.Errorf("Generic avatar requires agora_token")
        		}
        		return nil
        	}
        	if isAvatarTokenManaged(vendor) && avatarUIDString(params["agora_uid"]) != "" && !hasNonEmptyString(params, "agora_token") {
        		return fmt.Errorf("%s avatar requires agora_token; pass AgoraToken on the avatar vendor or provide AppCertificate for automatic token generation", vendor)
        	}
        	return nil
        }

        func (s *AgentSession) Stop(ctx context.Context) error {
        	s.mu.Lock()
        	if s.status != StatusRunning {
        		s.mu.Unlock()
        		return fmt.Errorf("cannot stop session in %s state", s.status)
        	}
        	if s.agentID == "" {
        		s.mu.Unlock()
        		return fmt.Errorf("no agent ID available")
        	}
        	s.status = StatusStopping
        	s.mu.Unlock()

        	reqOpts, err := s.convoAIRequestOpts(ctx)
        	if err != nil {
        		s.mu.Lock()
        		s.status = StatusError
        		s.mu.Unlock()
        		s.emit("error", err)
        		return err
        	}
        	err = s.client.Stop(ctx, &Agora.StopAgentsRequest{
        		Appid:   s.appID,
        		AgentID: s.agentID,
        	}, reqOpts...)
        	if err != nil {
        		// Handle 404 "task not found" gracefully — agent is already stopped
        		var apiErr *core.APIError
        		if errors.As(err, &apiErr) && apiErr.StatusCode == http.StatusNotFound {
        			s.mu.Lock()
        			s.status = StatusStopped
        			s.mu.Unlock()
        			s.emit("stopped", map[string]string{"agent_id": s.agentID})
        			return nil
        		}
        		s.mu.Lock()
        		s.status = StatusError
        		s.mu.Unlock()
        		s.emit("error", err)
        		return err
        	}

        	s.mu.Lock()
        	s.status = StatusStopped
        	s.mu.Unlock()
        	s.emit("stopped", map[string]string{"agent_id": s.agentID})
        	return nil
        }

        func (s *AgentSession) Say(ctx context.Context, text string, priority *Agora.SpeakAgentsRequestPriority, interruptable *bool) error {
        	s.mu.RLock()
        	if s.status != StatusRunning {
        		s.mu.RUnlock()
        		return fmt.Errorf("cannot say in %s state", s.status)
        	}
        	if s.agentID == "" {
        		s.mu.RUnlock()
        		return fmt.Errorf("no agent ID available")
        	}
        	s.mu.RUnlock()

        	req := &Agora.SpeakAgentsRequest{
        		Appid:         s.appID,
        		AgentID:       s.agentID,
        		Text:          text,
        		Priority:      priority,
        		Interruptable: interruptable,
        	}

        	reqOpts, err := s.convoAIRequestOpts(ctx)
        	if err != nil {
        		return err
        	}
        	_, err = s.client.Speak(ctx, req, reqOpts...)
        	return err
        }

        func (s *AgentSession) Interrupt(ctx context.Context) error {
        	s.mu.RLock()
        	if s.status != StatusRunning {
        		s.mu.RUnlock()
        		return fmt.Errorf("cannot interrupt in %s state", s.status)
        	}
        	if s.agentID == "" {
        		s.mu.RUnlock()
        		return fmt.Errorf("no agent ID available")
        	}
        	s.mu.RUnlock()

        	reqOpts, err := s.convoAIRequestOpts(ctx)
        	if err != nil {
        		return err
        	}
        	_, err = s.client.Interrupt(ctx, &Agora.InterruptAgentsRequest{
        		Appid:   s.appID,
        		AgentID: s.agentID,
        	}, reqOpts...)
        	return err
        }

        func (s *AgentSession) Think(
        	ctx context.Context,
        	text string,
        	onListeningAction *Agora.AgentThinkAgentManagementRequestOnListeningAction,
        	onThinkingAction *Agora.AgentThinkAgentManagementRequestOnThinkingAction,
        	onSpeakingAction *Agora.AgentThinkAgentManagementRequestOnSpeakingAction,
        	interruptable *bool,
        	metadata map[string]string,
        ) (*Agora.AgentThinkAgentManagementResponse, error) {
        	return s.ThinkWithOptions(ctx, text, &ThinkOptions{
        		OnListeningAction: onListeningAction,
        		OnThinkingAction:  onThinkingAction,
        		OnSpeakingAction:  onSpeakingAction,
        		Interruptable:     interruptable,
        		Metadata:          metadata,
        	})
        }

        type ThinkOptions struct {
        	OnListeningAction *Agora.AgentThinkAgentManagementRequestOnListeningAction
        	OnThinkingAction  *Agora.AgentThinkAgentManagementRequestOnThinkingAction
        	OnSpeakingAction  *Agora.AgentThinkAgentManagementRequestOnSpeakingAction
        	Interruptable     *bool
        	Metadata          map[string]string
        }

        func (s *AgentSession) ThinkWithOptions(
        	ctx context.Context,
        	text string,
        	opts *ThinkOptions,
        ) (*Agora.AgentThinkAgentManagementResponse, error) {
        	s.mu.RLock()
        	if s.status != StatusRunning {
        		s.mu.RUnlock()
        		return nil, fmt.Errorf("cannot think in %s state", s.status)
        	}
        	if s.agentID == "" {
        		s.mu.RUnlock()
        		return nil, fmt.Errorf("no agent ID available")
        	}
        	s.mu.RUnlock()
        	if s.agentManagement == nil {
        		return nil, fmt.Errorf("agent management client is not configured")
        	}

        	req := &Agora.AgentThinkAgentManagementRequest{
        		Appid:   s.appID,
        		AgentID: s.agentID,
        		Text:    text,
        	}
        	if opts != nil {
        		req.OnListeningAction = opts.OnListeningAction
        		req.OnThinkingAction = opts.OnThinkingAction
        		req.OnSpeakingAction = opts.OnSpeakingAction
        		req.Interruptable = opts.Interruptable
        		req.Metadata = opts.Metadata
        	}
        	reqOpts, err := s.convoAIRequestOpts(ctx)
        	if err != nil {
        		return nil, err
        	}
        	return s.agentManagement.AgentThink(ctx, req, reqOpts...)
        }

        func (s *AgentSession) Update(ctx context.Context, properties *Agora.UpdateAgentsRequestProperties) error {
        	s.mu.RLock()
        	if s.status != StatusRunning {
        		s.mu.RUnlock()
        		return fmt.Errorf("cannot update in %s state", s.status)
        	}
        	if s.agentID == "" {
        		s.mu.RUnlock()
        		return fmt.Errorf("no agent ID available")
        	}
        	s.mu.RUnlock()

        	reqOpts, err := s.convoAIRequestOpts(ctx)
        	if err != nil {
        		return err
        	}
        	_, err = s.client.Update(ctx, &Agora.UpdateAgentsRequest{
        		Appid:      s.appID,
        		AgentID:    s.agentID,
        		Properties: properties,
        	}, reqOpts...)
        	return err
        }

        func (s *AgentSession) GetHistory(ctx context.Context) (*Agora.GetHistoryAgentsResponse, error) {
        	s.mu.RLock()
        	if s.agentID == "" {
        		s.mu.RUnlock()
        		return nil, fmt.Errorf("no agent ID available")
        	}
        	s.mu.RUnlock()

        	reqOpts, err := s.convoAIRequestOpts(ctx)
        	if err != nil {
        		return nil, err
        	}
        	return s.client.GetHistory(ctx, &Agora.GetHistoryAgentsRequest{
        		Appid:   s.appID,
        		AgentID: s.agentID,
        	}, reqOpts...)
        }

        func (s *AgentSession) GetInfo(ctx context.Context) (*Agora.GetAgentsResponse, error) {
        	s.mu.RLock()
        	if s.agentID == "" {
        		s.mu.RUnlock()
        		return nil, fmt.Errorf("no agent ID available")
        	}
        	s.mu.RUnlock()

        	reqOpts, err := s.convoAIRequestOpts(ctx)
        	if err != nil {
        		return nil, err
        	}
        	return s.client.Get(ctx, &Agora.GetAgentsRequest{
        		Appid:   s.appID,
        		AgentID: s.agentID,
        	}, reqOpts...)
        }

        type GetTurnsOptions struct {
        	PageIndex *int
        	PageSize  *int
        }

        type GetAllTurnsOptions struct {
        	PageSize *int
        }

        func (s *AgentSession) GetTurns(ctx context.Context, opts ...GetTurnsOptions) (*Agora.GetTurnsAgentsResponse, error) {
        	s.mu.RLock()
        	if s.agentID == "" {
        		s.mu.RUnlock()
        		return nil, fmt.Errorf("no agent ID available")
        	}
        	s.mu.RUnlock()

        	req := &Agora.GetTurnsAgentsRequest{
        		Appid:   s.appID,
        		AgentID: s.agentID,
        	}
        	if len(opts) > 0 {
        		req.PageIndex = opts[0].PageIndex
        		req.PageSize = opts[0].PageSize
        	}
        	reqOpts, err := s.convoAIRequestOpts(ctx)
        	if err != nil {
        		return nil, err
        	}
        	return s.client.GetTurns(ctx, req, reqOpts...)
        }

        func (s *AgentSession) GetAllTurns(ctx context.Context, opts ...GetAllTurnsOptions) (*Agora.GetTurnsAgentsResponse, error) {
        	pageIndex := 1
        	pageSize := 50
        	if len(opts) > 0 && opts[0].PageSize != nil {
        		pageSize = *opts[0].PageSize
        	}
        	all := []*Agora.GetTurnsAgentsResponseTurnsItem{}
        	var latest *Agora.GetTurnsAgentsResponse
        	currentPage := 0
        	for {
        		resp, err := s.GetTurns(ctx, GetTurnsOptions{
        			PageIndex: &pageIndex,
        			PageSize:  &pageSize,
        		})
        		if err != nil {
        			return nil, err
        		}
        		if resp == nil {
        			return &Agora.GetTurnsAgentsResponse{Turns: all}, nil
        		}
        		latest = resp
        		all = append(all, resp.Turns...)
        		if resp.Pagination != nil {
        			if resp.Pagination.IsLastPage != nil && *resp.Pagination.IsLastPage {
        				latest.Turns = all
        				return latest, nil
        			}
        			if resp.Pagination.TotalPages != nil && pageIndex >= *resp.Pagination.TotalPages {
        				latest.Turns = all
        				return latest, nil
        			}
        			if resp.Pagination.PageIndex != nil {
        				if *resp.Pagination.PageIndex <= currentPage {
        					return nil, fmt.Errorf("getAllTurns pagination did not advance: requested page %d, received page %d", pageIndex, *resp.Pagination.PageIndex)
        				}
        				currentPage = *resp.Pagination.PageIndex
        			} else {
        				currentPage = pageIndex
        			}
        		} else {
        			latest.Turns = all
        			return latest, nil
        		}
        		pageIndex++
        	}
        }

        func (s *AgentSession) On(event string, handler EventHandler) {
        	s.mu.Lock()
        	defer s.mu.Unlock()
        	s.handlers[event] = append(s.handlers[event], handler)
        }

        func (s *AgentSession) Off(event string, handler EventHandler) {
        	s.mu.Lock()
        	defer s.mu.Unlock()

        	handlers := s.handlers[event]
        	if len(handlers) == 0 {
        		return
        	}

        	target := reflect.ValueOf(handler).Pointer()
        	filtered := handlers[:0]
        	for _, registered := range handlers {
        		if reflect.ValueOf(registered).Pointer() == target {
        			continue
        		}
        		filtered = append(filtered, registered)
        	}
        	if len(filtered) == 0 {
        		delete(s.handlers, event)
        		return
        	}
        	s.handlers[event] = filtered
        }

        func (s *AgentSession) emit(event string, data interface{}) {
        	s.mu.RLock()
        	handlers := s.handlers[event]
        	s.mu.RUnlock()

        	for _, h := range handlers {
        		func() {
        			defer func() {
        				if r := recover(); r != nil {
        					// Log and continue so a panicking handler does not prevent
        					// remaining handlers or session lifecycle from completing.
        					s.warnf(fmt.Sprintf("recovered panic in %q event handler: %v", event, r))
        				}
        			}()
        			h(data)
        		}()
        	}
        }

        func stringPtrOrNil(value string) *string {
        	if value == "" {
        		return nil
        	}
        	return &value
        }
      agentkit/presets.go: |
        package agentkit

        import (
        	"encoding/json"
        	"strings"

        	Agora "github.com/AgoraIO-Conversational-AI/agent-server-sdk-go"
        )

        var AgentPresets = struct {
        	Asr struct {
        		DeepgramNova2 string
        		DeepgramNova3 string
        	}
        	Llm struct {
        		OpenAIGpt4oMini string
        		OpenAIGpt41Mini string
        		OpenAIGpt5Nano  string
        		OpenAIGpt5Mini  string
        	}
        	Tts struct {
        		MiniMaxSpeech26Turbo string
        		MiniMaxSpeech28Turbo string
        		OpenAITts1           string
        	}
        }{
        	Asr: struct {
        		DeepgramNova2 string
        		DeepgramNova3 string
        	}{
        		DeepgramNova2: "deepgram_nova_2",
        		DeepgramNova3: "deepgram_nova_3",
        	},
        	Llm: struct {
        		OpenAIGpt4oMini string
        		OpenAIGpt41Mini string
        		OpenAIGpt5Nano  string
        		OpenAIGpt5Mini  string
        	}{
        		OpenAIGpt4oMini: "openai_gpt_4o_mini",
        		OpenAIGpt41Mini: "openai_gpt_4_1_mini",
        		OpenAIGpt5Nano:  "openai_gpt_5_nano",
        		OpenAIGpt5Mini:  "openai_gpt_5_mini",
        	},
        	Tts: struct {
        		MiniMaxSpeech26Turbo string
        		MiniMaxSpeech28Turbo string
        		OpenAITts1           string
        	}{
        		MiniMaxSpeech26Turbo: "minimax_speech_2_6_turbo",
        		MiniMaxSpeech28Turbo: "minimax_speech_2_8_turbo",
        		OpenAITts1:           "openai_tts_1",
        	},
        }

        const openAIChatCompletionsURL = "https://api.openai.com/v1/chat/completions"

        func NormalizePresetInput(presets []string) string {
        	normalized := make([]string, 0, len(presets))
        	for _, preset := range presets {
        		preset = strings.TrimSpace(preset)
        		if preset != "" {
        			normalized = append(normalized, preset)
        		}
        	}
        	return strings.Join(normalized, ",")
        }

        func ResolveSessionPresets(presets []string, properties *Agora.StartAgentsRequestProperties) (string, *Agora.StartAgentsRequestProperties, error) {
        	if properties == nil {
        		return NormalizePresetInput(presets), nil, nil
        	}

        	payload, err := json.Marshal(properties)
        	if err != nil {
        		return "", nil, err
        	}

        	var props map[string]interface{}
        	if err := json.Unmarshal(payload, &props); err != nil {
        		return "", nil, err
        	}

        	resolvedPreset, resolvedProps, err := ResolveSessionPresetsMap(presets, props)
        	if err != nil {
        		return "", nil, err
        	}

        	resolvedPayload, err := json.Marshal(resolvedProps)
        	if err != nil {
        		return "", nil, err
        	}

        	var resolved Agora.StartAgentsRequestProperties
        	if err := json.Unmarshal(resolvedPayload, &resolved); err != nil {
        		return "", nil, err
        	}
        	return resolvedPreset, &resolved, nil
        }

        func ResolveSessionPresetsMap(presets []string, properties map[string]interface{}) (string, map[string]interface{}, error) {
        	if properties == nil {
        		return NormalizePresetInput(presets), nil, nil
        	}
        	props := cloneConfig(properties)
        	explicit := parsePresetInput(presets)
        	explicitCategories := map[string]bool{}
        	for _, preset := range explicit {
        		if category := getPresetCategory(preset); category != "" {
        			explicitCategories[category] = true
        		}
        	}

        	inferred := make([]string, 0, 3)
        	if !explicitCategories["asr"] {
        		if preset, ok := inferASRPreset(props["asr"]); ok {
        			inferred = append(inferred, preset)
        			stripInferredASRFields(props["asr"])
        		}
        	}
        	if !explicitCategories["llm"] {
        		if preset, ok := inferLLMPreset(props["llm"]); ok {
        			inferred = append(inferred, preset)
        			stripInferredLLMFields(props["llm"])
        		}
        	}
        	if !explicitCategories["tts"] {
        		if preset, ok := inferTTSPreset(props["tts"]); ok {
        			inferred = append(inferred, preset)
        			stripInferredTTSFields(props["tts"], preset)
        		}
        	}
        	omitEmptyProviderFields(props)

        	combined := append(append([]string{}, explicit...), inferred...)
        	return NormalizePresetInput(combined), props, nil
        }

        func parsePresetInput(presets []string) []string {
        	parsed := make([]string, 0, len(presets))
        	for _, preset := range presets {
        		for _, item := range strings.Split(preset, ",") {
        			item = strings.TrimSpace(item)
        			if item != "" {
        				parsed = append(parsed, item)
        			}
        		}
        	}
        	return parsed
        }

        func getPresetCategory(preset string) string {
        	switch preset {
        	case AgentPresets.Asr.DeepgramNova2, AgentPresets.Asr.DeepgramNova3:
        		return "asr"
        	case AgentPresets.Llm.OpenAIGpt4oMini, AgentPresets.Llm.OpenAIGpt41Mini, AgentPresets.Llm.OpenAIGpt5Nano, AgentPresets.Llm.OpenAIGpt5Mini:
        		return "llm"
        	case AgentPresets.Tts.MiniMaxSpeech26Turbo, AgentPresets.Tts.MiniMaxSpeech28Turbo, AgentPresets.Tts.OpenAITts1:
        		return "tts"
        	default:
        		return ""
        	}
        }

        func normalizeModelName(value interface{}) string {
        	s, ok := value.(string)
        	if !ok {
        		return ""
        	}
        	return strings.ToLower(strings.TrimSpace(s))
        }

        func asMap(value interface{}) map[string]interface{} {
        	m, _ := value.(map[string]interface{})
        	return m
        }

        func inferASRPreset(value interface{}) (string, bool) {
        	asr := asMap(value)
        	if len(asr) == 0 || asr["vendor"] != "deepgram" {
        		return "", false
        	}
        	params := asMap(asr["params"])
        	if hasNonEmptyString(params, "api_key") {
        		return "", false
        	}
        	switch normalizeModelName(params["model"]) {
        	case "nova-2":
        		return AgentPresets.Asr.DeepgramNova2, true
        	case "nova-3":
        		return AgentPresets.Asr.DeepgramNova3, true
        	default:
        		return "", false
        	}
        }

        func inferLLMPreset(value interface{}) (string, bool) {
        	llm := asMap(value)
        	if len(llm) == 0 {
        		return "", false
        	}
        	if hasNonEmptyString(llm, "api_key") {
        		return "", false
        	}
        	if vendor, ok := llm["vendor"].(string); ok && vendor != "" && vendor != "openai" {
        		return "", false
        	}
        	if url, ok := llm["url"].(string); ok && url != "" && url != openAIChatCompletionsURL {
        		return "", false
        	}
        	params := asMap(llm["params"])
        	switch normalizeModelName(params["model"]) {
        	case "gpt-4o-mini":
        		return AgentPresets.Llm.OpenAIGpt4oMini, true
        	case "gpt-4.1-mini":
        		return AgentPresets.Llm.OpenAIGpt41Mini, true
        	case "gpt-5-nano":
        		return AgentPresets.Llm.OpenAIGpt5Nano, true
        	case "gpt-5-mini":
        		return AgentPresets.Llm.OpenAIGpt5Mini, true
        	default:
        		return "", false
        	}
        }

        func inferTTSPreset(value interface{}) (string, bool) {
        	tts := asMap(value)
        	if len(tts) == 0 {
        		return "", false
        	}
        	switch tts["vendor"] {
        	case "openai":
        		params := asMap(tts["params"])
        		if hasNonEmptyString(params, "api_key") || hasNonEmptyString(params, "key") {
        			return "", false
        		}
        		model := normalizeModelName(params["model"])
        		if model == "" || model == "tts-1" {
        			return AgentPresets.Tts.OpenAITts1, true
        		}
        	case "minimax":
        		params := asMap(tts["params"])
        		if hasNonEmptyString(params, "key") {
        			return "", false
        		}
        		switch normalizeModelName(params["model"]) {
        		case "speech-2.6-turbo", "speech_2_6_turbo":
        			return AgentPresets.Tts.MiniMaxSpeech26Turbo, true
        		case "speech-2.8-turbo", "speech_2_8_turbo":
        			return AgentPresets.Tts.MiniMaxSpeech28Turbo, true
        		}
        	}
        	return "", false
        }

        func hasNonEmptyString(m map[string]interface{}, key string) bool {
        	value, ok := m[key]
        	if !ok {
        		return false
        	}
        	if s, ok := value.(string); ok {
        		return strings.TrimSpace(s) != ""
        	}
        	return value != nil
        }

        func stripInferredASRFields(value interface{}) {
        	asr := asMap(value)
        	params := asMap(asr["params"])
        	delete(params, "api_key")
        	delete(params, "model")
        	if len(params) == 0 {
        		asr["params"] = map[string]interface{}{}
        		return
        	}
        	asr["params"] = params
        }

        func stripInferredLLMFields(value interface{}) {
        	llm := asMap(value)
        	delete(llm, "api_key")
        	if url, ok := llm["url"].(string); ok && (url == "" || url == openAIChatCompletionsURL) {
        		delete(llm, "url")
        	}
        	params := asMap(llm["params"])
        	delete(params, "model")
        	if len(params) == 0 {
        		delete(llm, "params")
        		return
        	}
        	llm["params"] = params
        }

        func stripInferredTTSFields(value interface{}, preset string) {
        	tts := asMap(value)
        	params := asMap(tts["params"])
        	switch preset {
        	case AgentPresets.Tts.OpenAITts1:
        		delete(params, "api_key")
        		delete(params, "key")
        		delete(params, "model")
        	case AgentPresets.Tts.MiniMaxSpeech26Turbo, AgentPresets.Tts.MiniMaxSpeech28Turbo:
        		delete(params, "key")
        		delete(params, "group_id")
        		delete(params, "model")
        		delete(params, "url")
        	}
        	if len(params) == 0 {
        		tts["params"] = map[string]interface{}{}
        		return
        	}
        	tts["params"] = params
        }

        func omitEmptyProviderFields(props map[string]interface{}) {
        	if props == nil {
        		return
        	}
        	if llm := asMap(props["llm"]); llm != nil {
        		for _, key := range []string{"api_key", "url"} {
        			if value, ok := llm[key].(string); ok && strings.TrimSpace(value) == "" {
        				delete(llm, key)
        			}
        		}
        		if params := asMap(llm["params"]); params != nil {
        			for _, key := range []string{"model"} {
        				if value, ok := params[key].(string); ok && strings.TrimSpace(value) == "" {
        					delete(params, key)
        				}
        			}
        		}
        	}
        	if asr := asMap(props["asr"]); asr != nil {
        		if params := asMap(asr["params"]); params != nil {
        			for _, key := range []string{"api_key", "model"} {
        				if value, ok := params[key].(string); ok && strings.TrimSpace(value) == "" {
        					delete(params, key)
        				}
        			}
        		}
        	}
        	if tts := asMap(props["tts"]); tts != nil {
        		if params := asMap(tts["params"]); params != nil {
        			for _, key := range []string{"api_key", "key", "group_id", "url", "model"} {
        				if value, ok := params[key].(string); ok && strings.TrimSpace(value) == "" {
        					delete(params, key)
        				}
        			}
        		}
        	}
        }
      agentkit/start_request.go: |
        package agentkit

        import (
        	"context"

        	Agora "github.com/AgoraIO-Conversational-AI/agent-server-sdk-go"
        	"github.com/AgoraIO-Conversational-AI/agent-server-sdk-go/agents"
        	"github.com/AgoraIO-Conversational-AI/agent-server-sdk-go/option"
        )

        func startAgentsWithMapBody(
        	ctx context.Context,
        	client *agents.Client,
        	appID string,
        	name string,
        	preset string,
        	pipelineID string,
        	properties map[string]interface{},
        	opts ...option.RequestOption,
        ) (*Agora.StartAgentsResponse, error) {
        	body := map[string]interface{}{
        		"name":       name,
        		"properties": properties,
        	}
        	if preset != "" {
        		body["preset"] = preset
        	}
        	if pipelineID != "" {
        		body["pipeline_id"] = pipelineID
        	}
        	return agents.StartWithMapBody(ctx, client, appID, body, opts...)
        }
      agents/start_map.go: |
        package agents

        import (
        	"context"
        	"net/http"

        	Agora "github.com/AgoraIO-Conversational-AI/agent-server-sdk-go"
        	"github.com/AgoraIO-Conversational-AI/agent-server-sdk-go/core"
        	"github.com/AgoraIO-Conversational-AI/agent-server-sdk-go/internal"
        	"github.com/AgoraIO-Conversational-AI/agent-server-sdk-go/option"
        )

        // StartWithMapBody starts an agent using an exact JSON body.
        //
        // AgentKit uses this for preset-backed sessions so provider-owned empty fields
        // are not reintroduced by generated structs after preset resolution.
        func StartWithMapBody(
        	ctx context.Context,
        	c *Client,
        	appid string,
        	body map[string]interface{},
        	opts ...option.RequestOption,
        ) (*Agora.StartAgentsResponse, error) {
        	response, err := c.WithRawResponse.StartWithMapBody(ctx, appid, body, opts...)
        	if err != nil {
        		return nil, err
        	}
        	return response.Body, nil
        }

        // StartWithMapBody starts an agent using an exact JSON body and returns the raw response.
        func (r *RawClient) StartWithMapBody(
        	ctx context.Context,
        	appid string,
        	body map[string]interface{},
        	opts ...option.RequestOption,
        ) (*core.Response[*Agora.StartAgentsResponse], error) {
        	options := core.NewRequestOptions(opts...)
        	baseURL := internal.ResolveBaseURL(
        		options.BaseURL,
        		r.baseURL,
        		"https://api.agora.io/api/conversational-ai-agent",
        	)
        	endpointURL := internal.EncodeURL(
        		baseURL+"/v2/projects/%v/join",
        		appid,
        	)
        	headers := internal.MergeHeaders(
        		r.options.ToHeader(),
        		options.ToHeader(),
        	)
        	headers.Add("Content-Type", "application/json")
        	var response *Agora.StartAgentsResponse
        	raw, err := r.caller.Call(
        		ctx,
        		&internal.CallParams{
        			URL:             endpointURL,
        			Method:          http.MethodPost,
        			Headers:         headers,
        			MaxAttempts:     options.MaxAttempts,
        			BodyProperties:  options.BodyProperties,
        			QueryParameters: options.QueryParameters,
        			Client:          options.HTTPClient,
        			Request:         body,
        			Response:        &response,
        		},
        	)
        	if err != nil {
        		return nil, err
        	}
        	return &core.Response[*Agora.StartAgentsResponse]{
        		StatusCode: raw.StatusCode,
        		Header:     raw.Header,
        		Body:       response,
        	}, nil
        }
