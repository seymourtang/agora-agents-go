        				"target_language_code": "en-IN",
        				"sample_rate":          24000,
        			},
        		},
        		{
        			name: "murf",
        			params: NewMurfTTS(MurfTTSOptions{
        				Key:        "murf-key",
        				VoiceID:    "Ariana",
        				BaseURL:    "wss://murf.example/ws",
