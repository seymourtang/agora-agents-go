        }

        type MicrosoftSTTOptions struct {
        	Key                 string
        	Region              string
        	Language            string
        	InteractionLanguage string
        	AdditionalParams    map[string]interface{}
        }

        type MicrosoftSTT struct {
        	options MicrosoftSTTOptions
