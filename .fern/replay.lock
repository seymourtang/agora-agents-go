        type CreateSessionOptions struct {
        	Name            string
        	Channel         string
        	Token           string
        	AgentUID        string
        	RemoteUIDs      []string
        	IdleTimeout     *int
        	EnableStringUID *bool
        	ExpiresIn       int
        	Preset          []string
        	PipelineID      string
        	Debug           bool
        	Warn            func(string)
        }

        func (a *Agent) CreateSession(client *AgoraClient, opts CreateSessionOptions) *AgentSession {
        	name := opts.Name
        	if name == "" {
        		if a.name != "" {
        			name = a.name
        		} else {
        			name = fmt.Sprintf("agent-%d", time.Now().UnixMilli())
        		}
        	}

        	return NewAgentSession(AgentSessionOptions{
        		Client:                   client.Agents,
        		AgentManagementClient:    client.AgentManagement,
        		Agent:                    a,
        		AppID:                    client.AppID,
        		AppCertificate:           client.AppCertificate,
        		Name:                     name,
        		Channel:                  opts.Channel,
        		Token:                    opts.Token,
        		AgentUID:                 opts.AgentUID,
        		RemoteUIDs:               opts.RemoteUIDs,
        		IdleTimeout:              opts.IdleTimeout,
        		EnableStringUID:          opts.EnableStringUID,
        		ExpiresIn:                opts.ExpiresIn,
        		UseAppCredentialsForREST: client.AuthMode == AuthModeAppCredentials,
        		Preset:                   opts.Preset,
        		PipelineID:               opts.PipelineID,
        		Debug:                    opts.Debug,
        		Warn:                     opts.Warn,
        	})
        }

        func (a *Agent) ToProperties(opts ToPropertiesOptions) (*Agora.StartAgentsRequestProperties, error) {
        	propsMap, err := a.ToPropertiesMap(opts)
        	if err != nil {
        		return nil, err
        	}
        	var props Agora.StartAgentsRequestProperties
        	if err := mapToStruct(propsMap, &props); err != nil {
        		return nil, fmt.Errorf("failed to convert properties map: %w", err)
        	}
        	return &props, nil
        }

        func (a *Agent) ToPropertiesMap(opts ToPropertiesOptions) (map[string]interface{}, error) {
        	// Reject incompatible combinations before any work (token generation, etc.).
        	// Avatars are currently supported only with the cascading ASR/LLM/TTS pipeline.
        	if a.mllm != nil && a.hasEnabledAvatar() {
        		return nil, fmt.Errorf("avatar is only supported with cascading ASR/LLM/TTS sessions; remove the avatar configuration when using MLLM")
        	}

        	expiry := opts.ExpiresIn
        	if expiry != 0 {
        		var err error
        		expiry, err = ValidateExpiresIn(expiry)
        		if err != nil {
        			return nil, fmt.Errorf("invalid expiresIn: %w", err)
        		}
        	}
        	opts.ExpiresIn = expiry

        	token := opts.Token
        	if token == "" {
        		if opts.AppID == "" || opts.AppCertificate == "" {
        			return nil, fmt.Errorf("either token or app_id+app_certificate must be provided")
        		}
        		uid, err := parseNumericUID(opts.AgentUID, "agent UID")
        		if err != nil {
        			return nil, err
        		}
        		token, err = GenerateConvoAIToken(GenerateConvoAITokenOptions{
        			AppID:          opts.AppID,
        			AppCertificate: opts.AppCertificate,
        			ChannelName:    opts.Channel,
        			UID:            uid,
        			TokenExpire:    expiry,
        		})
        		if err != nil {
        			return nil, fmt.Errorf("failed to generate token: %w", err)
        		}
        	}

        	propsMap := map[string]interface{}{
        		"channel":       opts.Channel,
        		"token":         token,
        		"agent_rtc_uid": opts.AgentUID,
        	}
        	if opts.RemoteUIDs != nil {
        		propsMap["remote_rtc_uids"] = opts.RemoteUIDs
        	}
        	if opts.IdleTimeout != nil {
        		propsMap["idle_timeout"] = *opts.IdleTimeout
        	}
        	if opts.EnableStringUID != nil {
        		propsMap["enable_string_uid"] = *opts.EnableStringUID
        	}
        	if a.mllm != nil {
        		propsMap["mllm"] = a.buildMllmConfigMap()
        	}
        	if a.interruption != nil {
        		if err := setStructMap(propsMap, "interruption", a.interruption); err != nil {
        			return nil, err
        		}
        	}
        	if a.sal != nil {
        		if err := setStructMap(propsMap, "sal", a.sal); err != nil {
        			return nil, err
        		}
        	}
        	if a.avatar != nil {
        		avatar, err := a.enrichAvatarParams(opts)
        		if err != nil {
        			return nil, err
        		}
        		propsMap["avatar"] = avatar
        	}
        	if a.advancedFeatures != nil {
        		if err := setStructMap(propsMap, "advanced_features", a.advancedFeatures); err != nil {
        			return nil, err
        		}
        	}
        	if a.parameters != nil {
        		if err := setStructMap(propsMap, "parameters", a.parameters); err != nil {
        			return nil, err
        		}
        	}
        	if a.audioScenario != nil {
        		parameters, ok := propsMap["parameters"].(map[string]interface{})
        		if !ok || parameters == nil {
        			parameters = map[string]interface{}{}
        			propsMap["parameters"] = parameters
        		}
        		parameters["audio_scenario"] = string(*a.audioScenario)
        	}
        	if a.geofence != nil {
        		if err := setStructMap(propsMap, "geofence", a.geofence); err != nil {
        			return nil, err
        		}
        	}
        	if len(a.labels) > 0 {
        		propsMap["labels"] = cloneValue(a.labels)
        	}
        	if a.rtc != nil {
        		if err := setStructMap(propsMap, "rtc", a.rtc); err != nil {
        			return nil, err
        		}
        	}
        	if a.fillerWords != nil {
        		if err := setStructMap(propsMap, "filler_words", a.fillerWords); err != nil {
        			return nil, err
        		}
        	}

        	if a.advancedFeatures != nil && a.advancedFeatures.EnableRtm != nil && *a.advancedFeatures.EnableRtm {
        		parameters, ok := propsMap["parameters"].(map[string]interface{})
        		if !ok || parameters == nil {
        			parameters = map[string]interface{}{}
        			propsMap["parameters"] = parameters
        		}
        		if _, exists := parameters["data_channel"]; !exists {
        			parameters["data_channel"] = "rtm"
        		}
        	}

        	if a.mllm != nil {
        		return propsMap, nil
        	}

        	if a.mllm != nil {
        		if a.turnDetection != nil {
        			if err := setStructMap(propsMap, "turn_detection", a.turnDetection); err != nil {
        				return nil, err
        			}
        		}
        		return propsMap, nil
        	}

        	skipCategories := map[string]bool{}
        	for _, category := range opts.SkipVendorValidationCategories {
        		skipCategories[category] = true
        	}
        	allowMissingCategories := map[string]bool{}
        	for _, category := range opts.AllowMissingVendorCategories {
        		allowMissingCategories[category] = true
        	}
        	if opts.SkipVendorValidation {
        		for _, category := range []string{"asr", "llm", "tts"} {
        			skipCategories[category] = true
        			allowMissingCategories[category] = true
        		}
        	}

        	if a.stt != nil || !allowMissingCategories["asr"] {
        		propsMap["asr"] = a.resolveAsrConfig()
        	}
        	turnDetection, err := a.resolveTurnDetectionConfig()
        	if err != nil {
        		return nil, err
        	}
        	propsMap["turn_detection"] = turnDetection

        	if a.tts == nil && !skipCategories["tts"] && !allowMissingCategories["tts"] {
        		return nil, fmt.Errorf("TTS configuration is required; use WithTts() to set it")
        	}
        	if a.llm == nil && !skipCategories["llm"] && !allowMissingCategories["llm"] {
        		return nil, fmt.Errorf("LLM configuration is required; use WithLlm() to set it")
        	}

        	if a.llm != nil {
        		propsMap["llm"] = a.buildLlmConfigMap()
        	}
        	if a.tts != nil {
        		propsMap["tts"] = cloneConfig(a.tts)
        	}

        	return propsMap, nil
        }

        func (a *Agent) resolveAsrConfig() map[string]interface{} {
        	asrConfig := cloneConfig(a.stt)
        	if asrConfig == nil {
        		asrConfig = map[string]interface{}{"vendor": "ares"}
        	}
        	delete(asrConfig, "language")
        	if len(asrConfig) == 0 {
        		asrConfig["vendor"] = "ares"
        	}
        	return asrConfig
        }

        func (a *Agent) resolveTurnDetectionConfig() (map[string]interface{}, error) {
        	turnDetection := map[string]interface{}{}
        	if a.turnDetection != nil {
        		var err error
        		turnDetection, err = structToMap(a.turnDetection)
        		if err != nil {
        			return nil, fmt.Errorf("failed to serialize turn detection config: %w", err)
        		}
        	}

        	language := ""
        	if existing, ok := turnDetection["language"].(string); ok && existing != "" {
        		language = existing
        	}
        	if language == "" {
        		if existing, ok := a.stt["language"].(string); ok && isTurnDetectionLanguage(existing) {
        			language = existing
        		} else {
        			language = string(defaultTurnDetectionLanguage)
        		}
        	}
        	validateTurnDetectionLanguage(language)
        	turnDetection["language"] = language
        	return turnDetection, nil
        }

        func (a *Agent) buildMllmConfigMap() map[string]interface{} {
        	mllmConfig := cloneConfig(a.mllm)
        	if a.greeting != "" {
        		if _, exists := mllmConfig["greeting_message"]; !exists {
        			mllmConfig["greeting_message"] = a.greeting
        		}
        	}
        	if a.failureMessage != "" {
        		if _, exists := mllmConfig["failure_message"]; !exists {
        			mllmConfig["failure_message"] = a.failureMessage
        		}
        	}
        	return mllmConfig
        }

        func (a *Agent) buildLlmConfigMap() map[string]interface{} {
        	llmConfig := cloneConfig(a.llm)
        	if a.instructions != "" {
        		llmConfig["system_messages"] = []map[string]interface{}{
        			{"role": "system", "content": a.instructions},
        		}
        	}
        	if a.greeting != "" {
        		llmConfig["greeting_message"] = a.greeting
        	}
        	if a.failureMessage != "" {
        		llmConfig["failure_message"] = a.failureMessage
        	}
        	if a.maxHistory != nil {
        		llmConfig["max_history"] = *a.maxHistory
        	}
        	if a.greetingConfigs != nil {
        		if value, err := structToMap(a.greetingConfigs); err == nil {
        			llmConfig["greeting_configs"] = value
        		} else {
        			llmConfig["greeting_configs"] = a.greetingConfigs
        		}
        	}
        	return llmConfig
        }

        func setStructMap(target map[string]interface{}, key string, value interface{}) error {
        	valueMap, err := structToMap(value)
        	if err != nil {
        		return fmt.Errorf("failed to convert %s config to map: %w", key, err)
        	}
        	target[key] = valueMap
        	return nil
        }

        func (a *Agent) enrichAvatarParams(opts ToPropertiesOptions) (map[string]interface{}, error) {
        	avatar := cloneConfig(a.avatar)
        	if !avatarConfigEnabled(avatar) {
        		return avatar, nil
        	}
        	vendor, _ := avatar["vendor"].(string)
        	params, _ := avatar["params"].(map[string]interface{})
        	if params == nil {
        		params = map[string]interface{}{}
        		avatar["params"] = params
        	}

        	if IsGenericAvatar(vendor) {
        		if _, exists := params["agora_appid"]; !exists && opts.AppID != "" {
        			params["agora_appid"] = opts.AppID
        		}
        		if _, exists := params["agora_channel"]; !exists && opts.Channel != "" {
        			params["agora_channel"] = opts.Channel
        		}
        	}

        	avatarUID := avatarUIDString(params["agora_uid"])
        	if IsAvatarTokenManaged(vendor) && avatarUID != "" {
        		if avatarUID == opts.AgentUID && opts.Warn != nil {
        			opts.Warn("avatar agora_uid matches agent_rtc_uid; use a distinct UID so the avatar video stream does not collide with the voice agent")
        		}
        		if token, _ := params["agora_token"].(string); token == "" {
        			if opts.AppCertificate == "" {
        				return nil, fmt.Errorf("cannot auto-generate avatar agora_token: appCertificate is required; pass AppCertificate when creating AgoraClient, or set AgoraToken on the avatar vendor")
        			}
        			uid, err := parseNumericUID(avatarUID, "avatar agora_uid")
        			if err != nil {
        				return nil, err
        			}
        			generated, err := GenerateConvoAIToken(GenerateConvoAITokenOptions{
        				AppID:          opts.AppID,
        				AppCertificate: opts.AppCertificate,
        				ChannelName:    opts.Channel,
        				UID:            uid,
        				TokenExpire:    opts.ExpiresIn,
        			})
        			if err != nil {
        				return nil, err
        			}
        			params["agora_token"] = generated
        		}
        	}

        	return avatar, nil
        }

        func IsAvatarTokenManaged(vendor string) bool {
        	return IsHeyGenAvatar(vendor) || IsLiveAvatarAvatar(vendor) || IsGenericAvatar(vendor)
        }

        func IsAvatarTokenManagedFromConfig(avatar map[string]interface{}) bool {
        	vendor, _ := avatar["vendor"].(string)
        	return IsAvatarTokenManaged(vendor)
        }

        func avatarConfigEnabled(avatar map[string]interface{}) bool {
        	if avatar == nil {
        		return false
        	}
        	enabled, ok := avatar["enable"].(bool)
        	return !ok || enabled
        }

        func (a *Agent) hasEnabledAvatar() bool {
        	return a != nil && a.avatar != nil && avatarConfigEnabled(a.avatar)
        }

        func avatarUIDString(value interface{}) string {
        	switch v := value.(type) {
        	case string:
        		return v
        	case int:
        		return fmt.Sprint(v)
        	case int8:
        		return fmt.Sprint(v)
        	case int16:
        		return fmt.Sprint(v)
        	case int32:
        		return fmt.Sprint(v)
        	case int64:
        		return fmt.Sprint(v)
        	case uint:
        		return fmt.Sprint(v)
        	case uint8:
        		return fmt.Sprint(v)
        	case uint16:
        		return fmt.Sprint(v)
        	case uint32:
        		return fmt.Sprint(v)
        	case uint64:
        		return fmt.Sprint(v)
        	case float32:
        		return fmt.Sprint(v)
        	case float64:
        		return fmt.Sprint(v)
        	default:
        		return ""
        	}
        }

        func parseNumericUID(uid string, label string) (int, error) {
        	value, err := strconv.Atoi(uid)
        	if err != nil {
        		return 0, fmt.Errorf("%s must be a numeric RTC UID when auto-generating a ConvoAI token", label)
        	}
        	return value, nil
        }

        func avatarUIDString(value interface{}) string {
        	switch v := value.(type) {
        	case string:
        		return v
        	case int:
        		return fmt.Sprint(v)
        	case int8:
        		return fmt.Sprint(v)
        	case int16:
        		return fmt.Sprint(v)
        	case int32:
        		return fmt.Sprint(v)
        	case int64:
        		return fmt.Sprint(v)
        	case uint:
        		return fmt.Sprint(v)
        	case uint8:
        		return fmt.Sprint(v)
        	case uint16:
        		return fmt.Sprint(v)
        	case uint32:
        		return fmt.Sprint(v)
        	case uint64:
        		return fmt.Sprint(v)
        	case float32:
        		return fmt.Sprint(v)
        	case float64:
        		return fmt.Sprint(v)
        	default:
        		return ""
        	}
        }

        type ToPropertiesOptions struct {
        	Channel        string
        	AgentUID       string
        	RemoteUIDs     []string
        	Token          string
        	AppID          string
        	AppCertificate string
        	// ExpiresIn is the token lifetime in seconds (default: 86400 = 24 hours, Agora maximum).
        	// Valid range: 1–86400. Use ExpiresInHours() / ExpiresInMinutes() for clarity.
        	ExpiresIn       int
        	IdleTimeout     *int
        	EnableStringUID *bool
        	// Deprecated: use SkipVendorValidationCategories and AllowMissingVendorCategories instead.
        	SkipVendorValidation           bool
        	SkipVendorValidationCategories []string
        	AllowMissingVendorCategories   []string
        	Warn                           func(string)
        }

        func (a *Agent) clone() *Agent {
        	clone := *a
        	if a.labels != nil {
        		clone.labels = make(map[string]string, len(a.labels))
        		for k, v := range a.labels {
        			clone.labels[k] = v
        		}
        	}
        	return &clone
        }
      agentkit/stt_language_test.go: |
        package agentkit

        import (
        	"testing"

        	Agora "github.com/AgoraIO/agora-agents-go/v2"
        	"github.com/AgoraIO/agora-agents-go/v2/agentkit/vendors"
        	"github.com/stretchr/testify/assert"
        	"github.com/stretchr/testify/require"
        )

        func baseAgentForSTTLanguage() *Agent {
        	return NewAgent().
        		WithLlm(vendors.NewOpenAI(vendors.OpenAIOptions{APIKey: "llm-key", Model: "gpt-4o-mini", BaseURL: "https://api.openai.com/v1/chat/completions"})).
        		WithTts(vendors.NewElevenLabsTTS(vendors.ElevenLabsTTSOptions{
        			Key:     "tts-key",
        			VoiceID: "voice",
        			ModelID: "eleven_flash_v2_5",
        			BaseURL: "wss://api.elevenlabs.io/v1",
        		}))
        }

        func propertiesForSTTLanguage(t *testing.T, agent *Agent) map[string]interface{} {
        	t.Helper()

        	props, err := agent.ToPropertiesMap(ToPropertiesOptions{
        		Channel:    "channel",
        		Token:      "token",
        		AgentUID:   "1001",
        		RemoteUIDs: []string{"1002"},
        	})
        	require.NoError(t, err)
        	return props
        }

        func asrFromProperties(t *testing.T, props map[string]interface{}) map[string]interface{} {
        	t.Helper()

        	asr, ok := props["asr"].(map[string]interface{})
        	require.True(t, ok)
        	return asr
        }

        func TestSTTLanguageSerializesBCP47ToTurnDetectionAndProviderParams(t *testing.T) {
        	props := propertiesForSTTLanguage(t, baseAgentForSTTLanguage().
        		WithStt(vendors.NewSpeechmaticsSTT(vendors.SpeechmaticsSTTOptions{
        			APIKey:   "stt-key",
        			Language: "en-US",
        		})))

        	asr := asrFromProperties(t, props)
        	assert.Equal(t, "speechmatics", asr["vendor"])
        	assert.NotContains(t, asr, "language")
        	assert.Equal(t, "en-US", props["turn_detection"].(map[string]interface{})["language"])
        	assert.Equal(t, "en-US", asr["params"].(map[string]interface{})["language"])
        }

        func TestSTTProviderLanguageDefaultsTurnDetectionLanguageWhenUnsupportedByAres(t *testing.T) {
        	props := propertiesForSTTLanguage(t, baseAgentForSTTLanguage().
        		WithStt(vendors.NewSpeechmaticsSTT(vendors.SpeechmaticsSTTOptions{
        			APIKey:   "stt-key",
        			Language: "en",
        		})))

        	asr := asrFromProperties(t, props)
        	assert.NotContains(t, asr, "language")
        	assert.Equal(t, "en-US", props["turn_detection"].(map[string]interface{})["language"])
        	assert.Equal(t, "en", asr["params"].(map[string]interface{})["language"])
        }

        func TestTurnDetectionLanguageCanDifferFromProviderLanguage(t *testing.T) {
        	props := propertiesForSTTLanguage(t, baseAgentForSTTLanguage().
        		WithTurnDetection(&TurnDetectionConfig{
        			Language: Agora.AsrLanguageFrFr.Ptr(),
        		}).
        		WithStt(vendors.NewSpeechmaticsSTT(vendors.SpeechmaticsSTTOptions{
        			APIKey:   "stt-key",
        			Language: "en",
        		})))

        	asr := asrFromProperties(t, props)
        	assert.NotContains(t, asr, "language")
        	assert.Equal(t, "fr-FR", props["turn_detection"].(map[string]interface{})["language"])
        	assert.Equal(t, "en", asr["params"].(map[string]interface{})["language"])
        }

        func TestInvalidTurnDetectionLanguagePanics(t *testing.T) {
        	assert.PanicsWithValue(t, "invalid interaction language: en", func() {
        		baseAgentForSTTLanguage().WithTurnDetection(&TurnDetectionConfig{
        			Language: Agora.AsrLanguage("en").Ptr(),
        		}).ToPropertiesMap(ToPropertiesOptions{
        			Channel:    "channel",
        			Token:      "token",
        			AgentUID:   "1001",
        			RemoteUIDs: []string{"1002"},
        		})
        	})
        }

        func TestSTTDefaultTurnDetectionLanguageIsSentWithoutSTT(t *testing.T) {
        	props := propertiesForSTTLanguage(t, baseAgentForSTTLanguage())

        	assert.Equal(t, map[string]interface{}{"vendor": "ares"}, props["asr"])
        	assert.Equal(t, map[string]interface{}{"language": "en-US"}, props["turn_detection"])
        }

        func TestSTTVendorParamsMatchDocumentedShapes(t *testing.T) {
        	assert.Equal(t, map[string]interface{}{
        		"model":    "nova-3",
        		"language": "en-US",
        	}, vendors.NewDeepgramSTT(vendors.DeepgramSTTOptions{Model: "nova-3", Language: "en-US"}).ToConfig()["params"])

        	assert.PanicsWithValue(t, "DeepgramSTT requires APIKey unless using a supported Agora-managed model", func() {
        		vendors.NewDeepgramSTT(vendors.DeepgramSTTOptions{Model: "enhanced"})
        	})

        	assert.Equal(t, map[string]interface{}{
        		"key":      "dg-key",
        		"language": "en",
        	}, vendors.NewDeepgramSTT(vendors.DeepgramSTTOptions{APIKey: "dg-key", Language: "en"}).ToConfig()["params"])

        	assert.Equal(t, map[string]interface{}{
        		"api_key": "openai-key",
        		"input_audio_transcription": map[string]interface{}{
        			"model":    "gpt-4o-mini-transcribe",
        			"language": "en",
        		},
        	}, vendors.NewOpenAISTT(vendors.OpenAISTTOptions{
        		APIKey:   "openai-key",
        		Model:    "gpt-4o-mini-transcribe",
        		Language: "en",
        	}).ToConfig()["params"])

        	assert.Equal(t, map[string]interface{}{
        		"api_key": "openai-key",
        		"input_audio_transcription": map[string]interface{}{
        			"model": "whisper-1",
        		},
        	}, vendors.NewOpenAISTT(vendors.OpenAISTTOptions{
        		APIKey: "openai-key",
        	}).ToConfig()["params"])

        	assert.Equal(t, map[string]interface{}{
        		"project_id":             "project",
        		"location":               "global",
        		"adc_credentials_string": "{}",
        		"language":               "en-US",
        		"model":                  "long",
        	}, vendors.NewGoogleSTT(vendors.GoogleSTTOptions{
        		ProjectID:            "project",
        		Location:             "global",
        		ADCCredentialsString: "{}",
        		Language:             "en-US",
        		Model:                "long",
        	}).ToConfig()["params"])

        	assert.Equal(t, map[string]interface{}{
        		"access_key_id":     "access",
        		"secret_access_key": "secret",
        		"region":            "us-east-1",
        		"language_code":     "en-US",
        	}, vendors.NewAmazonSTT(vendors.AmazonSTTOptions{
        		AccessKey: "access",
        		SecretKey: "secret",
        		Region:    "us-east-1",
        		Language:  "en-US",
        	}).ToConfig()["params"])

        	assert.Equal(t, map[string]interface{}{
        		"api_key":  "assembly-key",
        		"language": "en-US",
        		"uri":      "wss://example.test/ws",
        	}, vendors.NewAssemblyAISTT(vendors.AssemblyAISTTOptions{
        		APIKey:   "assembly-key",
        		Language: "en-US",
        		URI:      "wss://example.test/ws",
        	}).ToConfig()["params"])
        }
      agentkit/vendors/tts.go: |
        package vendors

        import "strings"

        type ElevenLabsTTSOptions struct {
        	Key                      string
        	ModelID                  string
        	VoiceID                  string
        	BaseURL                  string
        	SampleRate               *SampleRate
        	OptimizeStreamingLatency *int
        	Stability                *float64
        	SimilarityBoost          *float64
        	Style                    *float64
        	UseSpeakerBoost          *bool
        	SkipPatterns             []int
        }

        type ElevenLabsTTS struct {
        	options ElevenLabsTTSOptions
        }

        func NewElevenLabsTTS(opts ElevenLabsTTSOptions) *ElevenLabsTTS {
        	if opts.Key == "" {
        		panic("ElevenLabsTTS requires Key")
        	}
        	if opts.ModelID == "" {
        		panic("ElevenLabsTTS requires ModelID")
        	}
        	if opts.VoiceID == "" {
        		panic("ElevenLabsTTS requires VoiceID")
        	}
        	if opts.BaseURL == "" {
        		panic("ElevenLabsTTS requires BaseURL")
        	}
        	return &ElevenLabsTTS{options: opts}
        }

        func (e *ElevenLabsTTS) GetSampleRate() *SampleRate {
        	return e.options.SampleRate
        }

        func (e *ElevenLabsTTS) ToConfig() map[string]interface{} {
        	params := map[string]interface{}{
        		"key":      e.options.Key,
        		"base_url": e.options.BaseURL,
        		"model_id": e.options.ModelID,
        		"voice_id": e.options.VoiceID,
        	}
        	if e.options.SampleRate != nil {
        		params["sample_rate"] = int(*e.options.SampleRate)
        	}
        	if e.options.OptimizeStreamingLatency != nil {
        		params["optimize_streaming_latency"] = *e.options.OptimizeStreamingLatency
        	}
        	if e.options.Stability != nil {
        		params["stability"] = *e.options.Stability
        	}
        	if e.options.SimilarityBoost != nil {
        		params["similarity_boost"] = *e.options.SimilarityBoost
        	}
        	if e.options.Style != nil {
        		params["style"] = *e.options.Style
        	}
        	if e.options.UseSpeakerBoost != nil {
        		params["use_speaker_boost"] = *e.options.UseSpeakerBoost
        	}

        	config := map[string]interface{}{
        		"vendor": "elevenlabs",
        		"params": params,
        	}
        	if e.options.SkipPatterns != nil {
        		config["skip_patterns"] = e.options.SkipPatterns
        	}
        	return config
        }

        type MicrosoftTTSOptions struct {
        	Key          string
        	Region       string
        	VoiceName    string
        	SampleRate   *SampleRate
        	Speed        *float64
        	Volume       *float64
        	SkipPatterns []int
        }

        type MicrosoftTTS struct {
        	options MicrosoftTTSOptions
        }

        func NewMicrosoftTTS(opts MicrosoftTTSOptions) *MicrosoftTTS {
        	if opts.Key == "" {
        		panic("MicrosoftTTS requires Key")
        	}
        	if opts.Region == "" {
        		panic("MicrosoftTTS requires Region")
        	}
        	if opts.VoiceName == "" {
        		panic("MicrosoftTTS requires VoiceName")
        	}
        	return &MicrosoftTTS{options: opts}
        }

        func (m *MicrosoftTTS) GetSampleRate() *SampleRate {
        	return m.options.SampleRate
        }

        func (m *MicrosoftTTS) ToConfig() map[string]interface{} {
        	params := map[string]interface{}{
        		"key":        m.options.Key,
        		"region":     m.options.Region,
        		"voice_name": m.options.VoiceName,
        	}
        	if m.options.SampleRate != nil {
        		params["sample_rate"] = int(*m.options.SampleRate)
        	}
        	if m.options.Speed != nil {
        		params["speed"] = *m.options.Speed
        	}
        	if m.options.Volume != nil {
        		params["volume"] = *m.options.Volume
        	}

        	config := map[string]interface{}{
