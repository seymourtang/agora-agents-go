      docs/concepts/architecture.md: |
        ---
        sidebar_position: 1
        title: Architecture
        description: Two-layer architecture of the Agora Go SDK — Fern-generated client vs. hand-written agent layer.
        ---

        # Architecture

        The SDK is organized into two layers with distinct responsibilities.

        ## Layer Diagram

        ```
        ┌─────────────────────────────────────────────────────┐
        │                  Your Application                    │
        ├─────────────────────────────────────────────────────┤
        │  agentkit/         │  agentkit/vendors/              │
        │  ─────────         │  ────────────────               │
        │  NewAgent()        │  NewOpenAI()                    │
        │  CreateSession()   │  NewElevenLabsTTS()             │
        │  AgentOption funcs │  NewDeepgramSTT()               │
        │  Session lifecycle │  NewOpenAIRealtime()            │
        │  Token generation  │  NewLiveAvatarAvatar()          │
        │                    │  ... (30+ vendor constructors)  │
        ├─────────────────────────────────────────────────────┤
        │  client/           │  option/                        │
        │  ─────────         │  ────────                       │
        │  NewClient()       │  WithBaseURL()                  │
        │  client.Agents     │  WithHTTPClient()               │
        │  client.Telephony  │  WithBaseURL()                  │
        │  client.PhoneNums  │  WithArea()                     │
        │                    │  WithMaxAttempts()               │
        ├─────────────────────────────────────────────────────┤
        │  Agora (root)      │  core/                          │
        │  ──────────        │  ──────                         │
        │  Request/Response  │  HTTP caller, retries,          │
        │  types, pointer    │  Pool, Area, DNS resolver       │
        │  helpers, enums    │                                 │
        └─────────────────────────────────────────────────────┘
        ```

        ## Fern-Generated Layer (`client/`, `option/`, root types)

        Auto-generated from the Agora OpenAPI specification using [Fern](https://buildwithfern.com). This layer provides:

        - **Typed request/response structs** — `Agora.StartAgentsRequest`, `Agora.StartAgentsRequestProperties`, etc.
        - **Sub-clients** — `client.Agents`, `client.Telephony`, `client.PhoneNumbers`
        - **Request options** — authentication, retries, timeouts, custom headers
        - **Pointer helpers** — `Agora.String()`, `Agora.Bool()`, `Agora.Int()`, `Agora.Float64()` for optional fields
        - **Automatic retries** with exponential backoff

        All API methods on sub-clients take `context.Context` as the first argument:

        <!-- snippet: fragment -->
        ```go
        resp, err := c.Agents.Start(ctx, &Agora.StartAgentsRequest{...})
        ```

        ## Hand-Written Agentkit Layer (`agentkit/`, `agentkit/vendors/`)

        Built on top of the Fern-generated client. This layer provides:

        - **`agentkit.NewAgent`** — functional options pattern for building agent configurations
        - **Vendor constructors** — `vendors.NewOpenAI()`, `vendors.NewElevenLabsTTS()`, etc. with validation
        - **`agent.CreateSession`** — session lifecycle management (start, stop, say, interrupt, update)
        - **Automatic token generation** — generates RTC tokens from app credentials
        - **Sample rate validation** — prevents avatar/TTS sample rate mismatches at build time

        ## When to Use Which Layer

        | Use Case | Layer | Example |
        |---|---|---|
        | Build a conversational agent | `agentkit` | `NewAgent` -> `WithLlm` -> `WithTts` -> `CreateSession` -> `Start` |
        | Make a telephony call | `client` | `c.Telephony.Call(ctx, req)` |
        | Manage phone numbers | `client` | `c.PhoneNumbers.List(ctx, req)` |
        | Custom request construction | `client` | `c.Agents.Start(ctx, req)` with manually built properties |
        | Regional routing with DNS selection | `option` | `option.WithArea(option.AreaUS)` |

        ## Context Propagation

        All API calls in the Go SDK take `context.Context` as their first argument. This is idiomatic Go and enables:

        - **Timeouts:** `context.WithTimeout(ctx, 5*time.Second)`
        - **Cancellation:** `context.WithCancel(ctx)` for graceful shutdown
        - **Deadline propagation:** Pass request-scoped deadlines through the call chain

        <!-- snippet: fragment -->
        ```go
        ctx, cancel := context.WithTimeout(context.Background(), 10*time.Second)
        defer cancel()

        agentID, err := session.Start(ctx)
        if err != nil {
            log.Fatalf("Start failed: %v", err)
        }
        ```
      docs/concepts/vendors.md: |
        ---
        sidebar_position: 4
        title: Vendors
        description: Vendor catalog — LLM, TTS, STT, MLLM, and Avatar constructors with configuration structs.
        ---

        # Vendors

        The `agentkit/vendors` package provides constructor functions for all supported third-party vendors. Each vendor implements one of five interfaces: `LLM`, `TTS`, `STT`, `MLLM`, or `Avatar`.

        ## Vendor Interfaces

        <!-- snippet: fragment -->
        ```go
        type LLM interface {
            ToConfig() map[string]interface{}
        }

        type TTS interface {
            ToConfig() map[string]interface{}
            GetSampleRate() *SampleRate
        }

        type STT interface {
            ToConfig() map[string]interface{}
        }

        type MLLM interface {
            ToConfig() map[string]interface{}
        }

        type Avatar interface {
            ToConfig() map[string]interface{}
            RequiredSampleRate() SampleRate
        }
        ```

        ## LLM Vendors

        | Constructor | Options Struct | Required Fields | Default Model |
        |---|---|---|---|
        | `NewOpenAI` | `OpenAIOptions` | `APIKey` for BYOK; none for supported Agora-managed OpenAI models | `gpt-4o-mini` |
        | `NewAzureOpenAI` | `AzureOpenAIOptions` | `APIKey`, `Endpoint`, `DeploymentName` | — |
        | `NewAnthropic` | `AnthropicOptions` | `APIKey` | `claude-3-5-sonnet-20241022` |
        | `NewGemini` | `GeminiOptions` | `APIKey` | `gemini-2.0-flash-exp` |

        <!-- snippet: fragment -->
        ```go
        llm := vendors.NewOpenAI(vendors.OpenAIOptions{
            Model: "gpt-5-mini",
        })

        agent := agentkit.NewAgent(...).WithLlm(llm)
        ```

        ## TTS Vendors

        | Constructor | Options Struct | Required Fields |
        |---|---|---|
        | `NewElevenLabsTTS` | `ElevenLabsTTSOptions` | `Key`, `ModelID`, `VoiceID` |
        | `NewMicrosoftTTS` | `MicrosoftTTSOptions` | `Key`, `Region`, `VoiceName` |
        | `NewOpenAITTS` | `OpenAITTSOptions` | `Voice` for Agora-managed `tts-1`; `APIKey`, `Voice` for BYOK |
        | `NewCartesiaTTS` | `CartesiaTTSOptions` | `Key`, `VoiceID` |
        | `NewGoogleTTS` | `GoogleTTSOptions` | `Key`, `VoiceName` |
        | `NewAmazonTTS` | `AmazonTTSOptions` | `AccessKey`, `SecretKey`, `Region`, `VoiceID` |
        | `NewHumeAITTS` | `HumeAITTSOptions` | `Key` |
        | `NewRimeTTS` | `RimeTTSOptions` | `Key`, `Speaker` |
        | `NewFishAudioTTS` | `FishAudioTTSOptions` | `Key`, `ReferenceID` |
        | `NewGroqTTS` | `GroqTTSOptions` | `Key` |
        | `NewMiniMaxTTS` | `MiniMaxTTSOptions` | `Model` for supported Agora-managed MiniMax models; `Key`, `GroupID`, `Model` for BYOK |
        | `NewDeepgramTTS` | `DeepgramTTSOptions` | `APIKey`, `Model` |
        | `NewSarvamTTS` | `SarvamTTSOptions` | `APIKey` |

        <!-- snippet: fragment -->
        ```go
        tts := vendors.NewElevenLabsTTS(vendors.ElevenLabsTTSOptions{
            Key:        "<key>",
            ModelID:    "eleven_turbo_v2_5",
            VoiceID:    "<voice_id>",
            SampleRate: &vendors.SampleRate24kHz,
        })

        agent = agent.WithTts(tts)
        ```

        ### SampleRate Constants

        <!-- snippet: fragment -->
        ```go
        vendors.SampleRate8kHz   // 8000
        vendors.SampleRate16kHz  // 16000
        vendors.SampleRate22kHz  // 22050
        vendors.SampleRate24kHz  // 24000
        vendors.SampleRate44kHz  // 44100
        vendors.SampleRate48kHz  // 48000
        ```

        Note: `OpenAITTS` always returns `SampleRate24kHz`. Other TTS vendors return their configured sample rate or `nil`.

        ## STT Vendors

        | Constructor | Options Struct | Required Fields |
        |---|---|---|
        | `NewSpeechmaticsSTT` | `SpeechmaticsSTTOptions` | `APIKey` |
        | `NewDeepgramSTT` | `DeepgramSTTOptions` | `APIKey` for BYOK; none for supported Agora-managed Deepgram models |
        | `NewMicrosoftSTT` | `MicrosoftSTTOptions` | `Key`, `Region` |
        | `NewOpenAISTT` | `OpenAISTTOptions` | `APIKey` |
        | `NewGoogleSTT` | `GoogleSTTOptions` | `Key` |
        | `NewAmazonSTT` | `AmazonSTTOptions` | `AccessKey`, `SecretKey`, `Region` |
        | `NewAssemblyAISTT` | `AssemblyAISTTOptions` | `APIKey` |
        | `NewAresSTT` | `AresSTTOptions` | None |
        | `NewSarvamSTT` | `SarvamSTTOptions` | `APIKey` |

        <!-- snippet: fragment -->
        ```go
        stt := vendors.NewDeepgramSTT(vendors.DeepgramSTTOptions{
            APIKey:   "<key>",
            Model:    "nova-2",
            Language: "en-US",
        })

        agent = agent.WithStt(stt)
        ```

        ## MLLM Vendors

        | Constructor | Options Struct | Required Fields | Default Model |
        |---|---|---|---|
        | `NewOpenAIRealtime` | `OpenAIRealtimeOptions` | `APIKey` | `gpt-4o-realtime-preview` |
        | `NewGeminiLive` | `GeminiLiveOptions` | `APIKey`, `Model` | — |
        | `NewVertexAI` | `VertexAIOptions` | `ProjectID` | `gemini-2.0-flash-exp` |

        <!-- snippet: fragment -->
        ```go
        mllm := vendors.NewOpenAIRealtime(vendors.OpenAIRealtimeOptions{
            APIKey: "<key>",
            Model:  "gpt-4o-realtime-preview",
            Params: map[string]interface{}{
                "voice": "alloy",
            },
        })

        agent = agent.WithMllm(mllm)
        ```

        ## Avatar Vendors

        | Constructor | Options Struct | Required Fields | Required TTS Sample Rate |
        |---|---|---|---|
        | `NewLiveAvatarAvatar` | `LiveAvatarAvatarOptions` | `APIKey`, `Quality`, `AgoraUID` | 24kHz |
        | `NewGenericAvatar` | `GenericAvatarOptions` | `APIKey`, `APIBaseURL`, `AvatarID`, `AgoraUID` | Provider-dependent |
        | `NewAnamAvatar` | `AnamAvatarOptions` | `APIKey` | Provider-managed |
        | `NewAkoolAvatar` | `AkoolAvatarOptions` | `APIKey` | 16kHz |
        | `NewHeyGenAvatar` | `HeyGenAvatarOptions` | `APIKey`, `Quality`, `AgoraUID` | 24kHz; deprecated alias |

        <!-- snippet: fragment -->
        ```go
        avatar := vendors.NewLiveAvatarAvatar(vendors.LiveAvatarAvatarOptions{
            APIKey:   "<key>",
            Quality:  "high",
            AgoraUID: "2001",
        })

        // TTS must be configured with matching sample rate BEFORE WithAvatar
        agent = agent.WithTts(tts).WithAvatar(avatar)
        ```

        See [Avatars Guide](../guides/avatars.md) for sample rate requirements and the panic behavior when rates mismatch.

        ## Validation

        All vendor constructors validate required fields and `panic` if they are missing. For example:

        <!-- snippet: fragment -->
        ```go
        // This panics because gpt-4o is not a supported Agora-managed model.
        vendors.NewOpenAI(vendors.OpenAIOptions{Model: "gpt-4o"})
        ```

        This is Go-idiomatic for configuration errors that indicate programmer mistakes rather than runtime conditions. Handle these by ensuring BYOK fields are populated when you are not using a supported Agora-managed model.
      docs/getting-started/authentication.md: |
        ---
        sidebar_position: 2
        title: Authentication
        description: Configure the Go SDK with the recommended app-credentials flow and understand the supported auth modes.
        ---

        # Authentication

        The recommended production path is app credentials mode.

        Create `AgoraClient` with `AppID` and `AppCertificate`, then let `AgentSession` generate the ConvoAI REST auth token and the RTC join token automatically.

        ## Recommended: app credentials

        ```go
        package main

        import (
            "github.com/AgoraIO/agora-agents-go/agentkit"
            "github.com/AgoraIO/agora-agents-go/option"
        )

        func main() {
            client := agentkit.NewAgoraClient(agentkit.AgoraClientOptions{
                Area:           option.AreaUS,
                AppID:          "your-app-id",
                AppCertificate: "your-app-certificate",
            })

            _ = client
        }
        ```

        ## Why this is the default

        - The SDK handles ConvoAI REST auth and RTC join token generation for you.
        - Your onboarding code stays focused on agent behavior instead of auth plumbing.
        - Your quick start code stays vendor-key free when you use supported Agora-managed models.

        ## Legacy auth modes

        The generated low-level client still contains legacy auth hooks for prebuilt REST tokens and HTTP Basic Auth. Do not use those for new session integrations. Use app credentials so AgentKit can mint short-lived ConvoAI REST auth and RTC join tokens for each session.

        ## Inspecting the resolved auth mode

        ```go
        import "fmt"

        fmt.Println(client.AuthMode) // "app-credentials"
        ```
      docs/getting-started/installation.md: |
        ---
        sidebar_position: 1
        title: Installation
        description: Install the Agora Conversational AI Go SDK and configure your project.
        ---

        # Installation

        ## Prerequisites

        - **Go 1.21** or later

        ## Install

        ```sh
        go get github.com/AgoraIO/agora-agents-go
        ```

        ## Import Paths

        The SDK is organized into several packages. Import the ones you need:

        ```go
        // Root package — type definitions, pointer helpers (Agora.String(), Agora.Bool(), etc.), environments
        Agora "github.com/AgoraIO/agora-agents-go"

        // Fern-generated client — low-level API access
        "github.com/AgoraIO/agora-agents-go/client"

        // Request options — authentication, base URL, retries, HTTP client
        "github.com/AgoraIO/agora-agents-go/option"

        // Wrapper layer — Agent builder with functional options, session lifecycle
        "github.com/AgoraIO/agora-agents-go/agentkit"

        // Vendor constructors — LLM, TTS, STT, MLLM, and Avatar vendors
        "github.com/AgoraIO/agora-agents-go/agentkit/vendors"
        ```

        ## Verify Installation

        ```go
        package main

        import (
            "fmt"

            Agora "github.com/AgoraIO/agora-agents-go"
        )

        func main() {
            fmt.Println("Default API endpoint:", Agora.Environments.Default)
        }
        ```

        ```sh
        go run main.go
        # Output: Default API endpoint: https://api.agora.io/api/conversational-ai-agent
        ```

        ## Next Steps

        - [Authentication](./authentication.md) — configure your credentials
        - [Quick Start](./quick-start.md) — build your first conversational agent

        ## Migrating from a previous module path

        In v2.0.0 the Go module and repository moved to `github.com/AgoraIO/agora-agents-go` ([AgoraIO/agora-agents-go](https://github.com/AgoraIO/agora-agents-go)). Replace `github.com/AgoraIO-Conversational-AI/agent-server-sdk-go` in `go.mod` and in all import paths, then run `go mod tidy`.

        For the full change list, see [changelog — v2.0.0](../../changelog.md#v200--2026-05-21).
      docs/getting-started/quick-start.md: |
        ---
        sidebar_position: 3
        title: Quick Start
        description: Build and run your first Agora Conversational AI agent in Go with app credentials and the builder API.
        ---

        # Quick Start

        This guide uses the recommended onboarding path:

        - `AppID`, `AppCertificate`, and `Area` on `AgoraClient`
        - the `Agent` builder with `WithStt()`, `WithLlm()`, and `WithTts()`
        - automatic ConvoAI REST auth and RTC join token generation
        - no vendor API keys in application code

        ## Full example

        ```go
        package main

        import (
            "context"
            "fmt"
            "log"

            "github.com/AgoraIO/agora-agents-go/agentkit"
            "github.com/AgoraIO/agora-agents-go/agentkit/vendors"
            "github.com/AgoraIO/agora-agents-go/option"
        )

        func main() {
            ctx := context.Background()
            idleTimeout := 120

            client := agentkit.NewAgoraClient(agentkit.AgoraClientOptions{
                Area:           option.AreaUS,
                AppID:          "your-app-id",
                AppCertificate: "your-app-certificate",
            })

            agent := agentkit.NewAgent(
                agentkit.WithName("support-assistant"),
                agentkit.WithInstructions("You are a concise support voice assistant."),
                agentkit.WithGreeting("Hello! How can I help you today?"),
                agentkit.WithMaxHistory(10),
            ).WithStt(
                vendors.NewDeepgramSTT(vendors.DeepgramSTTOptions{
                    Model:    "nova-3",
                    Language: "en",
                }),
            ).WithLlm(
                vendors.NewOpenAI(vendors.OpenAIOptions{
                    Model: "gpt-5-mini",
                }),
            ).WithTts(
                vendors.NewOpenAITTS(vendors.OpenAITTSOptions{
                    Model: "tts-1",
                    Voice: "alloy",
                }),
            )

            session := agent.CreateSession(client, agentkit.CreateSessionOptions{
                Channel:     "support-room-123",
                AgentUID:    "1",
                RemoteUIDs:  []string{"100"},
                IdleTimeout: &idleTimeout,
            })

            agentSessionID, err := session.Start(ctx)
            if err != nil {
                log.Fatal(err)
            }
            fmt.Println("Agent started:", agentSessionID)

            if err := session.Say(ctx, "Thanks for calling Agora support.", nil, nil); err != nil {
                log.Fatal(err)
            }
            if err := session.Stop(ctx); err != nil {
                log.Fatal(err)
            }
        }
        ```

        ## What this does

        1. `AgoraClient` runs in app-credentials mode when you pass `AppID` and `AppCertificate` only.
        2. `Agent` holds reusable behavior such as instructions, greeting, and history settings.
        3. Vendor constructors on the builder select the ASR, LLM, and TTS stack. AgentKit uses Agora-managed configuration when credentials are omitted for supported models.
        4. `session.Start(...)` lets the SDK generate the required auth tokens automatically.
        5. `session.Start(...)` returns the unique agent session ID.

        ## When to use BYOK instead

        Use the builder without vendor API keys when you want the fastest path with Agora-managed models.

        Use BYOK when you need to:

        - supply your own vendor API keys
        - use models outside the Agora-managed catalog
        - point at custom vendor endpoints
        - manage vendor-specific parameters directly

        See [BYOK Guide](../guides/byok.md).

        ## Next steps

        - [Authentication](./authentication.md)
        - [BYOK Guide](../guides/byok.md)
        - [MLLM Flow](../guides/mllm-flow.md)
        - [Agent Reference](../reference/agent.md)
      docs/guides/advanced.md: |
        ---
        sidebar_position: 8
        title: Advanced
        description: Timeouts, cancellation, stopping by agent ID, raw responses, and generated-client escape hatches.
        ---

        # Advanced

        The default path for realtime agents is still AgentKit with app credentials:

        ```go
        client := agentkit.NewAgoraClient(agentkit.AgoraClientOptions{
            Area:           option.AreaUS,
            AppID:          "your-app-id",
            AppCertificate: "your-app-certificate",
        })
        ```

        That client keeps auth out of your request code: session methods mint ConvoAI REST auth and RTC join tokens from `AppID` and `AppCertificate`.

        ## Timeouts

        Use `context.WithTimeout` for request-scoped timeouts:

        ```go
        ctx, cancel := context.WithTimeout(context.Background(), 30*time.Second)
        defer cancel()

        agentID, err := session.Start(ctx)
        if err != nil {
            return err
        }
        _ = agentID
        ```

        ## Cancellation

        Use `context.WithCancel` when your server needs to abort work after a client disconnects or workflow cancellation:

        ```go
        ctx, cancel := context.WithCancel(context.Background())
        defer cancel()

        go func() {
            <-done
            cancel()
        }()

        if err := session.Stop(ctx); err != nil {
            return err
        }
        ```

        ## Stop Without A Session Handle

        Use `StopAgent` when a later request handler only has the agent session ID. It uses the same app credentials to generate the required ConvoAI REST auth header.

        ```go
        if err := client.StopAgent(ctx, agentID); err != nil {
            return err
        }
        ```

        ## Raw Responses

        The generated clients expose `WithRawResponse` for advanced debugging of status codes and headers. Keep session lifecycle code on AgentKit unless you specifically need a generated-client escape hatch.

        ```go
        resp, err := client.Agents.WithRawResponse.Get(ctx, req)
        if err != nil {
            return err
        }

        fmt.Println(resp.StatusCode)
        fmt.Println(resp.Header)
        fmt.Println(resp.Body)
        ```

        ## Generated-Client Options

        Generated-client request options such as `option.WithMaxAttempts`, `option.WithHTTPHeader`, and `option.WithQueryParameters` are available for low-level REST calls. They are advanced tools and are not needed for the recommended AgentKit session flow.
      docs/guides/avatars.md: |
        ---
        sidebar_position: 3
        title: Avatars
        description: Add visual avatars to your agent with token handling and sample rate requirements.
        ---

        # Avatars

        Avatars provide a visual representation of your AI agent. The SDK supports LiveAvatar, Generic Avatar, Anam, Akool, and deprecated HeyGen integrations. Avatar sessions currently require the cascading ASR/LLM/TTS pipeline; MLLM sessions do not support avatars. Vendors that publish an Agora video stream use a separate avatar UID and token from the voice agent.

        ## Agent Token vs Avatar Token

        Voice agents and video avatars both use ConvoAI-compatible Agora tokens. They must be scoped to different UIDs:

        | Purpose | Field | UID | Default behavior |
        |---|---|---|---|
        | Voice agent | `properties.token` | `agent_rtc_uid` | Generated from session `AgentUID` when `Token` is omitted |
        | Avatar video stream | `avatar.params.agora_token` | `avatar.params.agora_uid` | Generated from avatar `AgoraUID` when `AgoraToken` is omitted |

        Use a unique avatar `AgoraUID`; do not reuse the session `AgentUID`. If you provide `AgoraToken`, the SDK uses it as-is and does not overwrite it.

        ## Avatar Vendors

        | Vendor | Constructor | Required Sample Rate | Required Fields |
        |---|---|---|---|
        | LiveAvatar | `vendors.NewLiveAvatarAvatar` | 24kHz (`SampleRate24kHz`) | `APIKey`, `Quality` (low/medium/high), `AgoraUID` |
        | HeyGen (deprecated name) | `vendors.NewHeyGenAvatar` | 24kHz (`SampleRate24kHz`) | `APIKey`, `Quality` (low/medium/high), `AgoraUID` |
        | Akool | `vendors.NewAkoolAvatar` | 16kHz (`SampleRate16kHz`) | `APIKey` |
        | Anam | `vendors.NewAnamAvatar` | Provider-managed | `APIKey` |
        | Generic | `vendors.NewGenericAvatar` | Vendor-dependent; not enforced by AgentKit | `APIKey`, `APIBaseURL`, `AvatarID`, `AgoraUID` |

        ## Generic Avatar Example

        ```go
        sampleRate := vendors.SampleRate24kHz // or 16kHz, depending on your provider

        agent := agentkit.NewAgent(
            agentkit.WithName("generic-avatar"),
        ).WithLlm(
            vendors.NewOpenAI(vendors.OpenAIOptions{APIKey: "<openai_key>"}),
        ).WithTts(
            vendors.NewElevenLabsTTS(vendors.ElevenLabsTTSOptions{
                Key:        "<elevenlabs_key>",
                ModelID:    "eleven_turbo_v2_5",
                VoiceID:    "<voice_id>",
                // Choose the sample rate required by your generic avatar provider.
                SampleRate: &sampleRate,
            }),
        ).WithAvatar(
            vendors.NewGenericAvatar(vendors.GenericAvatarOptions{
                APIKey:     "<avatar_vendor_key>",
                APIBaseURL: "https://avatar.example.com",
                AvatarID:   "<avatar_id>",
                AgoraUID:   "2001", // distinct from session AgentUID
            }),
        )
        ```

        For Generic avatars, `agora_appid`, `agora_channel`, and `agora_token` are filled from the session when omitted. For LiveAvatar and HeyGen, AgentKit auto-generates only `agora_token` when `agora_uid` is set and `agora_token` is omitted.

        ## LiveAvatar Example

        ```go
        package main

        import (
            "context"
            "fmt"
            "log"

            "github.com/AgoraIO/agora-agents-go/agentkit"
            "github.com/AgoraIO/agora-agents-go/agentkit/vendors"
            "github.com/AgoraIO/agora-agents-go/option"
        )

        func main() {
            client := agentkit.NewAgoraClient(agentkit.AgoraClientOptions{
                Area:           option.AreaUS,
                AppID:          "<app_id>",
                AppCertificate: "<app_cert>",
            })

            sr := vendors.SampleRate24kHz

            agent := agentkit.NewAgent(
                agentkit.WithName("avatar-agent"),
                agentkit.WithInstructions("You are a friendly virtual assistant with a visual avatar."),
                agentkit.WithGreeting("Hello! I can see you and you can see me!"),
            ).WithLlm(
                vendors.NewOpenAI(vendors.OpenAIOptions{
                    APIKey: "<openai_key>",
                }),
            ).WithTts(
                // TTS sample rate MUST match the avatar's required rate (24kHz for LiveAvatar).
                vendors.NewElevenLabsTTS(vendors.ElevenLabsTTSOptions{
                    Key:        "<elevenlabs_key>",
                    ModelID:    "eleven_turbo_v2_5",
                    VoiceID:    "<voice_id>",
                    SampleRate: &sr,
                }),
            ).WithStt(
                vendors.NewDeepgramSTT(vendors.DeepgramSTTOptions{
                    APIKey: "<deepgram_key>",
                }),
            ).WithAvatar(
                vendors.NewLiveAvatarAvatar(vendors.LiveAvatarAvatarOptions{
                    APIKey:   "<liveavatar_key>",
                    Quality:  "high",
                    AgoraUID: "2001",
                }),
            )

            session := agent.CreateSession(client, agentkit.CreateSessionOptions{
                Channel:    "avatar-channel",
                AgentUID:   "1001",
                RemoteUIDs: []string{"1002"},
            })

            ctx := context.Background()

            agentID, err := session.Start(ctx)
            if err != nil {
                log.Fatalf("Failed to start: %v", err)
            }
            fmt.Println("Avatar agent running:", agentID)

            err = session.Stop(ctx)
            if err != nil {
                log.Fatalf("Failed to stop: %v", err)
            }
        }
        ```

        ## Akool Avatar Example

        ```go
        sr := vendors.SampleRate16kHz

        agent := agentkit.NewAgent(
            agentkit.WithName("akool-avatar"),
            agentkit.WithInstructions("You are a virtual presenter."),
        ).WithLlm(
            vendors.NewOpenAI(vendors.OpenAIOptions{
                APIKey: "<openai_key>",
            }),
        ).WithTts(
            // Akool requires 16kHz
            vendors.NewElevenLabsTTS(vendors.ElevenLabsTTSOptions{
                Key:        "<elevenlabs_key>",
                ModelID:    "eleven_turbo_v2_5",
                VoiceID:    "<voice_id>",
                SampleRate: &sr,
            }),
        ).WithStt(
            vendors.NewDeepgramSTT(vendors.DeepgramSTTOptions{
                APIKey: "<deepgram_key>",
            }),
        ).WithAvatar(
            vendors.NewAkoolAvatar(vendors.AkoolAvatarOptions{
                APIKey: "<akool_key>",
            }),
        )
        ```

        ## Sample Rate Validation and Panic Behavior

        The Go SDK enforces the TTS/avatar sample rate constraint at runtime using `panic()`. This differs from TypeScript (compile-time phantom types) and Python (`ValueError`).

        ### When does the panic occur?

        `WithAvatar()` checks if the agent already has a TTS configured with a mismatched sample rate. If so, it panics immediately:

        ```
        Avatar requires TTS sample rate of 24000 Hz, but TTS is configured with 16000 Hz. Please update your TTS sample_rate to 24000.
        ```

        ### Why panic instead of returning an error?

        In Go, `panic` is idiomatic for programmer errors — configuration mistakes that should be caught during development, not handled at runtime. A sample rate mismatch is a static configuration error, not a transient failure.

        ### How to prevent the panic

        Always configure TTS with the correct sample rate **before** calling `WithAvatar()`:

        ```go
        // Correct: TTS sample rate matches avatar requirement
        sr := vendors.SampleRate24kHz
        agent := agentkit.NewAgent(...).
            WithTts(vendors.NewElevenLabsTTS(vendors.ElevenLabsTTSOptions{
                Key:        "<key>",
                ModelID:    "<model>",
                VoiceID:    "<voice>",
                SampleRate: &sr,           // 24kHz for LiveAvatar
            })).
            WithAvatar(vendors.NewLiveAvatarAvatar(vendors.LiveAvatarAvatarOptions{
                APIKey:   "<key>",
                Quality:  "high",
                AgoraUID: "2001",
            }))
        ```

        ```go
        // Wrong: This panics because TTS is 16kHz but LiveAvatar requires 24kHz.
        sr := vendors.SampleRate16kHz
        agent := agentkit.NewAgent(...).
            WithTts(vendors.NewElevenLabsTTS(vendors.ElevenLabsTTSOptions{
                Key:        "<key>",
                ModelID:    "<model>",
                VoiceID:    "<voice>",
                SampleRate: &sr,           // 16kHz — mismatch!
            })).
            WithAvatar(vendors.NewLiveAvatarAvatar(vendors.LiveAvatarAvatarOptions{
                APIKey:   "<key>",
                Quality:  "high",
                AgoraUID: "2001",
            }))
        // panic: Avatar requires TTS sample rate of 24000 Hz, but TTS is configured with 16000 Hz. Please update your TTS sample_rate to 24000.
        ```

        ### Additional validation at Start

        `AgentSession.Start()` also validates the sample rate match before making the API call. If the mismatch was introduced after `WithAvatar()` (e.g., by cloning the agent with a different TTS), `Start()` returns an error instead of panicking.

        ## LiveAvatarAvatarOptions Fields

        | Field | Type | Required | Description |
        |---|---|---|---|
        | `APIKey` | `string` | Yes | LiveAvatar API key |
        | `Quality` | `string` | Yes | `"low"`, `"medium"`, or `"high"` |
        | `AgoraUID` | `string` | Yes | UID for the avatar's video stream |
        | `AgoraToken` | `string` | No | Avatar token. Auto-generated when omitted. |
        | `AvatarID` | `string` | No | LiveAvatar avatar ID |
        | `Enable` | `*bool` | No | Enable or disable the avatar |
        | `DisableIdleTimeout` | `*bool` | No | Disable the idle timeout |
        | `ActivityIdleTimeout` | `*int` | No | Idle timeout in seconds |
        | `AdditionalParams` | `map[string]interface{}` | No | Additional vendor params |

        ## AkoolAvatarOptions Fields

        | Field | Type | Required | Description |
        |---|---|---|---|
        | `APIKey` | `string` | Yes | Akool API key |
      docs/guides/byok.md: |
        ---
        sidebar_position: 4
        title: BYOK
        description: Bring your own vendor credentials and use custom vendor configuration with the Go SDK.
        ---

        # BYOK

        Use BYOK when you want to provide vendor credentials yourself instead of using Agora-managed models.

        Typical reasons:

        - you need a vendor model that is not part of the Agora-managed catalog
        - you want to point to a custom endpoint
        - you want direct control over vendor-specific parameters
        - your organization manages vendor billing separately from Agora

        ## Full example

        ```go
        package main

        import (
            "context"
            "fmt"
            "log"
            "os"

            "github.com/AgoraIO/agora-agents-go/agentkit"
            "github.com/AgoraIO/agora-agents-go/agentkit/vendors"
            "github.com/AgoraIO/agora-agents-go/option"
        )

        func main() {
            ctx := context.Background()
            idleTimeout := 120

            client := agentkit.NewAgoraClient(agentkit.AgoraClientOptions{
                Area:           option.AreaUS,
                AppID:          "your-app-id",
                AppCertificate: "your-app-certificate",
            })

            // In BYOK mode, each vendor carries its own credentials.
            agent := agentkit.NewAgent(
                agentkit.WithName("support-assistant"),
                agentkit.WithInstructions("You are a concise support voice assistant."),
                agentkit.WithGreeting("Hello! How can I help you today?"),
                agentkit.WithMaxHistory(10),
            ).WithStt(vendors.NewDeepgramSTT(vendors.DeepgramSTTOptions{
                APIKey:   os.Getenv("DEEPGRAM_API_KEY"),
                Model:    "nova-3",
                Language: "en-US",
            })).WithLlm(vendors.NewOpenAI(vendors.OpenAIOptions{
                APIKey: os.Getenv("OPENAI_API_KEY"),
                Model:  "gpt-4o-mini",
            })).WithTts(vendors.NewElevenLabsTTS(vendors.ElevenLabsTTSOptions{
                Key:        os.Getenv("ELEVENLABS_API_KEY"),
                ModelID:    "eleven_flash_v2_5",
                VoiceID:    os.Getenv("ELEVENLABS_VOICE_ID"),
                SampleRate: 24000,
            }))

            session := agent.CreateSession(client, agentkit.CreateSessionOptions{
                Channel:     "support-room-123",
                AgentUID:    "1",
                RemoteUIDs:  []string{"100"},
                IdleTimeout: &idleTimeout,
            })

            agentSessionID, err := session.Start(ctx)
            if err != nil {
                log.Fatal(err)
            }
            fmt.Println("Agent started:", agentSessionID)

            if err := session.Stop(ctx); err != nil {
                log.Fatal(err)
            }
        }
        ```

        ## Agora-managed models vs BYOK

        - Agora-managed models: fastest path, no vendor keys in app code
        - BYOK: most control, your keys and your vendor configuration
      docs/guides/error-handling.md: |
        ---
        sidebar_position: 6
        title: Error Handling
        description: Handle API errors with core.APIError and errors.As.
        ---

        # Error Handling

        When the API returns a non-success status code (4xx or 5xx response), the SDK returns a `*core.APIError`. Use `errors.As` to inspect it:

        ```go
        package main

        import (
            "errors"
            "fmt"
            "log"
            "net/http"

            core "github.com/AgoraIO/agora-agents-go/core"
        )

        func main() {
            resp, err := client.Agents.Start(ctx, req)
            if err != nil {
                var apiErr *core.APIError
                if errors.As(err, &apiErr) {
                    fmt.Println("Status:", apiErr.StatusCode)
                    fmt.Println("Message:", apiErr.Error())
                    fmt.Println("Headers:", apiErr.Header)
                } else {
                    log.Fatal(err)
                }
                return
            }
            _ = resp
        }
        ```

        ## APIError Fields

        | Field | Type | Description |
        |-------|------|--------------|
        | `StatusCode` | `int` | HTTP status code (e.g., 400, 404, 500) |
        | `Header` | `http.Header` | Response headers |
        | `Error()` | `string` | Combined status and message |

        ## v2.7 Reason Codes

        v2.7 error responses may include a provider-specific `reason` field in the JSON body. The generated `core.APIError` preserves the raw response body in `Error()`, so you can parse it when you need machine-readable handling:

        ```go
        type agentErrorBody struct {
            Message string `json:"message"`
            Reason  string `json:"reason"`
        }

        var apiErr *core.APIError
        if errors.As(err, &apiErr) {
            var body agentErrorBody
            if json.Unmarshal([]byte(apiErr.Unwrap().Error()), &body) == nil {
                switch body.Reason {
                case "invalid_vendor_config":
                    // Prompt the user to verify vendor credentials or model fields.
                case "token_expired":
                    // Regenerate the session or avatar token and retry.
                }
            }
        }
        ```

        Use `StatusCode` for broad retry behavior and `reason` for actionable user-facing remediation.

        ## Graceful 404 Handling

        For operations like `Stop` where a 404 may indicate the agent was already stopped, check the status code:

        ```go
        err := session.Stop(ctx)
        if err != nil {
            var apiErr *core.APIError
            if errors.As(err, &apiErr) && apiErr.StatusCode == http.StatusNotFound {
                // Agent already stopped or never existed — treat as success
                return nil
            }
            return err
        }
        ```

        Use this for both the agentkit layer (e.g. `session.Start()`, `session.Stop()`) and direct client calls (`client.Agents.Start(...)`).
      docs/guides/low-level-api.md: |
        ---
        sidebar_position: 9
        title: Low-Level API
        description: Use generated clients for advanced operations while keeping app-credentials auth as the default.
        ---

        # Low-Level API

        For starting and managing realtime agent sessions, prefer the AgentKit builder:

        - create `agentkit.NewAgoraClient` with `AppID` and `AppCertificate`
        - configure vendors with `WithStt`, `WithLlm`, `WithTts`, or `WithMllm`
        - call `session.Start(ctx)`, `session.Say(ctx, ...)`, `session.Update(ctx, ...)`, and `session.Stop(ctx)`

        That path generates ConvoAI REST auth and RTC join tokens from app credentials, so application code does not need prebuilt REST tokens, RTC tokens, Customer ID, or Customer Secret.

        ## Generated Clients

        The SDK also exposes generated clients for API surfaces that are not part of the AgentKit session lifecycle:

        - `client.Telephony` for call status and hangup operations
        - `client.PhoneNumbers` for phone-number list, create, retrieve, update, and delete operations
        - `client.AgentManagement` for management actions such as `agent-think`

        Use these when you need direct REST API coverage. For new session starts, use AgentKit instead of manually constructing `StartAgentsRequest` because AgentKit owns token generation and Agora-managed model resolution.

        ## App-Credentials Client

        ```go
        package main

        import (
            "github.com/AgoraIO/agora-agents-go/agentkit"
            "github.com/AgoraIO/agora-agents-go/option"
        )

        func main() {
            client := agentkit.NewAgoraClient(agentkit.AgoraClientOptions{
                Area:           option.AreaUS,
                AppID:          "your-app-id",
                AppCertificate: "your-app-certificate",
            })

            _ = client.Telephony
            _ = client.PhoneNumbers
            _ = client.AgentManagement
        }
        ```

        ## Stopping By Agent ID

        If you need to stop an agent from a separate request handler and do not have the original `AgentSession`, use `StopAgent`. It uses the same app credentials to mint the required ConvoAI REST auth header.

        ```go
        if err := client.StopAgent(ctx, agentID); err != nil {
            return err
        }
        ```

        ## Raw Types

        Generated request and response types are still useful for strongly typed values, pointer helpers, and advanced payload construction. The root package exposes helpers such as `Agora.String`, `Agora.Bool`, `Agora.Int`, and `Agora.Float64` for optional fields.

        ```go
        import Agora "github.com/AgoraIO/agora-agents-go"

        idleTimeout := Agora.Int(120)
        greeting := Agora.String("Hello! How can I help?")
        ```

        For full generated method signatures, see [reference.md](../../reference.md).
      docs/guides/mllm-flow.md: |
        ---
        sidebar_position: 2
        title: MLLM Flow
        description: Use multimodal models (OpenAI Realtime, Gemini Live) for real-time audio processing.
        ---

        # MLLM Flow (Multimodal)

        The MLLM flow uses a single multimodal model to process audio input and generate audio output directly, bypassing the ASR -> LLM -> TTS chain. This provides lower latency and more natural conversational behavior.

        ## Enabling MLLM Mode

        Call `WithMllm(vendor)` to enable MLLM mode. The builder sets `mllm.enable = true` automatically.

        ```go
        agent := agentkit.NewAgent(
            agentkit.WithName("realtime-agent"),
        ).WithMllm(vendor)
        ```

        ## OpenAI Realtime Example

        ```go
        package main

        import (
            "context"
            "fmt"
            "log"

            Agora "github.com/AgoraIO/agora-agents-go"
            "github.com/AgoraIO/agora-agents-go/agentkit"
            "github.com/AgoraIO/agora-agents-go/agentkit/vendors"
            "github.com/AgoraIO/agora-agents-go/option"
        )

        func main() {
            client := agentkit.NewAgoraClient(agentkit.AgoraClientOptions{
                Area:           option.AreaUS,
                AppID:          "<app_id>",
                AppCertificate: "<app_cert>",
            })

            agent := agentkit.NewAgent(
                agentkit.WithName("openai-realtime"),
            ).WithMllm(
                vendors.NewOpenAIRealtime(vendors.OpenAIRealtimeOptions{
                    APIKey: "<openai_key>",
                    Model:  "gpt-4o-realtime-preview",
                    Params: map[string]interface{}{
                        "voice": "alloy",
                    },
                }),
            )

            session := agent.CreateSession(client, agentkit.CreateSessionOptions{
                Channel:    "realtime-channel",
                AgentUID:   "1001",
                RemoteUIDs: []string{"1002"},
            })

            ctx := context.Background()

            agentID, err := session.Start(ctx)
            if err != nil {
                log.Fatalf("Failed to start: %v", err)
            }
            fmt.Println("Realtime agent running:", agentID)

            err = session.Stop(ctx)
            if err != nil {
                log.Fatalf("Failed to stop: %v", err)
            }
        }
        ```

        ## Gemini Live Example

        ```go
        agent := agentkit.NewAgent(
            agentkit.WithName("gemini-live"),
        ).WithMllm(
            vendors.NewGeminiLive(vendors.GeminiLiveOptions{
                APIKey:       "<google_ai_api_key>",
                Model:        "gemini-live-2.5-flash",
                Instructions: "You are a helpful assistant.",
                Voice:        "Puck",
            }),
        )
        ```

        ## MLLM with Turn Detection

        Configure MLLM turn detection on the MLLM vendor with `TurnDetection`. When set, `mllm.turn_detection` overrides the top-level `turn_detection` object.

        Example:

        ```go
        agent := agentkit.NewAgent(
            agentkit.WithName("realtime-vad"),
        ).WithMllm(
            vendors.NewOpenAIRealtime(vendors.OpenAIRealtimeOptions{
                APIKey: "<openai_key>",
                TurnDetection: &Agora.StartAgentsRequestPropertiesMllmTurnDetection{
                    Mode: Agora.StartAgentsRequestPropertiesMllmTurnDetectionModeServerVad.Ptr(),
                    ServerVadConfig: &Agora.StartAgentsRequestPropertiesMllmTurnDetectionServerVadConfig{
                        IdleTimeoutMs: Agora.Int(5000),
                    },
                },
            }),
        )
        ```

        ## Low-Level Usage

        Use AgentKit for MLLM session starts. It keeps the app-credentials flow intact and generates the required REST and RTC tokens from `AppID` and `AppCertificate`. See [Low-Level API](./low-level-api.md) for generated-client escape hatches that are outside the realtime session lifecycle.

        ## Pointer Helper Functions

        MLLM configuration makes heavy use of pointer helpers for optional fields:

        | Helper | Type | Example |
        |---|---|---|
        | `Agora.Bool(true)` | `*bool` | `Enable: Agora.Bool(true)` |
        | `Agora.String("...")` | `*string` | `APIKey: Agora.String("<key>")` |
        | `Agora.Int(120)` | `*int` | `IdleTimeout: Agora.Int(120)` |
        | `Agora.Float64(0.5)` | `*float64` | `Threshold: Agora.Float64(0.5)` |

        These exist because Go does not allow taking the address of a literal value (`&true` is invalid). The helpers return pointers to the given values.

        ## Key Differences from Cascading Flow

        | Aspect | Cascading | MLLM |
        |---|---|---|
        | Vendors required | LLM + TTS (STT optional) | MLLM only |
        | Audio processing | Three-step chain | Single model, end-to-end |
        | Latency | Higher (3 network hops) | Lower (1 network hop) |
        | `mllm.enable` | Not set or `false` | Must be `Agora.Bool(true)` |
