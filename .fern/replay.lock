    content_hash: sha256:453756061bb6646e37c2f827a58304ced36cd0be7f42a10e6853cfc6d5380c1d
    original_commit: 852b156e44335a71267d317d1763e17de777086f
    original_message: "feat(agentkit): support agent-level PipelineID"
    original_author: Hermes (agora) <hermes.frangoudis@agora.io>
    base_generation: c4aa7f3f4149df2c33a5da7310c5b191f3322a5a
    files:
      - agentkit/agent.go
      - agentkit/agent_session.go
      - agentkit/pipeline_id_test.go
      - docs/reference/session.md
    patch_content: |
      diff --git a/agentkit/agent.go b/agentkit/agent.go
      index 81af53c..2aab217 100644
      --- a/agentkit/agent.go
      +++ b/agentkit/agent.go
      @@ -340,6 +340,7 @@ type FillerWordsContentSelectionRule = Agora.StartAgentsRequestPropertiesFillerW
       
       type Agent struct {
       	name                     string
      +	pipelineID               string
       	instructions             string
       	greeting                 string
       	failureMessage           string
      @@ -380,6 +381,16 @@ func WithName(name string) AgentOption {
       	}
       }
       
      +// WithPipelineID sets the published AI Studio pipeline ID to use as this agent's
      +// base configuration. Explicit Agent config such as WithLlm, WithTts, WithStt,
      +// advanced features, and other builder options may send fields in properties
      +// that override the saved pipeline settings.
      +func WithPipelineID(pipelineID string) AgentOption {
      +	return func(a *Agent) {
      +		a.pipelineID = pipelineID
      +	}
      +}
      +
       // Deprecated: Configure system messages on the LLM vendor instead.
       func WithInstructions(instructions string) AgentOption {
       	return func(a *Agent) {
      @@ -666,6 +677,7 @@ func (a *Agent) WithFillerWords(fw *FillerWordsConfig) *Agent {
       }
       
       func (a *Agent) Name() string                      { return a.name }
      +func (a *Agent) PipelineID() string                { return a.pipelineID }
       func (a *Agent) Instructions() string              { return a.instructions }
       func (a *Agent) Greeting() string                  { return a.greeting }
       func (a *Agent) LlmConfig() map[string]interface{} { return a.llm }
      diff --git a/agentkit/agent_session.go b/agentkit/agent_session.go
      index b86e4bf..2d816ec 100644
      --- a/agentkit/agent_session.go
      +++ b/agentkit/agent_session.go
      @@ -254,6 +254,11 @@ func (s *AgentSession) Start(ctx context.Context) (string, error) {
       	s.status = StatusStarting
       	s.mu.Unlock()
       
      +	pipelineID := s.pipelineID
      +	if pipelineID == "" {
      +		pipelineID = s.agent.PipelineID()
