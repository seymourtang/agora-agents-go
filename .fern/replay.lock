      Date: Wed, 20 May 2026 21:01:16 -0400
      Subject: [PATCH] fix(agentkit): align MLLM and LLM vendor config serialization

      Remove unsupported MLLM fields, fix OpenAIRealtime params precedence,
      and add AzureOpenAI Model to params.model output.
