        ```

        ### Constants

        <!-- snippet: fragment -->
        ```go
        const (
            RolePublisher      = 1
            RoleSubscriber     = 2
            DefaultExpirySeconds = 86400
        )
        ```

        `GenerateAvatarRtcToken` uses the same ConvoAI token format as agent tokens and scopes the token to the avatar `AgoraUID`.
