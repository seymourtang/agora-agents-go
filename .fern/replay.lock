        package agentkit

        import "fmt"

        func IsHeyGenAvatar(vendor string) bool {
        	return vendor == "heygen"
        }

        func IsAkoolAvatar(vendor string) bool {
        	return vendor == "akool"
        }

        func IsLiveAvatarAvatar(vendor string) bool {
        	return vendor == "liveavatar"
        }

        func IsAnamAvatar(vendor string) bool {
        	return vendor == "anam"
        }

        func IsGenericAvatar(vendor string) bool {
        	return vendor == "generic"
        }

        func ValidateAvatarConfig(vendor string, params map[string]interface{}) error {
        	if IsHeyGenAvatar(vendor) || IsLiveAvatarAvatar(vendor) {
        		label := "HeyGen"
        		if IsLiveAvatarAvatar(vendor) {
        			label = "LiveAvatar"
        		}
        		if params == nil {
        			return fmt.Errorf("%s avatar requires params", label)
        		}
        		if !hasNonEmptyString(params, "api_key") {
        			return fmt.Errorf("%s avatar requires api_key", label)
        		}
        		if q, ok := params["quality"]; !ok || !hasNonEmptyString(params, "quality") {
        			return fmt.Errorf("%s avatar requires quality (low, medium, or high)", label)
        		} else {
        			qs, _ := q.(string)
        			if qs != "low" && qs != "medium" && qs != "high" {
        				return fmt.Errorf("invalid quality for %s: %v. Must be one of: low, medium, high", label, q)
        			}
        		}
        		if avatarUIDString(params["agora_uid"]) == "" {
        			return fmt.Errorf("%s avatar requires agora_uid", label)
        		}
        	} else if IsAkoolAvatar(vendor) {
        		if params == nil {
        			return fmt.Errorf("Akool avatar requires params")
        		}
        		if !hasNonEmptyString(params, "api_key") {
        			return fmt.Errorf("Akool avatar requires api_key")
        		}
        	} else if IsAnamAvatar(vendor) {
        		if params == nil {
        			return fmt.Errorf("Anam avatar requires params")
        		}
        		if !hasNonEmptyString(params, "api_key") {
        			return fmt.Errorf("Anam avatar requires api_key")
        		}
        	} else if IsGenericAvatar(vendor) {
        		if params == nil {
        			return fmt.Errorf("Generic avatar requires params")
        		}
        		if !hasNonEmptyString(params, "api_key") {
        			return fmt.Errorf("Generic avatar requires api_key")
        		}
        		if !hasNonEmptyString(params, "api_base_url") {
        			return fmt.Errorf("Generic avatar requires api_base_url")
        		}
        		if !hasNonEmptyString(params, "avatar_id") {
        			return fmt.Errorf("Generic avatar requires avatar_id")
        		}
        		if avatarUIDString(params["agora_uid"]) == "" {
        			return fmt.Errorf("Generic avatar requires agora_uid")
        		}
        	}
        	return nil
        }

        func ValidateTtsSampleRate(avatarVendor string, sampleRate int) error {
        	if IsHeyGenAvatar(avatarVendor) || IsLiveAvatarAvatar(avatarVendor) {
        		label := "HeyGen"
        		docURL := "https://docs.agora.io/en/conversational-ai/models/avatar/heygen"
        		if IsLiveAvatarAvatar(avatarVendor) {
        			label = "LiveAvatar"
        			docURL = "https://docs.agora.io/en/conversational-ai/models/avatar/overview"
        		}
        		if sampleRate != 24000 {
        			return fmt.Errorf(
        				"%s avatars ONLY support 24,000 Hz sample rate. "+
        					"Your TTS is configured with %d Hz. "+
        					"Please update your TTS configuration to use 24kHz sample rate. "+
        					"See: %s",
        				label, sampleRate, docURL,
        			)
        		}
        	} else if IsAkoolAvatar(avatarVendor) {
        		if sampleRate != 16000 {
        			return fmt.Errorf(
        				"Akool avatars ONLY support 16,000 Hz sample rate. "+
        					"Your TTS is configured with %d Hz. "+
        					"Please update your TTS configuration to use 16kHz sample rate. "+
        					"See: https://docs.agora.io/en/conversational-ai/models/avatar/akool",
        				sampleRate,
        			)
        		}
        	}
        	return nil
        }
      agentkit/token.go: |
        package agentkit

        import (
        	"fmt"
        	"log"

        	"github.com/AgoraIO-Community/go-tokenbuilder/rtctokenbuilder2"
        )

        const (
        	RolePublisher  = 1
        	RoleSubscriber = 2

        	// DefaultExpirySeconds is the default token lifetime (24 hours, the Agora maximum).
        	DefaultExpirySeconds = 86400

        	// MaxExpirySeconds is the maximum token lifetime allowed by Agora (24 hours).
        	MaxExpirySeconds = 86400
        )

        // ValidateExpiresIn validates an expiresIn value in seconds.
        // Returns an error if secs <= 0.
        // Logs a warning and returns MaxExpirySeconds if secs > MaxExpirySeconds.
        func ValidateExpiresIn(secs int) (int, error) {
        	if secs <= 0 {
        		return 0, fmt.Errorf("expiresIn must be between 1 and 86400 seconds (24h)")
        	}
        	if secs > MaxExpirySeconds {
        		log.Println("agora-agent-sdk: expiresIn capped at 24h (Agora max)")
        		return MaxExpirySeconds, nil
        	}
        	return secs, nil
        }

        // ExpiresInHours converts hours to seconds for use as ExpiresIn.
        // Returns an error if hours <= 0; caps at MaxExpirySeconds with a warning.
        func ExpiresInHours(hours float64) (int, error) {
        	return ValidateExpiresIn(int(hours * 3600))
        }

        // ExpiresInMinutes converts minutes to seconds for use as ExpiresIn.
        // Returns an error if minutes <= 0; caps at MaxExpirySeconds with a warning.
        func ExpiresInMinutes(minutes float64) (int, error) {
        	return ValidateExpiresIn(int(minutes * 60))
        }

        type GenerateTokenOptions struct {
        	AppID          string
        	AppCertificate string
        	Channel        string
        	UID            uint32
        	Role           int
        	ExpirySeconds  int
        }

        type GenerateRtcTokenWithAccountOptions struct {
        	AppID          string
        	AppCertificate string
        	Channel        string
        	Account        string
        	Role           int
        	ExpirySeconds  int
        }

        type GenerateAvatarRtcTokenOptions struct {
        	AppID          string
        	AppCertificate string
        	Channel        string
        	UID            string
        	ExpirySeconds  int
        }

        // GenerateConvoAITokenOptions configures ConvoAI REST API token generation.
        // The token is used as: Authorization: agora token=<token>
        type GenerateConvoAITokenOptions struct {
        	AppID           string
        	AppCertificate  string
        	ChannelName     string
        	Account         string // Agent UID as string (e.g. "1001")
        	TokenExpire     int    // Seconds until expiry (default 86400)
        	PrivilegeExpire int    // 0 means same as TokenExpire
        }

        // GenerateRtcToken builds an RTC token for channel access.
        // Uses github.com/AgoraIO-Community/go-tokenbuilder.
        func GenerateRtcToken(opts GenerateTokenOptions) (string, error) {
        	if opts.AppID == "" {
        		return "", fmt.Errorf("app_id is required")
        	}
        	if opts.AppCertificate == "" {
        		return "", fmt.Errorf("app_certificate is required")
        	}
        	if opts.Channel == "" {
        		return "", fmt.Errorf("channel is required")
        	}
        	if opts.ExpirySeconds <= 0 {
        		opts.ExpirySeconds = DefaultExpirySeconds
        	}
        	if opts.Role == 0 {
        		opts.Role = RolePublisher
        	}

        	var role rtctokenbuilder2.Role = rtctokenbuilder2.RolePublisher
        	if opts.Role == RoleSubscriber {
        		role = rtctokenbuilder2.RoleSubscriber
        	}

        	expiry := uint32(opts.ExpirySeconds)
        	return rtctokenbuilder2.BuildTokenWithUid(
        		opts.AppID,
        		opts.AppCertificate,
        		opts.Channel,
        		opts.UID,
        		role,
        		expiry,
        		expiry,
        	)
        }

        // GenerateRtcTokenWithAccount builds an RTC token for a string account.
        func GenerateRtcTokenWithAccount(opts GenerateRtcTokenWithAccountOptions) (string, error) {
        	if opts.AppID == "" {
        		return "", fmt.Errorf("app_id is required")
        	}
        	if opts.AppCertificate == "" {
        		return "", fmt.Errorf("app_certificate is required")
        	}
        	if opts.Channel == "" {
        		return "", fmt.Errorf("channel is required")
        	}
        	if opts.Account == "" {
        		return "", fmt.Errorf("account is required")
        	}
        	if opts.ExpirySeconds <= 0 {
        		opts.ExpirySeconds = DefaultExpirySeconds
        	}
        	if opts.Role == 0 {
        		opts.Role = RolePublisher
        	}

        	var role rtctokenbuilder2.Role = rtctokenbuilder2.RolePublisher
        	if opts.Role == RoleSubscriber {
        		role = rtctokenbuilder2.RoleSubscriber
        	}

        	expiry := uint32(opts.ExpirySeconds)
        	return rtctokenbuilder2.BuildTokenWithUserAccount(
        		opts.AppID,
        		opts.AppCertificate,
        		opts.Channel,
        		opts.Account,
        		role,
        		expiry,
        		expiry,
        	)
        }

        // GenerateAvatarRtcToken builds the token used by an avatar publisher.
        //
        // Avatar tokens use the same ConvoAI token format as agent tokens. The token is
        // scoped to the avatar's agora_uid, which should be distinct from the agent UID.
        func GenerateAvatarRtcToken(opts GenerateAvatarRtcTokenOptions) (string, error) {
        	return GenerateConvoAIToken(GenerateConvoAITokenOptions{
        		AppID:          opts.AppID,
        		AppCertificate: opts.AppCertificate,
        		ChannelName:    opts.Channel,
        		Account:        opts.UID,
        		TokenExpire:    opts.ExpirySeconds,
        	})
        }

        // GenerateConvoAIToken builds a combined RTC + RTM token for ConvoAI REST API authentication.
        // Use the result as: Authorization: agora token=<token>
        //
        // Uses github.com/AgoraIO-Community/go-tokenbuilder (BuildTokenWithRtm).
        func GenerateConvoAIToken(opts GenerateConvoAITokenOptions) (string, error) {
        	if opts.AppID == "" {
        		return "", fmt.Errorf("app_id is required")
        	}
        	if opts.AppCertificate == "" {
        		return "", fmt.Errorf("app_certificate is required")
        	}
        	if opts.ChannelName == "" {
        		return "", fmt.Errorf("channel_name is required")
        	}
        	if opts.Account == "" {
        		return "", fmt.Errorf("account is required")
        	}
        	if opts.TokenExpire <= 0 {
        		opts.TokenExpire = DefaultExpirySeconds
        	}
        	privExpire := opts.PrivilegeExpire
        	if privExpire == 0 {
        		privExpire = opts.TokenExpire
        	}

        	return rtctokenbuilder2.BuildTokenWithRtm(
        		opts.AppID,
        		opts.AppCertificate,
        		opts.ChannelName,
        		opts.Account,
        		rtctokenbuilder2.RolePublisher,
        		uint32(opts.TokenExpire),
        		uint32(privExpire),
        	)
        }
