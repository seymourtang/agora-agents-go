      +++ b/agentkit/vendors/llm.go
      @@ -142,7 +142,11 @@ func (o *OpenAI) ToConfig() map[string]interface{} {
       }
       
       type AzureOpenAIOptions struct {
      -	APIKey            string
      +	APIKey string
