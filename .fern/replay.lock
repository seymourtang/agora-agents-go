        ```

        ### GenerateTokenOptions

        <!-- snippet: fragment -->
        ```go
        type GenerateTokenOptions struct {
            AppID          string
            AppCertificate string
            Channel        string
            UID            uint32
            Role           int
            ExpirySeconds  int
