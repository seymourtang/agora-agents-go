        				"model":         "speech-02-turbo",
        				"voice_setting": map[string]interface{}{"voice_id": "voice"},
        				"url":           "wss://api-uw.minimax.io/ws/v1/t2a_v2",
        			},
        		},
        		{
        			name: "sarvam",
        			params: NewSarvamTTS(SarvamTTSOptions{
        				Key:                "sarvam-key",
