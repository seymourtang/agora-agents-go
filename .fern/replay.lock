        func mapToStruct(m map[string]interface{}, target interface{}) error {
        	data, err := json.Marshal(m)
        	if err != nil {
        		return fmt.Errorf("failed to marshal config map: %w", err)
        	}
        	if err := json.Unmarshal(data, target); err != nil {
        		return fmt.Errorf("failed to unmarshal config into struct: %w", err)
        	}
        	return nil
        }

        func structToMap(value interface{}) (map[string]interface{}, error) {
        	data, err := json.Marshal(value)
        	if err != nil {
        		return nil, err
        	}
        	var result map[string]interface{}
        	if err := json.Unmarshal(data, &result); err != nil {
        		return nil, err
        	}
        	return result, nil
        }

        func cloneConfig(config map[string]interface{}) map[string]interface{} {
        	if config == nil {
        		return nil
        	}
        	clone := make(map[string]interface{}, len(config))
        	for k, v := range config {
        		clone[k] = cloneValue(v)
        	}
        	return clone
        }

        func cloneValue(value interface{}) interface{} {
        	switch v := value.(type) {
        	case map[string]interface{}:
        		return cloneConfig(v)
        	case []interface{}:
        		clone := make([]interface{}, len(v))
        		for i, item := range v {
        			clone[i] = cloneValue(item)
        		}
        		return clone
        	case []map[string]interface{}:
        		clone := make([]map[string]interface{}, len(v))
        		for i, item := range v {
        			clone[i] = cloneConfig(item)
        		}
        		return clone
        	case []string:
        		return append([]string(nil), v...)
        	case []int:
        		return append([]int(nil), v...)
        	case map[string]string:
        		clone := make(map[string]string, len(v))
        		for key, item := range v {
        			clone[key] = item
        		}
        		return clone
        	default:
        		return value
        	}
        }

        func boolFromMap(m map[string]interface{}, key string) bool {
        	if m == nil {
        		return false
        	}
        	value, ok := m[key]
        	if !ok {
        		return false
        	}
        	b, ok := value.(bool)
        	return ok && b
        }

