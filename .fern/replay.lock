        					"Your TTS is configured with %d Hz. "+
        					"Please update your TTS configuration to use 16kHz sample rate. "+
        					"See: https://docs.agora.io/en/conversational-ai/models/avatar/akool",
        				sampleRate,
        			)
        		}
        	}
        	return nil
        }
