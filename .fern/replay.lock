        func (s *AgentSession) GetInfo(ctx context.Context) (*Agora.GetAgentsResponse, error) {
        	s.mu.RLock()
        	if s.agentID == "" {
        		s.mu.RUnlock()
        		return nil, fmt.Errorf("no agent ID available")
