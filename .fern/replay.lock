      docs/concepts/agent.md: |
        ---
        sidebar_position: 2
        title: Agent
        description: The Agent builder — functional options pattern, vendor chaining, and ToProperties conversion.
        ---

        # Agent

        The `agentkit.Agent` is the central configuration object. It defines what LLM, TTS, STT, MLLM, and avatar vendors your agent uses, along with session-level settings.

        ## Functional Options Pattern

        `agentkit.NewAgent` uses Go's [functional options pattern](https://dave.cheney.net/2014/10/17/functional-options-for-friendly-apis). Instead of a large config struct, you pass option functions that each configure one aspect of the agent:

        <!-- snippet: fragment -->
        ```go
        agent := agentkit.NewAgent(
            agentkit.WithName("my-assistant"),
        ).WithLlm(vendors.NewOpenAI(vendors.OpenAIOptions{
            APIKey: "your-openai-key",
            Model:  "gpt-4o-mini",
            SystemMessages: []map[string]interface{}{
                {"role": "system", "content": "You are a helpful voice assistant."},
            },
            GreetingMessage: "Hello! How can I help?",
            FailureMessage:  "Sorry, something went wrong.",
            MaxHistory:      intPtr(10),
        }))
        ```

        Each `With*` function has the signature `func(...) AgentOption`, where `AgentOption` is `func(*Agent)`. This pattern lets you:

        - Omit any option you don't need (sensible defaults)
        - Add new options without breaking existing code
        - Compose options from helper functions

        ## AgentOption Functions

        These are passed to `agentkit.NewAgent(opts ...AgentOption)`:

        | Function | Parameter | Description |
        |---|---|---|
        | `WithName(name string)` | Agent name | Identifier for the agent |
        | `WithInstructions(instructions string)` | System prompt | Deprecated. Use LLM vendor `SystemMessages` instead. |
        | `WithGreeting(greeting string)` | Greeting text | Deprecated. Use LLM/MLLM vendor `GreetingMessage` instead. |
        | `WithFailureMessage(msg string)` | Fallback message | Deprecated. Use LLM/MLLM vendor `FailureMessage` instead. |
        | `WithMaxHistory(n int)` | History depth | Deprecated. Use LLM vendor `MaxHistory` instead. |
        | `WithTurnDetectionConfig(td *TurnDetectionConfig)` | Turn detection config | Cascading-flow SOS/EOS detection |
        | `WithSalConfig(sal *SalConfig)` | SAL config | Speech analytics configuration |
        | `WithAdvancedFeatures(af *AdvancedFeatures)` | Feature flags | RTM, tools, and other advanced features |
        | `WithParameters(params *SessionParams)` | Session params | Additional session parameters |
        | `WithGeofence(gf *GeofenceConfig)` | Geofence config | Regional access restriction |
        | `WithLabels(labels map[string]string)` | Labels map | Custom key-value labels (returned in callbacks) |
        | `WithRtc(rtc *RtcConfig)` | RTC config | RTC media encryption |
        | `WithFillerWords(fw *FillerWordsConfig)` | Filler words | Filler words while waiting for LLM |

        ## Vendor Chaining Methods

        After creating an agent with `NewAgent`, attach vendors using method chaining. Each method returns a **new** `*Agent` (the original is not modified — immutable cloning):

        <!-- snippet: fragment -->
        ```go
        agent := agentkit.NewAgent(
            agentkit.WithName("assistant"),
        ).WithLlm(
            vendors.NewOpenAI(vendors.OpenAIOptions{
                APIKey: "<key>",
                Model:  "gpt-4o-mini",
                SystemMessages: []map[string]interface{}{
                    {"role": "system", "content": "You are helpful."},
                },
            }),
        ).WithTts(
            vendors.NewElevenLabsTTS(vendors.ElevenLabsTTSOptions{
                Key:     "<key>",
                ModelID:    "eleven_turbo_v2_5",
                VoiceID:    "<voice_id>",
                BaseURL:    "wss://api.elevenlabs.io/v1",
            }),
        ).WithStt(
            vendors.NewDeepgramSTT(vendors.DeepgramSTTOptions{
                APIKey: "<key>",
            }),
        )
        ```

        | Method | Parameter Type | Description |
        |---|---|---|
        | `WithLlm(vendor vendors.LLM)` | `vendors.LLM` interface | Set the LLM vendor |
        | `WithTts(vendor vendors.TTS)` | `vendors.TTS` interface | Set the TTS vendor (also captures sample rate) |
        | `WithStt(vendor vendors.STT)` | `vendors.STT` interface | Set the STT vendor |
        | `WithMllm(vendor vendors.MLLM)` | `vendors.MLLM` interface | Set the MLLM vendor (for multimodal flow) |
        | `WithAvatar(vendor vendors.Avatar)` | `vendors.Avatar` interface | Set the avatar vendor (validates sample rate) |
        | `WithTurnDetection(td *TurnDetectionConfig)` | Pointer to config | Override cascading-flow SOS/EOS detection; use interruption config for interruption behavior |
        | `WithInstructions(instructions string)` | String | Deprecated. Use LLM vendor `SystemMessages` instead. |
        | `WithGreeting(greeting string)` | String | Deprecated. Use LLM/MLLM vendor `GreetingMessage` instead. |
        | `WithName(name string)` | String | Override name on a cloned agent |
        | `WithSal(sal *SalConfig)` | Pointer to config | Set SAL configuration |
        | `WithAdvancedFeatures(af *AdvancedFeatures)` | Pointer to config | Set advanced features |
        | `WithParameters(params *SessionParams)` | Pointer to config | Set session parameters |
        | `WithFailureMessage(msg string)` | String | Deprecated. Use LLM/MLLM vendor `FailureMessage` instead. |
        | `WithMaxHistory(n int)` | Int | Deprecated. Use LLM vendor `MaxHistory` instead. |
        | `WithGeofence(gf *GeofenceConfig)` | Pointer to config | Set geofence configuration |
        | `WithLabels(labels map[string]string)` | Map | Set custom labels |
        | `WithRtc(rtc *RtcConfig)` | Pointer to config | Set RTC configuration |
        | `WithFillerWords(fw *FillerWordsConfig)` | Pointer to config | Set filler words configuration |

        Note: `WithInstructions`, `WithGreeting`, `WithFailureMessage`, and `WithMaxHistory` are compatibility shims. New code should configure those values on the LLM or MLLM vendor because that matches the core request schema.

        ## Agent Getters

        <!-- snippet: fragment -->
        ```go
        agent.Name() string
        agent.Instructions() string
        agent.Greeting() string
        agent.FailureMessage() string
        agent.MaxHistory() *int
        agent.LlmConfig() map[string]interface{}
        agent.TtsConfig() map[string]interface{}
        agent.SttConfig() map[string]interface{}
        agent.MllmConfig() map[string]interface{}
        agent.TtsSampleRate() *vendors.SampleRate
        agent.AvatarRequiredSampleRate() *vendors.SampleRate
        agent.Avatar() map[string]interface{}
        agent.TurnDetection() *TurnDetectionConfig
        agent.Sal() *SalConfig
        agent.AdvancedFeatures() *AdvancedFeatures
        agent.Parameters() *SessionParams
        agent.Geofence() *GeofenceConfig
        agent.Labels() map[string]string
        agent.Rtc() *RtcConfig
        agent.FillerWords() *FillerWordsConfig
        ```

        ## ToProperties

        `ToProperties` converts the agent configuration into a `*Agora.StartAgentsRequestProperties` suitable for the API:

        <!-- snippet: fragment -->
        ```go
        props, err := agent.ToProperties(agentkit.ToPropertiesOptions{
            Channel:        "my-channel",
            AgentUID:       "1001",
            RemoteUIDs:     []string{"1002"},
            AppID:          "<app_id>",
            AppCertificate: "<app_cert>",
        })
        if err != nil {
            log.Fatalf("Failed to build properties: %v", err)
        }
        ```

        ### ToPropertiesOptions Fields

        | Field | Type | Description |
        |---|---|---|
        | `Channel` | `string` | Agora channel name |
        | `AgentUID` | `string` | UID for the agent in the channel |
        | `RemoteUIDs` | `[]string` | UIDs of remote participants |
        | `Token` | `string` | Pre-generated RTC token (if provided, skips generation) |
        | `AppID` | `string` | Agora App ID (for token generation) |
        | `AppCertificate` | `string` | Agora App Certificate (for token generation) |
        | `UID` | `uint32` | Numeric UID for token generation |
        | `TokenExpirySeconds` | `int` | Token expiry (default: 3600) |
        | `IdleTimeout` | `*int` | Session idle timeout in seconds |
        | `EnableStringUID` | `*bool` | Enable string UIDs |

        If `Token` is empty, `ToProperties` generates one from `AppID` + `AppCertificate`. If both are empty, it returns an error.

        In cascading mode, `ToProperties` requires both LLM and TTS to be configured — it returns an error if either is missing. In MLLM mode (when `mllm.enable` is `true`), LLM and TTS are not required.

        ## Type Aliases

        The agentkit package defines convenient type aliases for common Agora types:

        <!-- snippet: fragment -->
        ```go
        type TurnDetectionConfig = Agora.StartAgentsRequestPropertiesTurnDetection
        type SalConfig = Agora.StartAgentsRequestPropertiesSal
        type AdvancedFeatures = Agora.StartAgentsRequestPropertiesAdvancedFeatures
        type SessionParams = Agora.StartAgentsRequestPropertiesParameters
        type GeofenceConfig = Agora.StartAgentsRequestPropertiesGeofence
        type RtcConfig = Agora.StartAgentsRequestPropertiesRtc
        type FillerWordsConfig = Agora.StartAgentsRequestPropertiesFillerWords
        type LlmConfig = Agora.StartAgentsRequestPropertiesLlm
        type MllmConfig = Agora.StartAgentsRequestPropertiesMllm
        type AsrConfig = Agora.StartAgentsRequestPropertiesAsr
        type TtsConfig = Agora.Tts
        type AvatarConfig = Agora.StartAgentsRequestPropertiesAvatar
        ```

        Additional SOS/EOS turn detection aliases (`TurnDetectionNestedConfig`, `StartOfSpeechConfig`, `EndOfSpeechConfig`, etc.) are available — see the [Agent Reference](../reference/agent.md).
      docs/concepts/vendors.md: |
        ---
        sidebar_position: 4
        title: Vendors
        description: Vendor catalog — LLM, TTS, STT, MLLM, and Avatar constructors with configuration structs.
        ---

        # Vendors

        The `agentkit/vendors` package provides constructor functions for all supported third-party vendors. Each vendor implements one of five interfaces: `LLM`, `TTS`, `STT`, `MLLM`, or `Avatar`.

        ## Vendor Interfaces

        <!-- snippet: fragment -->
        ```go
        type LLM interface {
            ToConfig() map[string]interface{}
        }

        type TTS interface {
            ToConfig() map[string]interface{}
            GetSampleRate() *SampleRate
        }

        type STT interface {
            ToConfig() map[string]interface{}
        }

        type MLLM interface {
            ToConfig() map[string]interface{}
        }

        type Avatar interface {
            ToConfig() map[string]interface{}
            RequiredSampleRate() SampleRate
        }
        ```

        ## LLM Vendors

        | Constructor | Options Struct | Required Fields | Default Model |
        |---|---|---|---|
        | `NewOpenAI` | `OpenAIOptions` | `APIKey` for BYOK; none for supported Agora-managed OpenAI models | `gpt-4o-mini` |
        | `NewAzureOpenAI` | `AzureOpenAIOptions` | `APIKey`, `Endpoint`, `DeploymentName` | — |
        | `NewAnthropic` | `AnthropicOptions` | `APIKey` | `claude-3-5-sonnet-20241022` |
        | `NewGemini` | `GeminiOptions` | `APIKey` | `gemini-2.0-flash-exp` |
        | `NewGroq` | `GroqOptions` | `APIKey` | `llama-3.3-70b-versatile` |
        | `NewVertexAILLM` | `VertexAILLMOptions` | `APIKey`, `ProjectID`, `Location` | `gemini-2.0-flash-exp` |
        | `NewAmazonBedrock` | `AmazonBedrockOptions` | `APIKey`, `URL`, `Model` | — |
        | `NewDify` | `DifyOptions` | `APIKey`, `URL` | — |
        | `NewCustomLLM` | `CustomLLMOptions` | `APIKey`, `BaseURL`, `Model` | — |

        <!-- snippet: fragment -->
        ```go
        llm := vendors.NewOpenAI(vendors.OpenAIOptions{
            Model: "gpt-5-mini",
        })

        agent := agentkit.NewAgent(...).WithLlm(llm)
        ```

        ## TTS Vendors

        | Constructor | Options Struct | Required Fields |
        |---|---|---|
        | `NewElevenLabsTTS` | `ElevenLabsTTSOptions` | `Key`, `ModelID`, `VoiceID`, `BaseURL` |
        | `NewMicrosoftTTS` | `MicrosoftTTSOptions` | `Key`, `Region`, `VoiceName` |
        | `NewOpenAITTS` | `OpenAITTSOptions` | `Voice` for Agora-managed `tts-1`; `APIKey`, `Voice` for BYOK |
        | `NewCartesiaTTS` | `CartesiaTTSOptions` | `APIKey`, `VoiceID`, `ModelID` |
        | `NewGoogleTTS` | `GoogleTTSOptions` | `Key`, `VoiceName` |
        | `NewAmazonTTS` | `AmazonTTSOptions` | `AccessKey`, `SecretKey`, `Region`, `VoiceID`, `Engine` |
        | `NewHumeAITTS` | `HumeAITTSOptions` | `Key`, `VoiceID`, `Provider` |
        | `NewRimeTTS` | `RimeTTSOptions` | `Key`, `Speaker`, `ModelID` |
        | `NewFishAudioTTS` | `FishAudioTTSOptions` | `Key`, `ReferenceID`, `Backend` |
        | `NewGroqTTS` | `GroqTTSOptions` | `Key` |
        | `NewMiniMaxTTS` | `MiniMaxTTSOptions` | `Model` for supported Agora-managed MiniMax models; `Key`, `GroupID`, `Model` for BYOK |
        | `NewDeepgramTTS` | `DeepgramTTSOptions` | `APIKey`, `Model` |
        | `NewSarvamTTS` | `SarvamTTSOptions` | `APIKey` |

        <!-- snippet: fragment -->
        ```go
        tts := vendors.NewElevenLabsTTS(vendors.ElevenLabsTTSOptions{
            Key:        "<key>",
            ModelID:    "eleven_turbo_v2_5",
            VoiceID:    "<voice_id>",
            BaseURL:    "wss://api.elevenlabs.io/v1",
            SampleRate: &vendors.SampleRate24kHz,
        })

        agent = agent.WithTts(tts)
        ```

        ### SampleRate Constants

        <!-- snippet: fragment -->
        ```go
        vendors.SampleRate8kHz   // 8000
        vendors.SampleRate16kHz  // 16000
        vendors.SampleRate22kHz  // 22050
        vendors.SampleRate24kHz  // 24000
        vendors.SampleRate44kHz  // 44100
        vendors.SampleRate48kHz  // 48000
        ```

        Note: `OpenAITTS` always returns `SampleRate24kHz`. Other TTS vendors return their configured sample rate or `nil`.

        ## STT Vendors

        Use `Agent.WithInteractionLanguage()` for Agora `asr.language`; it defaults to `en-US`. STT vendor `Language` fields are serialized under `asr.params` using each provider's own format.

        | Constructor | Options Struct | Required Fields |
        |---|---|---|
        | `NewSpeechmaticsSTT` | `SpeechmaticsSTTOptions` | `APIKey`, `Language` |
        | `NewDeepgramSTT` | `DeepgramSTTOptions` | `APIKey` for BYOK; none for supported Agora-managed Deepgram models |
        | `NewMicrosoftSTT` | `MicrosoftSTTOptions` | `Key`, `Region` |
        | `NewOpenAISTT` | `OpenAISTTOptions` | `APIKey` |
        | `NewGoogleSTT` | `GoogleSTTOptions` | `ProjectID`, `Location`, `ADCCredentialsString` |
        | `NewAmazonSTT` | `AmazonSTTOptions` | `AccessKey`, `SecretKey`, `Region` |
        | `NewAssemblyAISTT` | `AssemblyAISTTOptions` | `APIKey` |
        | `NewAresSTT` | `AresSTTOptions` | None |
        | `NewSarvamSTT` | `SarvamSTTOptions` | `APIKey`, `Language` |

        <!-- snippet: fragment -->
        ```go
        stt := vendors.NewDeepgramSTT(vendors.DeepgramSTTOptions{
            APIKey:   "<key>",
            Model:    "nova-2",
            Language: "en-US",
        })

        agent = agent.WithStt(stt)
        ```

        ## MLLM Vendors

        | Constructor | Options Struct | Required Fields | Default Model |
        |---|---|---|---|
        | `NewOpenAIRealtime` | `OpenAIRealtimeOptions` | `APIKey` | `gpt-4o-realtime-preview` |
        | `NewGeminiLive` | `GeminiLiveOptions` | `APIKey`, `Model` | — |
        | `NewVertexAI` | `VertexAIOptions` | `ProjectID` | `gemini-2.0-flash-exp` |

        <!-- snippet: fragment -->
        ```go
        mllm := vendors.NewOpenAIRealtime(vendors.OpenAIRealtimeOptions{
            APIKey: "<key>",
            Model:  "gpt-4o-realtime-preview",
            Params: map[string]interface{}{
                "voice": "alloy",
            },
        })

        agent = agent.WithMllm(mllm)
        ```

        ## Avatar Vendors

        | Constructor | Options Struct | Required Fields | Required TTS Sample Rate |
        |---|---|---|---|
        | `NewLiveAvatarAvatar` | `LiveAvatarAvatarOptions` | `APIKey`, `Quality`, `AgoraUID` | 24kHz |
        | `NewGenericAvatar` | `GenericAvatarOptions` | `APIKey`, `APIBaseURL`, `AvatarID`, `AgoraUID` | Provider-dependent |
        | `NewAnamAvatar` | `AnamAvatarOptions` | `APIKey` | Provider-managed |
        | `NewAkoolAvatar` | `AkoolAvatarOptions` | `APIKey` | 16kHz |
        | `NewHeyGenAvatar` | `HeyGenAvatarOptions` | `APIKey`, `Quality`, `AgoraUID` | 24kHz; deprecated alias |

        <!-- snippet: fragment -->
        ```go
        avatar := vendors.NewLiveAvatarAvatar(vendors.LiveAvatarAvatarOptions{
            APIKey:   "<key>",
            Quality:  "high",
            AgoraUID: "2001",
        })

        // TTS must be configured with matching sample rate BEFORE WithAvatar
        agent = agent.WithTts(tts).WithAvatar(avatar)
        ```

        See [Avatars Guide](../guides/avatars.md) for sample rate requirements and the panic behavior when rates mismatch.

        ## Validation

        All vendor constructors validate required fields and `panic` if they are missing. For example:

        <!-- snippet: fragment -->
        ```go
        // This panics because gpt-4o requires an OpenAI API key.
        vendors.NewOpenAI(vendors.OpenAIOptions{Model: "gpt-4o"})
        ```

        This fails early so invalid vendor configuration does not reach session start. Provide BYOK fields when you use models outside the Agora-managed catalog.
      docs/guides/agent-builder-features.md: |
        ---
        sidebar_position: 5
        title: Agent Builder Features
        description: Configure SAL, advanced features, parameters, geofence, labels, RTC, filler words, and more.
        ---

        # Agent Builder Features

        The Agent builder supports many configuration options beyond the core LLM, TTS, and STT vendors. This guide shows how to use each feature.

        For string values with a finite set of options (e.g. `data_channel`, `sal_mode`, `area`), use the short constant aliases exported from the `agentkit` package (e.g. `agentkit.DataChannelRtm`, `agentkit.SalModeLocking`) instead of the verbose Fern-generated names or raw strings.

        ## Overview

        | Feature | Option / Method | Description |
        |---|---|---|
        | `sal` | `WithSalConfig` / `WithSal` | Selective Attention Locking — speaker recognition and noise suppression |
        | `advancedFeatures` | `WithAdvancedFeatures` | Enable MLLM, RTM, SAL, tools |
        | `tools` | `WithTools` | Enable MCP tool invocation |
        | `parameters` | `WithParameters` | Silence config, farewell config, data channel |
        | `failureMessage` | LLM/MLLM vendor option | Message spoken when LLM fails |
        | `maxHistory` | LLM vendor option | Max conversation turns in LLM context |
        | `geofence` | `WithGeofence` | Restrict backend server regions |
        | `labels` | `WithLabels` | Custom key-value labels (returned in callbacks) |
        | `rtc` | `WithRtc` | RTC media encryption |
        | `fillerWords` | `WithFillerWords` | Filler words while waiting for LLM |

        Use `NewAgent(opts...)` for constructor options, or chain methods on an existing agent. All methods return a **new** `*Agent` (immutable).

        ## SAL (Selective Attention Locking)

        SAL helps the agent focus on the primary speaker and suppress background noise. Enable it via `WithAdvancedFeatures` and configure with `WithSal`:

        ```go
        import (
            Agora "github.com/AgoraIO/agora-agents-go/v2"
            "github.com/AgoraIO/agora-agents-go/v2/agentkit"
            "github.com/AgoraIO/agora-agents-go/v2/agentkit/vendors"
        )

        agent := agentkit.NewAgent(
            agentkit.WithName("sal-assistant"),
            agentkit.WithAdvancedFeatures(&agentkit.AdvancedFeatures{
                EnableSal: Agora.Bool(true),
            }),
            agentkit.WithSalConfig(&agentkit.SalConfig{
                SalMode: agentkit.SalModeLocking.Ptr(),
                SampleUrls: map[string]string{
                    "primary-speaker": "https://example.com/voiceprint.pcm",
                },
            }),
        ).WithLlm(vendors.NewOpenAI(vendors.OpenAIOptions{
            APIKey: "<key>",
            Model:  "gpt-4o-mini",
            SystemMessages: []map[string]interface{}{
                {"role": "system", "content": "You are a helpful assistant."},
            },
        })).
          WithTts(vendors.NewElevenLabsTTS(/* ... */)).
          WithStt(vendors.NewDeepgramSTT(/* ... */))
        ```

        `SalMode` can be `agentkit.SalModeLocking` or `agentkit.SalModeRecognition`.

        ## Advanced Features

        Enable MLLM, RTM, SAL, or tools:

        ```go
        // MLLM mode (see mllm-flow guide)
        agent := agentkit.NewAgent().WithMllm(/* ... */)

        // RTM signaling for custom data delivery
        agent := agentkit.NewAgent(
            agentkit.WithAdvancedFeatures(&agentkit.AdvancedFeatures{
                EnableRtm: Agora.Bool(true),
            }),
        )

        // Enable tool invocation via MCP
        agent := agentkit.NewAgent(
            agentkit.WithTools(true),
        )
        ```

        Note: Use `Agora.Bool(true)` for optional boolean fields — the API expects `*bool`.

        ## Session Parameters

        Configure silence handling, farewell behavior, and data channel:

        ```go
        agent := agentkit.NewAgent(
            agentkit.WithName("params-agent"),
            agentkit.WithParameters(&agentkit.SessionParams{
                SilenceConfig: &agentkit.SilenceConfig{
                    TimeoutMs: Agora.Int(10000),
                    Action:    agentkit.SilenceActionSpeak.Ptr(),
                    Content:   Agora.String("I'm still here. Take your time."),
                },
                FarewellConfig: &agentkit.FarewellConfig{
                    GracefulEnabled:        Agora.Bool(true),
                    GracefulTimeoutSeconds: Agora.Int(10),
                },
                DataChannel: agentkit.DataChannelRtm.Ptr(),
            }),
        ).WithLlm(/* ... */).WithTts(/* ... */).WithStt(/* ... */)
        ```

        ## Failure Message and Max History

        ```go
        agent := agentkit.NewAgent().
            WithLlm(vendors.NewOpenAI(vendors.OpenAIOptions{
                APIKey:         "<key>",
                Model:          "gpt-4o-mini",
                FailureMessage: "Something went wrong.",
                MaxHistory:     Agora.Int(15),
            })).WithTts(/* ... */).WithStt(/* ... */)
        ```

        ## Geofence

        Restrict which geographic regions the backend can use:

        ```go
        import Agora "github.com/AgoraIO/agora-agents-go/v2"

        agent := agentkit.NewAgent(
            agentkit.WithGeofence(&agentkit.GeofenceConfig{
                Area: agentkit.GeofenceAreaNorthAmerica,
            }),
        ).WithLlm(/* ... */).WithTts(/* ... */).WithStt(/* ... */)

        // Global with exclusion
        agent := agentkit.NewAgent(
            agentkit.WithGeofence(&agentkit.GeofenceConfig{
                Area:        agentkit.GeofenceAreaGlobal,
                ExcludeArea: agentkit.GeofenceExcludeAreaEurope.Ptr(),
            }),
        ).WithLlm(/* ... */).WithTts(/* ... */).WithStt(/* ... */)
        ```

        Available `GeofenceArea` constants: `agentkit.GeofenceAreaGlobal`, `GeofenceAreaNorthAmerica`, `GeofenceAreaEurope`, `GeofenceAreaAsia`, `GeofenceAreaIndia`, `GeofenceAreaJapan`.

        ## Labels

        Attach custom labels returned in notification callbacks:

        ```go
        agent := agentkit.NewAgent(
            agentkit.WithLabels(map[string]string{
                "environment": "production",
                "team":        "support",
                "version":     "1.2.0",
            }),
        ).WithLlm(/* ... */).WithTts(/* ... */).WithStt(/* ... */)
        ```

        ## RTC Encryption

        Configure RTC media encryption:

        ```go
        agent := agentkit.NewAgent(
            agentkit.WithRtc(&agentkit.RtcConfig{
                EncryptionKey:  Agora.String("your-32-byte-key"),
                EncryptionMode: Agora.Int(5), // AES_128_GCM
            }),
        ).WithLlm(/* ... */).WithTts(/* ... */).WithStt(/* ... */)
        ```

        ## Filler Words

        Play filler words while waiting for the LLM response:

        ```go
        agent := agentkit.NewAgent(
            agentkit.WithFillerWords(&agentkit.FillerWordsConfig{
                Enable: Agora.Bool(true),
                Trigger: &agentkit.FillerWordsTrigger{
                    Mode: Agora.String("fixed_time"),
                    FixedTimeConfig: &agentkit.FillerWordsTriggerFixedTimeConfig{
                        ResponseWaitMs: Agora.Int(2000),
                    },
                },
                Content: &agentkit.FillerWordsContent{
                    Mode: Agora.String("static"),
                    StaticConfig: &agentkit.FillerWordsContentStaticConfig{
                        Phrases:      []string{"Let me think...", "One moment...", "Hmm..."},
                        SelectionRule: agentkit.FillerWordsSelectionRuleShuffle.Ptr(),
                    },
                },
            }),
        ).WithLlm(/* ... */).WithTts(/* ... */).WithStt(/* ... */)
        ```

        ## Getters

        Read back configuration via getter methods:

        ```go
        agent := agentkit.NewAgent(
            agentkit.WithGeofence(&agentkit.GeofenceConfig{
                Area: agentkit.GeofenceAreaEurope,
            }),
            agentkit.WithLabels(map[string]string{"env": "staging"}),
        )

        agent.Name()           // string
        agent.Geofence()       // *GeofenceConfig
        agent.Labels()         // map[string]string
        agent.Sal()            // *SalConfig
        agent.AdvancedFeatures()
        agent.Parameters()
        agent.FailureMessage()
        agent.Rtc()
        agent.FillerWords()
        ```

        ## Chaining All Features

        ```go
        package main

        import (
            "context"
            "log"

            Agora "github.com/AgoraIO/agora-agents-go/v2"
            "github.com/AgoraIO/agora-agents-go/v2/agentkit"
            "github.com/AgoraIO/agora-agents-go/v2/agentkit/vendors"
            "github.com/AgoraIO/agora-agents-go/v2/option"
        )

        func main() {
            client := agentkit.NewAgoraClient(agentkit.AgoraClientOptions{
                Area:           option.AreaUS,
                AppID:          "<app_id>",
                AppCertificate: "<app_cert>",
            })

            agent := agentkit.NewAgent(
                agentkit.WithName("full-featured-assistant"),
                agentkit.WithAdvancedFeatures(&agentkit.AdvancedFeatures{
                    EnableRtm: Agora.Bool(true),
                }),
                agentkit.WithParameters(&agentkit.SessionParams{
                    SilenceConfig: &agentkit.SilenceConfig{
                        TimeoutMs: Agora.Int(8000),
                        Action:    agentkit.SilenceActionSpeak.Ptr(),
                        Content:   Agora.String("I'm listening."),
                    },
                    FarewellConfig: &agentkit.FarewellConfig{
                        GracefulEnabled:        Agora.Bool(true),
                        GracefulTimeoutSeconds: Agora.Int(5),
                    },
                }),
                agentkit.WithGeofence(&agentkit.GeofenceConfig{
                    Area: agentkit.GeofenceAreaNorthAmerica,
                }),
                agentkit.WithLabels(map[string]string{
                    "app":     "voice-assistant",
                    "version": "2.0",
                }),
                agentkit.WithFillerWords(&agentkit.FillerWordsConfig{
                    Enable: Agora.Bool(true),
                    Trigger: &agentkit.FillerWordsTrigger{
                        Mode: Agora.String("fixed_time"),
                        FixedTimeConfig: &agentkit.FillerWordsTriggerFixedTimeConfig{
                            ResponseWaitMs: Agora.Int(1500),
                        },
                    },
                    Content: &agentkit.FillerWordsContent{
                        Mode: Agora.String("static"),
                        StaticConfig: &agentkit.FillerWordsContentStaticConfig{
                            Phrases:       []string{"Let me think...", "One moment please."},
                            SelectionRule: agentkit.FillerWordsSelectionRuleShuffle.Ptr(),
                        },
                    },
                }),
            ).WithLlm(vendors.NewOpenAI(vendors.OpenAIOptions{
                APIKey: "<openai_key>",
                Model:  "gpt-4o-mini",
                SystemMessages: []map[string]interface{}{
                    {"role": "system", "content": "You are a helpful voice assistant."},
                },
                GreetingMessage: "Hello! How can I help?",
                FailureMessage:  "Sorry, I had trouble processing that.",
                MaxHistory:      Agora.Int(20),
            })).WithTts(vendors.NewElevenLabsTTS(vendors.ElevenLabsTTSOptions{
                Key:     "<elevenlabs_key>",
                ModelID:  "eleven_turbo_v2_5",
                VoiceID:    "<voice_id>",
                BaseURL:    "wss://api.elevenlabs.io/v1",
            })).WithStt(vendors.NewDeepgramSTT(vendors.DeepgramSTTOptions{
                APIKey:   "<deepgram_key>",
                Model:    "nova-2",
                Language: "en-US",
            }))

            session := agent.CreateSession(client, agentkit.CreateSessionOptions{
                Channel:    "demo-channel",
                AgentUID:   "1001",
                RemoteUIDs: []string{"1002"},
            })

            ctx := context.Background()
            if _, err := session.Start(ctx); err != nil {
                log.Fatalf("Failed to start: %v", err)
            }
            defer session.Stop(ctx)
        }
        ```

        ## Next steps

        - [Agent Reference](../reference/agent.md) — full API signatures
        - [Cascading Flow](./cascading-flow.md) — ASR → LLM → TTS setup
        - [MLLM Flow](./mllm-flow.md) — multimodal flow with `mllm.enable`
        - [Regional Routing](./regional-routing.md) — client area and geofence
      docs/guides/avatars.md: |
        ---
        sidebar_position: 3
        title: Avatars
        description: Add visual avatars to your agent with token handling and sample rate requirements.
        ---

        # Avatars

        Avatars provide a visual representation of your AI agent. The SDK supports LiveAvatar, Generic Avatar, Anam, Akool, and deprecated HeyGen integrations. Avatar sessions currently require the cascading ASR/LLM/TTS pipeline; MLLM sessions do not support avatars. Vendors that publish an Agora video stream use a separate avatar UID and token from the voice agent.

        ## Agent Token vs Avatar Token

        Voice agents and video avatars both use ConvoAI-compatible Agora tokens. They must be scoped to different UIDs:

        | Purpose | Field | UID | Default behavior |
        |---|---|---|---|
        | Voice agent | `properties.token` | `agent_rtc_uid` | Generated from session `AgentUID` when `Token` is omitted |
        | Avatar video stream | `avatar.params.agora_token` | `avatar.params.agora_uid` | Generated from avatar `AgoraUID` when `AgoraToken` is omitted |

        Use a unique avatar `AgoraUID`; do not reuse the session `AgentUID`. If you provide `AgoraToken`, the SDK uses it as-is and does not overwrite it.

        ## Avatar Vendors

        | Vendor | Constructor | Required Sample Rate | Required Fields |
        |---|---|---|---|
        | LiveAvatar | `vendors.NewLiveAvatarAvatar` | 24kHz (`SampleRate24kHz`) | `APIKey`, `Quality` (low/medium/high), `AgoraUID` |
        | HeyGen (deprecated name) | `vendors.NewHeyGenAvatar` | 24kHz (`SampleRate24kHz`) | `APIKey`, `Quality` (low/medium/high), `AgoraUID` |
        | Akool | `vendors.NewAkoolAvatar` | 16kHz (`SampleRate16kHz`) | `APIKey` |
        | Anam | `vendors.NewAnamAvatar` | Provider-managed | `APIKey` |
        | Generic | `vendors.NewGenericAvatar` | Vendor-dependent; not enforced by AgentKit | `APIKey`, `APIBaseURL`, `AvatarID`, `AgoraUID` |

        ## Generic Avatar Example

        ```go
        sampleRate := vendors.SampleRate24kHz // or 16kHz, depending on your provider

        agent := agentkit.NewAgent(
            agentkit.WithName("generic-avatar"),
        ).WithLlm(
            vendors.NewOpenAI(vendors.OpenAIOptions{APIKey: "<openai_key>"}),
        ).WithTts(
            vendors.NewElevenLabsTTS(vendors.ElevenLabsTTSOptions{
                Key:        "<elevenlabs_key>",
                ModelID:    "eleven_turbo_v2_5",
                VoiceID:    "<voice_id>",
                BaseURL:    "wss://api.elevenlabs.io/v1",
                // Choose the sample rate required by your generic avatar provider.
                SampleRate: &sampleRate,
            }),
        ).WithAvatar(
            vendors.NewGenericAvatar(vendors.GenericAvatarOptions{
                APIKey:     "<avatar_vendor_key>",
                APIBaseURL: "https://avatar.example.com",
                AvatarID:   "<avatar_id>",
                AgoraUID:   "2001", // distinct from session AgentUID
            }),
        )
        ```

        For Generic avatars, `agora_appid`, `agora_channel`, and `agora_token` are filled from the session when omitted. For LiveAvatar and HeyGen, AgentKit auto-generates only `agora_token` when `agora_uid` is set and `agora_token` is omitted.

        ## LiveAvatar Example

        ```go
        package main

        import (
            "context"
            "fmt"
            "log"

            "github.com/AgoraIO/agora-agents-go/v2/agentkit"
            "github.com/AgoraIO/agora-agents-go/v2/agentkit/vendors"
            "github.com/AgoraIO/agora-agents-go/v2/option"
        )

        func main() {
            client := agentkit.NewAgoraClient(agentkit.AgoraClientOptions{
                Area:           option.AreaUS,
                AppID:          "<app_id>",
                AppCertificate: "<app_cert>",
            })

            sr := vendors.SampleRate24kHz

            agent := agentkit.NewAgent(
                agentkit.WithName("avatar-agent"),
            ).WithLlm(
                vendors.NewOpenAI(vendors.OpenAIOptions{
                    APIKey: "<openai_key>",
                    Model:  "gpt-4o-mini",
                    SystemMessages: []map[string]interface{}{
                        {"role": "system", "content": "You are a friendly virtual assistant with a visual avatar."},
                    },
                    GreetingMessage: "Hello! I can see you and you can see me!",
                }),
            ).WithTts(
                // TTS sample rate MUST match the avatar's required rate (24kHz for LiveAvatar).
                vendors.NewElevenLabsTTS(vendors.ElevenLabsTTSOptions{
                    Key:        "<elevenlabs_key>",
                    ModelID:    "eleven_turbo_v2_5",
                    VoiceID:    "<voice_id>",
                    BaseURL:    "wss://api.elevenlabs.io/v1",
                    SampleRate: &sr,
                }),
            ).WithStt(
                vendors.NewDeepgramSTT(vendors.DeepgramSTTOptions{
                    APIKey: "<deepgram_key>",
                }),
            ).WithAvatar(
                vendors.NewLiveAvatarAvatar(vendors.LiveAvatarAvatarOptions{
                    APIKey:   "<liveavatar_key>",
                    Quality:  "high",
                    AgoraUID: "2001",
                }),
            )

            session := agent.CreateSession(client, agentkit.CreateSessionOptions{
                Channel:    "avatar-channel",
                AgentUID:   "1001",
                RemoteUIDs: []string{"1002"},
            })

            ctx := context.Background()

            agentID, err := session.Start(ctx)
            if err != nil {
                log.Fatalf("Failed to start: %v", err)
            }
            fmt.Println("Avatar agent running:", agentID)

            err = session.Stop(ctx)
            if err != nil {
                log.Fatalf("Failed to stop: %v", err)
            }
        }
        ```

        ## Akool Avatar Example

        ```go
        sr := vendors.SampleRate16kHz

        agent := agentkit.NewAgent(
            agentkit.WithName("akool-avatar"),
        ).WithLlm(
            vendors.NewOpenAI(vendors.OpenAIOptions{
                APIKey: "<openai_key>",
                Model:  "gpt-4o-mini",
                SystemMessages: []map[string]interface{}{
                    {"role": "system", "content": "You are a virtual presenter."},
                },
            }),
        ).WithTts(
            // Akool requires 16kHz
            vendors.NewElevenLabsTTS(vendors.ElevenLabsTTSOptions{
                Key:        "<elevenlabs_key>",
                ModelID:    "eleven_turbo_v2_5",
                VoiceID:    "<voice_id>",
                BaseURL:    "wss://api.elevenlabs.io/v1",
                SampleRate: &sr,
            }),
        ).WithStt(
            vendors.NewDeepgramSTT(vendors.DeepgramSTTOptions{
                APIKey: "<deepgram_key>",
            }),
        ).WithAvatar(
            vendors.NewAkoolAvatar(vendors.AkoolAvatarOptions{
                APIKey: "<akool_key>",
            }),
        )
        ```

        ## Sample Rate Validation and Panic Behavior

        The Go SDK enforces the TTS/avatar sample rate constraint at runtime using `panic()`. This differs from TypeScript (compile-time phantom types) and Python (`ValueError`).

        ### When does the panic occur?

        `WithAvatar()` checks if the agent already has a TTS configured with a mismatched sample rate. If so, it panics immediately:

        ```
        Avatar requires TTS sample rate of 24000 Hz, but TTS is configured with 16000 Hz. Please update your TTS sample_rate to 24000.
        ```

        ### Why panic instead of returning an error?

        In Go, `panic` is idiomatic for programmer errors — configuration mistakes that should be caught during development, not handled at runtime. A sample rate mismatch is a static configuration error, not a transient failure.

        ### How to prevent the panic

        Always configure TTS with the correct sample rate **before** calling `WithAvatar()`:

        ```go
        // Correct: TTS sample rate matches avatar requirement
        sr := vendors.SampleRate24kHz
        agent := agentkit.NewAgent(...).
            WithTts(vendors.NewElevenLabsTTS(vendors.ElevenLabsTTSOptions{
                Key:        "<key>",
                ModelID:    "<model>",
                VoiceID:    "<voice>",
                BaseURL:    "wss://api.elevenlabs.io/v1",
                SampleRate: &sr,           // 24kHz for LiveAvatar
            })).
            WithAvatar(vendors.NewLiveAvatarAvatar(vendors.LiveAvatarAvatarOptions{
                APIKey:   "<key>",
                Quality:  "high",
                AgoraUID: "2001",
            }))
        ```

        ```go
        // Wrong: This panics because TTS is 16kHz but LiveAvatar requires 24kHz.
        sr := vendors.SampleRate16kHz
        agent := agentkit.NewAgent(...).
            WithTts(vendors.NewElevenLabsTTS(vendors.ElevenLabsTTSOptions{
                Key:        "<key>",
                ModelID:    "<model>",
                VoiceID:    "<voice>",
                BaseURL:    "wss://api.elevenlabs.io/v1",
                SampleRate: &sr,           // 16kHz — mismatch!
            })).
            WithAvatar(vendors.NewLiveAvatarAvatar(vendors.LiveAvatarAvatarOptions{
                APIKey:   "<key>",
                Quality:  "high",
                AgoraUID: "2001",
            }))
        // panic: Avatar requires TTS sample rate of 24000 Hz, but TTS is configured with 16000 Hz. Please update your TTS sample_rate to 24000.
        ```

        ### Additional validation at Start

        `AgentSession.Start()` also validates the sample rate match before making the API call. If the mismatch was introduced after `WithAvatar()` (e.g., by cloning the agent with a different TTS), `Start()` returns an error instead of panicking.

        ## LiveAvatarAvatarOptions Fields

        | Field | Type | Required | Description |
        |---|---|---|---|
        | `APIKey` | `string` | Yes | LiveAvatar API key |
        | `Quality` | `string` | Yes | `"low"`, `"medium"`, or `"high"` |
        | `AgoraUID` | `string` | Yes | UID for the avatar's video stream |
        | `AgoraToken` | `string` | No | Avatar token. Auto-generated when omitted. |
        | `AvatarID` | `string` | No | LiveAvatar avatar ID |
        | `Enable` | `*bool` | No | Enable or disable the avatar |
        | `DisableIdleTimeout` | `*bool` | No | Disable the idle timeout |
        | `ActivityIdleTimeout` | `*int` | No | Idle timeout in seconds |
        | `AdditionalParams` | `map[string]interface{}` | No | Additional vendor params |

        ## AkoolAvatarOptions Fields

        | Field | Type | Required | Description |
        |---|---|---|---|
        | `APIKey` | `string` | Yes | Akool API key |
