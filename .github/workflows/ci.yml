name: ci

on: [push]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up go
        uses: actions/setup-go@v4

      - name: Release metadata check
        run: bash scripts/check-release-workflow.sh

      - name: Compile
        run: go build ./...
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up go
        uses: actions/setup-go@v4

      - name: Setup wiremock server
        run: |
          if [ -f wiremock/docker-compose.test.yml ]; then docker compose -f wiremock/docker-compose.test.yml down && docker compose -f wiremock/docker-compose.test.yml up -d; fi

      - name: Wait for wiremock readiness
        run: |
          if [ -f wiremock/docker-compose.test.yml ]; then
            for i in {1..30}; do
              if curl -fsS http://localhost:8080/__admin/mappings >/dev/null; then
                echo "wiremock is ready"
                exit 0
              fi
              sleep 1
            done
            echo "wiremock did not become ready in time"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Teardown wiremock server
        if: always()
        run: |
          if [ -f wiremock/docker-compose.test.yml ]; then docker compose -f wiremock/docker-compose.test.yml down; fi
